// ─── runBacktest ───
function btResetRun(){btState.running=false;btState.statusMsg='';btState.results=[];renderBacktest();}
function btSetStatus(msg){
  btState.statusMsg=msg;
  const el=document.getElementById('btStatusEl');
  if(el){el.textContent=msg;el.style.display=msg?'':'none';}
}
async function runBacktest(){
  if(btState.running)return;
  btState.running=true;
  try{
    btState.results=[];renderBacktest();btSetStatus('⏳ Đang chạy...');
    const configsToRun=btState.mode==='load'?btState.configs.filter(c=>c._checked):[null];
    for(const cfg of configsToRun){
      if(cfg)btStateFromConfig(cfg);
      const _slot=cfg?(_slotNo(cfg._name)||String(btState.configs.indexOf(cfg)+1)):null, _cfgName=cfg?cfg._name:null; // slot = số trong tên file (vd 060), fallback vị trí
      // apply load-mode overrides (trước khi tính ngày)
      if(btState.mode==='load'){
        if(btState.ovStart)btState.start=btState.ovStart;
        if(btState.ovEnd)btState.end=btState.ovEnd;
        if(btState.ovSizeUsd)btState.sizeUsd=+btState.ovSizeUsd;
        if(btState.ovLeverage)btState.leverage=+btState.ovLeverage;
      }
      // tính ngày SAU khi config + override đã apply
      const startMs=btParseDate(btState.start);
      const endMs=btParseDate(btState.end)+86400000;
      if(!startMs||!endMs){btSetStatus('❌ Ngày không hợp lệ');continue;}
      const coin=btState.coin.trim().toUpperCase();
      const dirs=btState.dir==='both'?['buy','sell']:[btState.dir];
      for(const dir of dirs){
        const activeEntry=BT_ENTRY_BOXES.filter(eb=>btState[eb.key].on);
        if(!activeEntry.length)continue;
        // ★ BOX ĐỘC LẬP — GỘP VỊ THẾ THEO COIN · điểm rẽ nhánh DUY NHẤT. Để gỡ: xóa khối if(btState.mergePositionOn){...} này,
        // giữ lại nguyên vẹn nhánh else (code gốc, không đổi).
        if(btState.mergePositionOn){
          btSetStatus(`⏳ ${coin} · Gộp vị thế · ${dir}...`);
          const trades=await bt_genMergedPositions(coin,dir,activeEntry,startMs,endMs);
          for(const t of trades){
            t.cfgSlot=_slot; t.cfgName=_cfgName;
            t.entryFmt=t.entry>100?t.entry.toFixed(2):t.entry.toFixed(5);
            t.netUsdt=t.pnl!=null?((t.pnl-btState.fee)/100)*(t.totalSizeUsed??btState.sizeUsd)*btState.leverage:null;
          }
          btState.results.push(...trades);
          continue;
        }
        for(const eb of activeEntry){
          const st=btState[eb.key];
          const pMs=BT_RSI_TF_MS[st.tf];
          btSetStatus(`⏳ ${coin} · ${eb.label} ${st.tf} · ${dir}...`);
          const candles=await bt_fetchKlines(coin,startMs-eb.warmup(st.tf),endMs,st.tf);
          const hist=eb.buildHist(candles.slice(0,-1),st.period);
          let trades=eb.generate(candles,hist,dir,startMs,endMs,st.level,btState.tp,btState.sl,0);
          // signal candle ts đã set trong bt_genTrades; bsearch lại chính xác hơn
          const opens=candles.map(c=>c[0]);
          for(const t of trades){
            t.signalCandleTs=bt_bsearchTs(opens,t.rawTs+pMs,pMs)??t.rawTs;
            t.signalVal=bt_bsearchMacd(opens,hist,t.rawTs+pMs,pMs)??t.signalVal;
          }
          // apply ind box filters
          for(const box of BT_IND_BOXES){
            const bs=btState[box.key];if(!bs.on)continue;
            let primaryData=null;
            for(const tf of bs.tfs){
              const ipMs=BT_MACD_TF_MS[tf];
              const warmupI=box.warmup(ipMs);
              btSetStatus(`⏳ ${coin} · ${box.label} ${tf}...`);
              const iC=await bt_fetchKlines(coin,startMs-warmupI,endMs,tf);
              const cl=iC.slice(0,-1);
              const iOpens=cl.map(c=>c[0]);const iHist=box.buildHist(cl);
              const data={opens:iOpens,hist:iHist,pMs:ipMs};
              trades=box.filter(trades,data,dir);
              if(!primaryData)primaryData=data;
            }
            if(primaryData){
              for(const t of trades){
                t[box.key+'CandleTs']=bt_bsearchTs(primaryData.opens,t.rawTs,primaryData.pMs);
                t[box.key+'Val']=bt_bsearchMacd(primaryData.opens,primaryData.hist,t.rawTs,primaryData.pMs);
                t[box.key+'Tf']=bs.tfs[0];
              }
            }
          }
          // ★ FIX (thứ tự Max lệnh cùng lúc) — áp SAU KHI đã lọc chỉ báo/độ dốc xong, không còn áp lúc sinh
          // tín hiệu thô nữa. Xem chi tiết ở comment applyMaxOrdersPost() (gần optSlopePass()).
          trades=applyMaxOrdersPost(trades,btState.maxOrders);
          // enrich + net
          for(const t of trades){
            t.coin=coin;t.dir=dir;t.entrySignal=eb.label;t.entryTf=st.tf;
            t.cfgSlot=_slot;t.cfgName=_cfgName;
            t.entryFmt=t.entry>100?t.entry.toFixed(2):t.entry.toFixed(5);
            // ★ BOX ĐỘC LẬP (DCA) — dùng t.totalSizeUsed (vốn thực đã dùng: entry+DCA1+DCA2 nếu khớp) thay vì btState.sizeUsd cố định.
            // Khi DCA tắt/không khớp, t.totalSizeUsed không tồn tại → fallback về đúng btState.sizeUsd, hành vi y hệt cũ. Fee cũng tự động scale theo đúng tỷ lệ vốn thực đã dùng.
            t.netUsdt=t.pnl!=null?((t.pnl-btState.fee)/100)*(t.totalSizeUsed??btState.sizeUsd)*btState.leverage:null;
          }
          btState.results.push(...trades);
        }
      }
    }
    btState.statusMsg=`✅ Xong — ${btState.results.length} lệnh`;
  }catch(e){btState.statusMsg='❌ '+(e.message||e);}
  finally{
    btState.running=false;
    try{renderBacktest();}catch(err){
      console.error('[BT] renderBacktest lỗi:',err);
      btState.results=[];
      try{renderBacktest();}catch(e2){console.error('[BT] fallback render lỗi:',e2);}
    }
  }
}

// ─── btResultsHtml — khung (summary + header + tbody rỗng), thân do virtual scroll dựng ───
let btView=null;  // {sorted, activeInd, rowH, headerH, totalCols, _measured}
// Slot = số ở đầu tên file (vd "060_..." → "060"), giữ nguyên chuỗi (kể cả 4-5 chữ số); fallback null
function _slotNo(name){const m=String(name||'').match(/^(\d+)/);return m?m[1]:null;}
// Đỉnh số lệnh mở đồng thời (sweep line trên [vào, ra]) — lệnh OPEN tính tới cuối kỳ
function btMaxConcurrent(trades){
  if(!trades||!trades.length)return{max:0,ts:null};
  const BIG=9e15, ev=[];
  for(const t of trades){ ev.push([t.rawTs,1]); ev.push([t.exitTs!=null?t.exitTs:BIG,-1]); }
  ev.sort((a,b)=>a[0]-b[0]||b[1]-a[1]); // cùng mốc: VÀO (+1) trước RA (−1) → đếm là có chồng (thận trọng)
  let cur=0,mx=0,mxTs=null;
  for(const e of ev){ cur+=e[1]; if(cur>mx){mx=cur;mxTs=e[0];} }
  return {max:mx, ts:(mxTs!=null&&mxTs<BIG)?mxTs:null};
}
// ★ BOX ĐỘC LẬP (Chuỗi lệnh âm liên tiếp) — thuần thống kê, không đụng thuật toán vào lệnh/backtest.
// Gộp CHUNG toàn bộ config/coin đang chạy thành 1 dòng thời gian (giống cách btMaxConcurrent ở trên đang gộp chung),
// xếp theo NGÀY THOÁT (exitTs), đếm số lệnh LOSS liên tiếp không có WIN xen giữa, lấy chuỗi dài nhất.
// Bỏ lệnh OPEN (chưa có ngày thoát) khỏi thống kê — giống cách biến "closed" trong btResultsHtml() đã lọc.
// Xóa: xóa hàm này + xóa dòng "const lossStreak=..." và thẻ .bt-sum tương ứng trong btResultsHtml() để gỡ.
function btMaxLossStreak(trades){
  if(!trades||!trades.length)return{max:0,ts:null};
  const closed=trades.filter(t=>t.result!=='OPEN'&&t.exitTs!=null)
                      .sort((a,b)=>a.exitTs-b.exitTs);
  let cur=0,mx=0,mxTs=null;
  for(const t of closed){
    if(t.result==='LOSS'){ cur++; if(cur>mx){mx=cur;mxTs=t.exitTs;} }
    else cur=0;
  }
  return {max:mx, ts:mxTs};
}

// Bấm vào thẻ tóm tắt → mở popup liệt kê từng config: tên file + Net PnL TOÀN BỘ config đó (gồm cả thắng lẫn thua)
// + chuỗi lệnh âm liên tiếp riêng của chính config đó (tính lại bằng đúng thuật toán btMaxLossStreak, chỉ scope trong 1 config).
// Thuần đọc lại s.results có sẵn (t.cfgName/t.cfgSlot/t.netUsdt đã có từ trước) — không đụng thuật toán/box nào khác.
// Xóa: xóa toàn bộ khối này (từ đây tới "END SUB-BOX Loss-Streak Popup") + xóa "cursor:pointer"/onclick trên thẻ
// "Chuỗi lệnh âm liên tiếp" trong btResultsHtml() + xóa dòng gọi "btLossModalHtml()" ở cuối btResultsHtml() để gỡ.
let btLossModal={open:false};
function btToggleLossModal(open){ btLossModal.open=open; renderBacktest(); }
function btLossStreakByConfig(trades){
  if(!trades||!trades.length)return[];
  const groups=new Map(); // key: cfgName||cfgSlot||'—' (fallback khi chạy tay, không load file)
  for(const t of trades){
    const key=t.cfgName||(t.cfgSlot!=null?'#'+t.cfgSlot:'—');
    if(!groups.has(key))groups.set(key,{cfgName:t.cfgName||null,cfgSlot:t.cfgSlot??null,trades:[]});
    groups.get(key).trades.push(t);
  }
  const out=[];
  for(const g of groups.values()){
    const streak=btMaxLossStreak(g.trades).max;
    const closedG=g.trades.filter(t=>t.result!=='OPEN');
    const netUsdt=closedG.reduce((s,t)=>s+(t.netUsdt||0),0);
    // ★ Net PnL tổng % (sau fee) riêng của config này — dùng đúng công thức weighted-by-size y hệt summary tổng (netPnlPct ở btResultsHtml()),
    // chỉ khác là scope trong 1 config thay vì toàn bộ s.results. Dùng fee/sizeUsd hiện tại trên UI (btState.fee/btState.sizeUsd) —
    // giống hệt cách summary tổng đang tính, không đọc/ghi thêm field nào ở vòng lặp sinh lệnh của runBacktest().
    const netPct=closedG.reduce((acc,t)=>{
      if(t.pnl==null)return acc;
      const sizeRatio=(t.totalSizeUsed??btState.sizeUsd)/btState.sizeUsd;
      return acc+(t.pnl-btState.fee)*sizeRatio;
    },0);
    out.push({cfgName:g.cfgName, cfgSlot:g.cfgSlot, streak, netUsdt, netPct, tradeCount:g.trades.length});
  }
  out.sort((a,b)=>b.streak-a.streak||a.netUsdt-b.netUsdt); // chuỗi dài nhất lên đầu, hòa thì lỗ nặng hơn lên trước
  return out;
}

const _SIG_BODY_BG='rgba(79,70,229,.06)', _SIG_HDR_BG='#eeecfb', _COL_DIV='border-left:2px solid rgba(15,23,42,.10);';

  return '<div class="bt-sum-bar">'

    +'<div class="bt-sum" style="cursor:pointer" onclick="btToggleLossModal(true)" title="Bấm để xem breakdown theo từng config"><div class="bt-sum-lbl">Chuỗi lệnh âm liên tiếp (theo ngày thoát) 🔍</div><div class="bt-sum-val" style="color:var(--red)"'+(lossStreak.ts?' title="Chuỗi kết thúc lúc '+btLocalTime(lossStreak.ts)+'"':'')+'>'+lossStreak.max+'</div></div>'
    +'</div>'

    +'<div class="bt-sort-row"><span class="bt-sort-lbl">Sắp xếp theo:</span>'
    +'<button class="bt-sbtn '+(s.sortBy==='entry'?'on':'')+'" onclick="setBtSort(\'entry\',btState.sortBy===\'entry\'?(btState.sortDir===\'asc\'?\'desc\':\'asc\'):\'asc\')">Thời gian vào lệnh '+(s.sortBy==='entry'?(s.sortDir==='asc'?'▲ cũ→mới':'▼ mới→cũ'):'')+'</button>'
    +'<button class="bt-sbtn '+(s.sortBy==='exit'?'on':'')+'" onclick="setBtSort(\'exit\',btState.sortBy===\'exit\'?(btState.sortDir===\'asc\'?\'desc\':\'asc\'):\'asc\')">Thời gian thoát lệnh '+(s.sortBy==='exit'?(s.sortDir==='asc'?'▲ cũ→mới':'▼ mới→cũ'):'')+'</button>'
    +'<span style="margin-left:auto;font-size:10px;color:var(--dim);font-weight:600">Tổng '+sorted.length+' lệnh</span></div>'
    +'<div style="font-size:10px;color:var(--dim);margin:6px 0 4px;">🕒 Mọi mốc thời gian trong bảng (T.vào, T.thoát, Nến đóng) hiển thị theo <b>giờ máy tính của bạn</b> — ngày nhập ở trên tính theo UTC.</div>'
    +'<div class="bt-tbl-wrap"><div class="bt-tbl-scroll"><div class="bt-tbl-frozen"><table>'
    +'<thead><tr>'
    +'<th rowspan="2" class="bt-fz bt-l1">#</th><th rowspan="2" class="bt-fz bt-l2">Coin</th><th rowspan="2" class="bt-fz bt-l3">Dir</th>'
    +'<th rowspan="2">Slot</th>'
    +'<th rowspan="2">Tín hiệu</th><th rowspan="2">TF</th>'
    +'<th rowspan="2"'+(s.mergePositionOn?' title="Thời điểm Entry gốc khớp (nấc đầu tiên của vị thế)"':'')+'>T.vào (local)</th><th rowspan="2">T.thoát</th><th rowspan="2"'+(s.mergePositionOn?' title="Giá khớp của Entry gốc — xem Giá TB (cuối) để biết giá trung bình sau khi gộp thêm nấc"':'')+'>Giá vào'+(s.mergePositionOn?' (Entry gốc)':'')+'</th>'
    +(s.mergePositionOn?'<th rowspan="2">DCA1</th><th rowspan="2">DCA2</th><th rowspan="2">Giá TB (cuối)</th>':'') // ★ BOX ĐỘC LẬP (Gộp vị thế DCA) — CHỈ hiện khi s.mergePositionOn bật. Xóa cả khối này để gỡ box "Gộp vị thế DCA".
    +'<th rowspan="2" style="color:var(--cyn)">Giá thoát</th>' // ★ BOX ĐỘC LẬP (Giá thoát) — luôn hiện, nằm bên phải "Giá TB" (khi bật DCA) hoặc bên phải "Giá vào" (khi tắt DCA). Xóa th này + cột trong btRowHtml() + bớt "+1" ở totalCols để gỡ.
    +(s.mergePositionOn?'<th rowspan="2">Số nấc</th><th rowspan="2"></th>':'') // ★ BOX ĐỘC LẬP (Gộp vị thế) — CHỈ hiện khi mergePositionOn bật, tắt thì bảng về đúng gốc 100%. Xóa 2 th này + 2 td tương ứng trong btRowHtml() + bỏ "+2" ở totalCols để gỡ.

    +'</tr><tr><th style="background:'+_SIG_HDR_BG+';'+_COL_DIV+'">Nến đóng</th><th style="background:'+_SIG_HDR_BG+'">Giá trị</th>'+indSubHdrs+'</tr>'

    +btMergeDetailModalHtml(); // ★ BOX ĐỘC LẬP (Gộp vị thế) — popup chi tiết từng nấc. Xóa dòng này để gỡ.
}

// ─── 1 dòng kết quả (idx = chỉ số thật trong mảng đã sort) ───
function btRowHtml(t,idx,activeInd){
  const isOpen=t.result==='OPEN';
  const fzBg=isOpen?'#fffbeb':(idx%2===1?'#f6f7f9':'#fff');
  const rowBg=isOpen?'background:#fffbeb;':(idx%2===1?'background:rgba(243,244,246,.7);':'');
  const pnlC=t.pnl>0?'var(--grn)':t.pnl<0?'var(--red)':'var(--dim)';
  const dirC=t.dir==='buy'?'var(--grn)':'var(--red)';
  const dirLbl=t.dir==='buy'?'Buy':'Sell';
  const badge=isOpen?'<span class="badge bo">OPEN</span>':t.result==='WIN'?'<span class="badge bw">WIN</span>':'<span class="badge bl">LOSS</span>';
  const sigValFmt=t.signalVal!=null?Number(t.signalVal).toFixed(2):'—';
  const _slot=t.cfgSlot;
  const _slotPal=['#4f46e5','#0891b2','#16a34a','#d97706','#db2777','#7c3aed','#0d9488','#dc2626'];
  const slotCell=_slot!=null
    ?'<td><span title="'+(t.cfgName?String(t.cfgName).replace(/"/g,'&quot;'):'')+'" style="font-size:10px;font-weight:800;color:#fff;background:'+_slotPal[(_slot-1)%_slotPal.length]+';border-radius:5px;padding:1px 6px;">#'+_slot+'</span></td>'
    :'<td style="color:var(--dim)">—</td>';
  const indCells=activeInd.map(b=>{
    const bg=_indBodyBg(b);
    const tf=t[b.key+'Tf'];
    if(tf==null) return '<td style="background:'+bg+';'+_COL_DIV+'color:var(--dim)">—</td><td style="background:'+bg+';color:var(--dim)">—</td>'; // dòng từ config không dùng chỉ báo này
    const ts=t[b.key+'CandleTs'];const val=t[b.key+'Val'];
    const vf=val!=null?(isFinite(val)?(Math.abs(val)<1?val.toFixed(4):val.toFixed(2)):String(val)):'—';
    const vc=val!=null?(val>0?'var(--grn)':'var(--red)'):'var(--dim)';
    const tfTag='<span style="color:var(--acc);font-weight:700">'+String(tf).toUpperCase()+'</span> · ';
    return '<td style="background:'+bg+';'+_COL_DIV+'color:var(--dim)">'+tfTag+(ts?btLocalTime(ts):'—')+'</td><td style="background:'+bg+';color:'+vc+'">'+vf+'</td>';
  }).join('');
  return '<tr style="'+rowBg+'">'
    +'<td class="bt-fz bt-l1" style="background:'+fzBg+';color:var(--dim)">'+(idx+1)+'</td>'
    +'<td class="bt-fz bt-l2" style="background:'+fzBg+';color:var(--cyn);font-weight:700">'+(t.coin||'—')+'</td>'
    +'<td class="bt-fz bt-l3" style="background:'+fzBg+';color:'+dirC+';font-weight:700">'+dirLbl+'</td>'
    +slotCell
    +'<td>'+(t.entrySignal||'—')+'</td>'
    +'<td>'+(t.entryTf||'—')+'</td>'
    +'<td>'+btLocalTime(t.rawTs)+'</td>'
    +'<td style="color:var(--dim)">'+(t.exitTs?btLocalTime(t.exitTs):'—')+'</td>'
    +'<td style="color:var(--hi)">'+(t.entryFmt||'—')+'</td>'
    +(btState.mergePositionOn // ★ BOX ĐỘC LẬP (Gộp vị thế DCA) — CHỈ hiện khi btState.mergePositionOn bật. Xóa cả khối này để gỡ box "Gộp vị thế DCA".
      ?'<td style="color:var(--dim)">'+(t.dca1Hit!=null?(t.dca1Hit>100?t.dca1Hit.toFixed(2):t.dca1Hit.toFixed(5)):'—')+'</td>'
      +'<td style="color:var(--dim)">'+(t.dca2Hit!=null?(t.dca2Hit>100?t.dca2Hit.toFixed(2):t.dca2Hit.toFixed(5)):'—')+'</td>'
      +'<td style="color:var(--acc);font-weight:700">'+(t.avgEntry!=null?(t.avgEntry>100?t.avgEntry.toFixed(2):t.avgEntry.toFixed(5)):(t.entryFmt||'—'))+'</td>'
      :'')
    +'<td style="color:'+pnlC+';font-weight:700">'+(t.exitPrice!=null?(t.exitPrice>100?t.exitPrice.toFixed(2):t.exitPrice.toFixed(5)):'—')+'</td>' /* ★ BOX ĐỘC LẬP (Giá thoát) — màu theo WIN/LOSS (dùng chung biến pnlC), luôn hiện. Xóa td này + th ở btResultsHtml() + bớt "+1" totalCols để gỡ. */
    +(btState.mergePositionOn // ★ BOX ĐỘC LẬP (Gộp vị thế) — 2 cột CHỈ hiện khi bật, tắt thì bảng về đúng gốc 100% (không còn cột trống thừa). Xóa cả khối (btState.mergePositionOn?...:'') này + th tương ứng để gỡ.
      ?'<td style="text-align:center;font-weight:700;color:var(--acc)">'+(t.legsCount!=null?t.legsCount:'—')+'</td>'
      +'<td>'+(t.legsCount!=null?'<button onclick="btShowMergeDetail('+idx+')" style="font-size:10px;font-weight:700;color:var(--acc);background:rgba(79,70,229,.08);border:1px solid var(--acc);border-radius:6px;padding:2px 8px;cursor:pointer;white-space:nowrap;">Chi tiết ›</button>':'')+'</td>'
      :'')
    +'<td style="background:'+_SIG_BODY_BG+';'+_COL_DIV+'color:var(--dim)">'+btLocalTime(t.signalCandleTs)+'</td>'
    +'<td style="background:'+_SIG_BODY_BG+';color:var(--cyn)">'+sigValFmt+'</td>'
    +indCells
    +'<td class="bt-fz bt-r1" style="background:'+fzBg+';color:'+pnlC+';font-weight:700">'+(t.pnl!=null?(t.pnl>0?'+':'')+t.pnl.toFixed(2)+'%':'—')+'</td>'
    +'<td class="bt-fz bt-r2" style="background:'+fzBg+';color:'+pnlC+';font-weight:700">'+(t.netUsdt!=null?(t.netUsdt>0?'+':'')+'\$'+Math.abs(t.netUsdt).toFixed(2):'—')+'</td>'
    +'<td class="bt-fz bt-r3" style="background:'+fzBg+'">'+badge+'</td>'
    +'</tr>';
}

// ─── BOX ĐỘC LẬP (Gộp vị thế) — popup chi tiết từng nấc, mở từ nút "Chi tiết ›" ở btRowHtml(). Tham chiếu theo idx trong btView.sorted (mảng đang render).
// Xóa: xóa state + 2 hàm này (btShowMergeDetail/btMergeDetailModalHtml) + nút "Chi tiết ›" trong btRowHtml() + dòng gọi btMergeDetailModalHtml() trong btResultsHtml() để gỡ.
let btMergeDetailModal={open:false,idx:null};
function btShowMergeDetail(idx){ btMergeDetailModal={open:true,idx}; renderBacktest(); }
function btCloseMergeDetail(){ btMergeDetailModal.open=false; renderBacktest(); }
function btMergeDetailModalHtml(){
  if(!btMergeDetailModal.open||!btView||!btView.sorted)return '';
  const t=btView.sorted[btMergeDetailModal.idx];
  if(!t||!t.legs)return '';
  const typeBadge=type=>{
    const isEntry=type==='Entry gốc'||type==='Entry mới';
    const bg=isEntry?'rgba(79,70,229,.1)':'#f0f9ff', c=isEntry?'var(--acc)':'#0369a1';
    return '<span style="background:'+bg+';color:'+c+';border-radius:4px;padding:1px 6px;font-weight:700;">'+esc(type)+'</span>';
  };
  const rows=t.legs.map((l,i)=>'<tr style="border-top:1px solid var(--b1);'+(i%2===1?'background:rgba(243,244,246,.6);':'')+'">'
    +'<td style="padding:6px 8px;color:var(--dim)">'+(i+1)+'</td>'
    +'<td style="padding:6px 8px">'+typeBadge(l.type)+'</td>'
    +'<td style="padding:6px 8px">'+(l.source?esc(l.source):'<span style="color:var(--dim)">— (giá)</span>')+'</td>'
    +'<td style="padding:6px 8px;font-family:\'JetBrains Mono\',monospace">'+(l.tf?esc(l.tf):'—')+'</td>'
    +'<td style="padding:6px 8px;font-family:\'JetBrains Mono\',monospace">'+btLocalTime(l.ts)+'</td>'
    +'<td style="padding:6px 8px;text-align:right;font-family:\'JetBrains Mono\',monospace">'+(l.price>100?l.price.toFixed(2):l.price.toFixed(5))+'</td>'
    +'<td style="padding:6px 8px;text-align:right;font-family:\'JetBrains Mono\',monospace">$'+l.costUsd.toFixed(2)+'</td>'
    +'</tr>').join('');
  const pnlC=t.pnl>0?'var(--grn)':t.pnl<0?'var(--red)':'var(--dim)';
  return '<div onclick="btCloseMergeDetail()" style="position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;">'
    +'<div onclick="event.stopPropagation()" style="background:#fff;border-radius:16px;max-width:760px;width:100%;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.25);">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--b1);flex-shrink:0;">'
    +'<div style="font-size:13px;font-weight:800;color:var(--hi);">'+esc(t.coin||'')+' — chi tiết vị thế gộp ('+t.legs.length+' nấc)</div>'
    +'<button onclick="btCloseMergeDetail()" style="border:none;background:var(--bg2);color:var(--dim);width:26px;height:26px;border-radius:8px;cursor:pointer;font-size:14px;">✕</button>'
    +'</div>'
    +'<div style="overflow-y:auto;overflow-x:auto;padding:0 4px;">'
    +'<table style="width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;">'
    +'<thead><tr style="position:sticky;top:0;background:var(--bg2);">'
    +'<th style="padding:6px 8px;text-align:left;">Nấc</th><th style="padding:6px 8px;text-align:left;">Loại</th>'
    +'<th style="padding:6px 8px;text-align:left;">Tín hiệu</th><th style="padding:6px 8px;text-align:left;">TF</th>'
    +'<th style="padding:6px 8px;text-align:left;">T.khớp (local)</th><th style="padding:6px 8px;text-align:right;">Giá khớp</th>'
    +'<th style="padding:6px 8px;text-align:right;">Vốn nấc</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div style="display:flex;gap:16px;flex-wrap:wrap;padding:12px 18px;border-top:1px solid var(--b1);background:var(--bg1);flex-shrink:0;">'
    +'<div><span style="font-size:9px;color:var(--dim)">Giá TB cuối</span><br><span style="font-size:12px;font-family:\'JetBrains Mono\',monospace;font-weight:700">'+(t.avgEntry>100?t.avgEntry.toFixed(2):t.avgEntry.toFixed(5))+'</span></div>'
    +'<div><span style="font-size:9px;color:var(--dim)">TP</span><br><span style="font-size:12px;font-family:\'JetBrains Mono\',monospace;font-weight:700">'+(t.tp>100?t.tp.toFixed(2):t.tp.toFixed(5))+'</span></div>'
    +'<div><span style="font-size:9px;color:var(--dim)">SL</span><br><span style="font-size:12px;font-family:\'JetBrains Mono\',monospace;'+(t.sl!=null?'font-weight:700':'color:var(--dim)')+'">'+(t.sl!=null?(t.sl>100?t.sl.toFixed(2):t.sl.toFixed(5)):'chưa bật')+'</span></div>'
    +'<div><span style="font-size:9px;color:var(--dim)">Net USDT</span><br><span style="font-size:12px;font-family:\'JetBrains Mono\',monospace;font-weight:700;color:'+pnlC+'">'+(t.netUsdt!=null?(t.netUsdt>0?'+':'')+'$'+Math.abs(t.netUsdt).toFixed(2):'—')+'</span></div>'
    +'<div><span style="font-size:9px;color:var(--dim)">Kết quả</span><br>'+(t.result==='WIN'?'<span class="badge bw">WIN</span>':t.result==='LOSS'?'<span class="badge bl">LOSS</span>':'<span class="badge bo">OPEN</span>')+'</div>'
    +'</div></div></div>';
}

// ─── BOX ĐỘC LẬP (Gộp vị thế) — popup sơ đồ flow (nút "i" cạnh tên toggle trong renderBacktest()) ───

let btMergeInfoModal={open:false};
function btToggleMergeInfo(open){ btMergeInfoModal={open}; renderBacktest(); }
function btMergeInfoModalHtml(){
  if(!btMergeInfoModal.open)return '';
  const arrow=label=>`<div style="display:flex;flex-direction:column;align-items:center;padding:3px 0;">
      <div style="font-size:16px;color:var(--dim);line-height:1;">▼</div>
      ${label?`<div style="font-size:9px;color:var(--dim);text-align:center;max-width:400px;margin-top:2px;">${label}</div>`:''}
    </div>`;
  const box=o=>`<div style="background:${o.bg||'#fff'};border:1.5px solid ${o.bd||'var(--b1)'};border-radius:12px;padding:11px 15px;text-align:center;">
      <div style="font-size:11.5px;font-weight:800;color:${o.tc||'var(--hi)'};margin-bottom:4px;">${o.title}</div>
      ${o.body||''}
    </div>`;

    <div onclick="event.stopPropagation()" style="background:#fff;border-radius:14px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;padding:20px 22px;box-shadow:0 10px 40px rgba(0,0,0,.25);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <div style="font-size:14px;font-weight:800;color:var(--hi)">🔗 Gộp vị thế DCA — sơ đồ flow</div>
        <button onclick="btToggleMergeInfo(false)" style="border:none;background:transparent;font-size:18px;cursor:pointer;color:var(--dim);">✕</button>
      </div>
      <div style="font-size:10px;color:var(--dim);margin-bottom:14px;">Toàn bộ vòng lặp mỗi nến — TP/SL/DCA1/DCA2/Entry mới đều nằm trong CÙNG 1 vòng lặp, chạy đúng thứ tự cố định từ trên xuống mỗi nến.</div>
      <div style="display:flex;flex-direction:column;">
        ${box({bg:'rgba(79,70,229,.06)',bd:'var(--acc)',tc:'var(--acc)',title:'Entry gốc mở vị thế',
          body:`<div style="font-size:10px;color:var(--dim);">avgEntry = giá entry · SL/TP tính ngay nhưng CHƯA BẬT (slArmed=false)</div>`})}
        ${arrow()}
        ${box({bg:'var(--bg2)',bd:'var(--b1)',tc:'var(--hi)',title:'↻ MỖI NẾN (lặp lại)',
          body:`<div style="font-size:9px;color:var(--dim);">5 bước sau chạy đúng thứ tự này ở TỪNG nến, không có ngoại lệ</div>`})}
        ${arrow()}
        ${box({title:'① TP chạm?',
          body:`<div style="font-size:10px;color:var(--dim);">CÓ → đóng lệnh <b style="color:var(--grn)">WIN</b>, hết (không xét tiếp các bước dưới)</div>`})}
        ${arrow()}
        ${box({bg:'rgba(217,119,6,.06)',bd:'var(--ora)',tc:'var(--ora)',title:'② SL chạm?',
          body:`<div style="font-size:10px;color:var(--dim);">Chỉ đóng lệnh <b style="color:var(--red)">LOSS</b> nếu SL ĐÃ BẬT (slArmed=true)<br>Chưa bật → dù giá chạm SL cũng bỏ qua, KHÔNG đóng lệnh</div>`})}
        ${arrow()}
        ${box({bd:'#0ea5e9',title:'③ DCA1 chạm & chưa khớp?',
          body:`<div style="font-size:10px;color:var(--dim);">Khớp → +nấc 50% vốn 1 entry đơn · avgEntry/TP/SL tính lại theo công thức chuẩn sàn</div>`})}
        ${arrow()}
        ${box({bd:'#0ea5e9',title:'④ DCA2 chạm & DCA1 đã khớp?',
          body:`<div style="font-size:10px;color:var(--dim);">Khớp → +nấc 50% vốn 1 entry đơn · avgEntry/TP/SL tính lại → <b style="color:var(--ora)">SL BẬT (slArmed=true)</b></div>`})}

avgEntry_mới = (100+50+100) / (1 + 0,5155 + 1,0204) = 250 / 2,5359 ≈ $98,58

        </div>

// ─── chỉ render cửa sổ dòng đang nhìn thấy (+ đệm), 2 spacer giữ chiều cao ───
function btRenderRows(){
  const sec=document.getElementById('backtestSection');if(!sec||!btView)return;
  const cont=sec.querySelector('.bt-tbl-frozen');
  const tb=sec.querySelector('#btTbody');
  if(!cont||!tb)return;
  const {sorted,activeInd,headerH,totalCols}=btView;
  const rowH=btView.rowH;
  const N=sorted.length;
  if(!N){tb.innerHTML='<tr><td colspan="'+totalCols+'" style="text-align:center;padding:20px;color:var(--dim)">Chưa có lệnh</td></tr>';return;}
  const BUF=10;
  const vis=Math.ceil(Math.max(0,cont.clientHeight-headerH)/rowH)+1;
  let start=Math.floor(cont.scrollTop/rowH)-BUF; if(start<0)start=0;
  let end=start+vis+2*BUF; if(end>N)end=N;
  const topH=start*rowH, botH=(N-end)*rowH;
  let html='';
  if(topH>0) html+='<tr aria-hidden="true"><td colspan="'+totalCols+'" style="padding:0;border:0;height:'+topH+'px"></td></tr>';
  for(let k=start;k<end;k++) html+=btRowHtml(sorted[k],k,activeInd);
  if(botH>0) html+='<tr aria-hidden="true"><td colspan="'+totalCols+'" style="padding:0;border:0;height:'+botH+'px"></td></tr>';
  tb.innerHTML=html;
  // đo chiều cao thật 1 lần rồi vẽ lại cho khớp (tránh lệch khi cuộn sâu)
  if(!btView._measured){
    btView._measured=true;
    const realRow=tb.querySelector('tr:not([aria-hidden])');
    const thead=cont.querySelector('thead');
    let changed=false;
    if(realRow){const h=realRow.getBoundingClientRect().height; if(h>0&&Math.abs(h-rowH)>0.5){btView.rowH=h;changed=true;}}
    if(thead){const hh=thead.getBoundingClientRect().height; if(hh>0&&Math.abs(hh-headerH)>0.5){btView.headerH=hh;changed=true;}}
    if(changed) btRenderRows();
  }
}

// ─── gắn listener cuộn (throttle rAF) + render lần đầu, sau mỗi renderBacktest ───
function btMountResults(){
  const sec=document.getElementById('backtestSection');if(!sec||!btView)return;
  const cont=sec.querySelector('.bt-tbl-frozen');
  if(!cont)return;
  let ticking=false;
  cont.addEventListener('scroll',()=>{
    if(ticking)return; ticking=true;
    requestAnimationFrame(()=>{ticking=false;btRenderRows();});
  });
  btRenderRows();
}

        Chọn tất cả
      </label>
      <span style="font-size:11px;color:var(--dim)">${s.configs.filter(c=>c._checked).length}/${s.configs.length} configs được chọn</span>
    </div>
    <div class="bt-cfg-list" style="border-radius:12px;overflow-y:auto;overflow-x:hidden;max-height:340px">
      ${s.configs.map((c,i)=>btCfgCard(c,i)).join('')}
    </div>
    ${s.running
      ?`<div style="width:100%;margin-top:10px;padding:12px;border-radius:10px;background:var(--bg2);border:1px solid var(--b1);font-size:12px;color:var(--acc);font-weight:700;text-align:center;cursor:pointer;" onclick="btResetRun()">⏳ Đang chạy... <span style="font-size:10px;color:var(--dim)">(click để dừng)</span></div>`
      :`<button class="bt-run-btn" onclick="runBacktest()" style="width:100%;margin-top:10px;">▶ Chạy — ${s.configs.filter(c=>c._checked).length} configs đã chọn</button>`}
    `:`<div style="font-size:12px;color:var(--dim);padding:14px 0;text-align:center">
      Chưa load file nào — chọn JSON đã lưu từ nút 💾 ở chế độ Nhập tay
    </div>`}
    `}
    <div class="bt-status" id="btStatusEl"${s.statusMsg?'':' style="display:none"'}>${s.statusMsg||''}</div>
    ${_results}
    `}
  </div>${btMergeInfoModalHtml()}`;
  const _cl=el.querySelector('.bt-cfg-list'); if(_cl)_cl.scrollTop=_cfgScroll; // khôi phục vị trí cuộn
  btMountResults();
}

// ══════════════════════════════════════════════
// ★ BOX ĐỘC LẬP — MÔ PHỎNG DANH MỤC (Sections Tiện ích, prefix sim_)
// Chỉ TÁI SỬ DỤNG runBacktest()/bt_genTrades()/bt_genMergedPositions() có sẵn — không viết thuật toán backtest mới.
// Cách hoạt động: với mỗi config đã load, tạm ghi đè btState (mode='load', 1 config, override sizeUsd/leverage/ngày bắt đầu,
// mergePositionOn theo đúng cấu hình file), gọi runBacktest() y hệt Backtest Detail, đọc lại btState.results (netUsdt+exitTs),
// gom theo ngày, rồi khôi phục nguyên trạng btState ban đầu (không ảnh hưởng form Backtest Detail đang có).
// Xóa: xóa "let simState={...}" + toàn bộ hàm sim_* bên dưới + dòng "${sim_boxHtml()}" và "setTimeout(sim_drawChart,0);"
// trong renderUtility() để gỡ sạch. Không đụng Backtest Detail/Optimizer/Check Indicators.
// ══════════════════════════════════════════════
let simState={
  configs:[], startDate:'', endDate:'', capital:10000, sizeUsd:100, leverage:10,
  running:false, pauseRequested:false, paused:false, nextIndex:0,
  dayMap:{}, series:[], bankruptDay:null, bankruptStopped:false, maxDrawdownPct:0, maxDownFromInitPct:0, totalTrades:0,
  // ★ Win rate — winCount/closedTrades cộng dồn theo đúng cách tính Backtest Detail (t.result==='WIN' / closed=result!=='OPEN').
  // Xóa: xóa 2 field này + dòng cộng dồn trong sim_run() + ô "WIN RATE" trong sim_boxHtml() để gỡ riêng, không ảnh hưởng chỉ số khác.
  winCount:0, closedTrades:0,
  // ★ Danh sách chi tiết từng config đã load (đủ bộ chỉ số: entry/TP-SL/filter/DCA/độ dốc) — mặc định ẩn, bấm mới
  // xổ ra. Xóa: xóa field này + hàm sim_cfgSummary() + khối "▼ Xem danh sách..." trong sim_boxHtml() để gỡ riêng,
  // không ảnh hưởng gì tới việc chạy mô phỏng.
  showCfgList:false,
};
function sim_pickFiles(files){
  simState.configs=[]; simState.nextIndex=0; simState.dayMap={}; simState.series=[];
  simState.bankruptDay=null; simState.bankruptStopped=false; simState.totalTrades=0; simState.paused=false;
  simState.winCount=0; simState.closedTrades=0;
  let loaded=0;
  for(const f of files){
    const reader=new FileReader();
    reader.onload=e=>{
      try{simState.configs.push({...JSON.parse(e.target.result),_name:f.name});}
      catch(err){console.error('[Sim] Parse lỗi:',f.name,err);}
      if(++loaded===files.length){
        simState.configs.sort((a,b)=>String(a._name||'').localeCompare(String(b._name||''),undefined,{numeric:true}));
        renderUtility();
      }
    };
    reader.readAsText(f);
  }
}
// ★ Tóm tắt đủ bộ chỉ số của 1 config đã load (entry/TP-SL/maxOrders/filter/DCA/độ dốc) — đọc thẳng từ đúng field
// JSON gốc (không tính toán lại gì), để bạn xem lại đã load đúng cấu hình chưa trước khi chạy mô phỏng.
// Xóa: xóa hàm này để gỡ, không ảnh hưởng sim_run()/sim_pickFiles() hay bất kỳ tính toán nào.
function sim_cfgSummary(c){
  const sig=(c.entrySignal||'rsi').toUpperCase();
  const entryTxt = c.entrySignal==='both'
    ? `BOTH · RSI:${c.rsiTf||'?'}/Lv${c.rsiLevel??50}/P${c.rsiPeriod??14} + MFI:${c.mfiTf||'?'}/Lv${c.mfiLevel??50}/P${c.mfiPeriod??14}`
    : `${sig} ${c.entryTf||'?'} · Lv${c.level??50} · P${c.period??14}`;
  const indTxt = BT_IND_BOXES.filter(b=>c[b.key]).map(b=>`${b.label.split(' ')[0]} ${c[b.key]}`).join(', ')||'không filter';
  const dcaTxt = c.dca1Pct!=null
    ? `DCA ✓ (${c.dca1Pct}%/${c.dca2Pct}% · size ${c.dca1SizePctOfEntry}%/${c.dca2SizePctOfEntry}%${c.mergeMaxEntries?' · tối đa '+c.mergeMaxEntries+' lần':''})`
    : 'DCA ✕';
  const slopeTxt = c.slopeOn===true ? `Dốc ✓ (k=${c.slopeK||1})` : 'Dốc ✕';
  const mo = c.maxOrders===0?'Multi':(c.maxOrders??1)+' lệnh';
  return `<div style="font-size:10px;color:var(--dim);padding:6px 8px;border-top:1px solid var(--b1);">
    <span style="color:var(--hi);font-weight:700;">${esc(c._name||'?')}</span> · ${esc(c.coin||'?')} · ${c.dir||'?'} · ${esc(entryTxt)} · TP${c.tp}/SL${c.sl} · ${mo}
    <br>${esc(indTxt)} · <span style="color:${c.dca1Pct!=null?'var(--grn)':'var(--dim)'}">${dcaTxt}</span> · <span style="color:${c.slopeOn===true?'var(--acc)':'var(--dim)'}">${slopeTxt}</span>
  </div>`;
}
function sim_dayKey(ms){ return new Date(ms).toISOString().slice(0,10); }
function sim_buildSeries(){
  const days=Object.keys(simState.dayMap).sort();
  simState.series=[]; simState.bankruptDay=null; simState.maxDrawdownPct=0; simState.maxDownFromInitPct=0;
  if(!days.length)return;
  // ★ Ngày bắt đầu nhập tay dạng DD/MM/YYYY (giống Start/End Backtest Detail) — parse qua btParseDate() có sẵn, không dùng date-picker.
  const startMs=simState.startDate?btParseDate(simState.startDate):null;
  const startDay=startMs?sim_dayKey(startMs):days[0];
  const endDay=days[days.length-1];
  let cur=new Date(startDay+'T00:00:00Z'); const end=new Date(endDay+'T00:00:00Z');
  if(isNaN(cur)||isNaN(end))return;
  const initCap=simState.capital||10000;
  let capital=initCap, peak=capital, maxDd=0, maxDownFromInit=0;
  while(cur<=end){
    const key=cur.toISOString().slice(0,10);
    capital+=simState.dayMap[key]||0;
    if(capital>peak)peak=capital;
    const dd=peak>0?(capital-peak)/peak*100:0; if(dd<maxDd)maxDd=dd;
    // ★ Max Down từ Vốn Gốc — so với vốn ban đầu CỐ ĐỊNH (không phải đỉnh), lấy giá trị âm nhất toàn chuỗi.
    // Xóa: xóa biến maxDownFromInit + dòng "const devInit..." này + field simState.maxDownFromInitPct + ô hiển thị
    // trong sim_boxHtml() để gỡ riêng chỉ số này, không ảnh hưởng Max Drawdown hay tính toán nào khác.
    const devInit=initCap>0?(capital-initCap)/initCap*100:0; if(devInit<maxDownFromInit)maxDownFromInit=devInit;
    simState.series.push({date:key,capital});
    if(capital<=0&&simState.bankruptDay===null){ simState.bankruptDay=key; break; }
    cur.setUTCDate(cur.getUTCDate()+1);
  }
  simState.maxDrawdownPct=maxDd;
  simState.maxDownFromInitPct=maxDownFromInit;
}
async function sim_run(){
  if(simState.running)return;
  simState.running=true; simState.paused=false; simState.pauseRequested=false;
  const saved=JSON.parse(JSON.stringify(btState));
  // ★ TỐI ƯU MƯỢT (chỉ trong sim_run, không sửa runBacktest()/Backtest Detail):
  // Tạm ghi đè renderBacktest()=hàm rỗng lúc chạy loop — runBacktest() gọi renderBacktest() trong finally của NÓ,
  // nếu không chặn thì mỗi config sẽ render lại cả bảng Backtest Detail (rất nặng, không ai nhìn lúc này).
  // Khôi phục lại hàm gốc ngay khi xong/dừng/lỗi (finally bên dưới) — không đổi 1 dòng nào của Backtest Detail.
  // ★ KHÔNG vẽ biểu đồ/render giao diện trong lúc chạy nữa (bỏ hẳn hiệu ứng chart tự lớn dần) — chỉ hiện icon
  // đồng hồ cát tĩnh (renderUtility() gọi 1 lần lúc bắt đầu để hiện icon, không gọi lại giữa chừng nữa).
  // sim_buildSeries() vẫn chạy mỗi config (rẻ, thuần cộng số) để phát hiện cạn vốn và dừng sớm đúng như trước —
  // chỉ khác là không renderUtility() theo nó nữa, để dành 1 lần vẽ đầy đủ ở cuối (hoặc lúc dừng/cạn vốn).
  // Để gỡ: xóa khối "const _origRenderBacktest..." + "renderBacktest=_origRenderBacktest()", bỏ dòng
  // "renderUtility();" đầu hàm, đưa renderUtility() vào gọi lại mỗi config trong loop như cũ.
  const _origRenderBacktest=renderBacktest;
  renderBacktest=function(){};
  renderUtility(); // hiện icon đồng hồ cát ngay khi bắt đầu
  try{
    for(let i=simState.nextIndex;i<simState.configs.length;i++){
      if(simState.pauseRequested){ simState.paused=true; simState.nextIndex=i; break; }
      const cfg=simState.configs[i];
      btState.mode='load'; btState.configs=[{...cfg,_checked:true}];
      btState.ovSizeUsd=simState.sizeUsd||''; btState.ovLeverage=simState.leverage||'';
      btState.ovStart=simState.startDate||''; // để trống = dùng ngày trong file config
      btState.ovEnd=simState.endDate||todayStr(); // ★ để trống = mặc định chạy tới hiện tại (không phụ thuộc ngày lưu trong file)
      btState.mergePositionOn=(cfg.dca1Pct!=null); // ★ đúng theo đúng cấu hình từng file, không dùng toggle UI hiện tại
      await runBacktest();
      for(const t of btState.results){
        if(t.result!=='OPEN'){ simState.closedTrades++; if(t.result==='WIN')simState.winCount++; }
        if(t.exitTs==null)continue; // OPEN — chưa đóng, không tính vào vốn ngày
        const day=sim_dayKey(t.exitTs);
        simState.dayMap[day]=(simState.dayMap[day]||0)+(t.netUsdt||0);
      }
      simState.totalTrades+=btState.results.length;
      simState.nextIndex=i+1;
      sim_buildSeries();
      // ★ Cập nhật % TRỰC TIẾP vào đúng 1 span (không gọi renderUtility()) — gần như miễn phí, không vẽ lại canvas/HTML.
      // Xóa: xóa khối "const pctEl=..." này + span#simProgressPct trong sim_boxHtml() để gỡ riêng phần %, không ảnh hưởng gì khác.
      const pctEl=document.getElementById('simProgressPct');
      if(pctEl)pctEl.textContent=Math.round((i+1)/simState.configs.length*100)+'% ('+(i+1)+'/'+simState.configs.length+')';
      // ★ Cạn vốn → dừng hẳn, không xử lý thêm config nào nữa.
      if(simState.bankruptDay){ simState.bankruptStopped=true; simState.nextIndex=simState.configs.length; break; }
      await new Promise(r=>setTimeout(r,0));
    }
  }catch(e){ console.error('[Sim] lỗi:',e); }
  finally{
    renderBacktest=_origRenderBacktest;
    Object.assign(btState,saved);
    simState.running=false;
    renderBacktest(); renderUtility(); // vẽ 1 lần duy nhất — toàn bộ biểu đồ hoàn chỉnh
  }
}
function sim_runOrToggle(){
  if(simState.running){ simState.pauseRequested=true; return; }
  if(simState.nextIndex>0&&simState.nextIndex<simState.configs.length){ sim_run(); return; }
  simState.nextIndex=0; simState.dayMap={}; simState.series=[]; simState.bankruptDay=null; simState.bankruptStopped=false; simState.totalTrades=0;
  simState.winCount=0; simState.closedTrades=0;
  sim_run();
}
function sim_fmtUsd(v){ return '$'+Math.round(v).toLocaleString(); }
// ★ Trục ngày/vốn — Xóa: xóa khối vẽ "TRỤC NGANG (ngày)" + "TRỤC DỌC (vốn)" bên dưới trong hàm này để gỡ riêng
// phần trục, giữ nguyên line chart + mốc vốn ban đầu (không ảnh hưởng phần còn lại).
function sim_drawBase(cv,ctx,series,geom,initialCapital){
  const {padL,padR,padT,padB,xAt,yAt}=geom;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.font='22px "JetBrains Mono",monospace'; ctx.textBaseline='middle';

  // ── TRỤC DỌC (vốn) — đường line $0, mốc vốn ban đầu, mốc giá trị kết thúc ──
  const y0=yAt(0);
  ctx.beginPath(); ctx.moveTo(padL,y0); ctx.lineTo(cv.width-padR,y0);
  ctx.strokeStyle='rgba(220,38,38,.35)'; ctx.setLineDash([5,5]); ctx.lineWidth=1.2; ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='rgba(220,38,38,.85)'; ctx.textAlign='right'; ctx.fillText('$0',padL-8,y0);

  const yInit=yAt(initialCapital);
  ctx.beginPath(); ctx.moveTo(padL,yInit); ctx.lineTo(cv.width-padR,yInit);
  ctx.strokeStyle='rgba(120,120,120,.55)'; ctx.setLineDash([7,6]); ctx.lineWidth=1.5; ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='rgba(120,120,120,.95)'; ctx.textAlign='right'; ctx.fillText(sim_fmtUsd(initialCapital),padL-8,yInit);

  // ── line đổi màu theo từng đoạn — trên mốc vốn ban đầu = xanh, dưới mốc = đỏ ──
  for(let i=1;i<series.length;i++){
    const x0=xAt(i-1),y0p=yAt(series[i-1].capital);
    const x1=xAt(i),y1=yAt(series[i].capital);
    ctx.beginPath(); ctx.moveTo(x0,y0p); ctx.lineTo(x1,y1);
    ctx.strokeStyle=series[i].capital>=initialCapital?'#16a34a':'#dc2626';
    ctx.lineWidth=3; ctx.stroke();
  }

  // mốc giá trị KẾT THÚC (điểm cuối biểu đồ) — để nhìn tài sản cuối kỳ ngay lập tức
  if(series.length){
    const last=series[series.length-1];
    const yEnd=yAt(last.capital);
    const upEnd=last.capital>=initialCapital;
    ctx.beginPath(); ctx.moveTo(padL,yEnd); ctx.lineTo(cv.width-padR,yEnd);
    ctx.strokeStyle=upEnd?'rgba(22,163,74,.5)':'rgba(220,38,38,.5)'; ctx.setLineDash([3,4]); ctx.lineWidth=1.2; ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=upEnd?'#16a34a':'#dc2626'; ctx.textAlign='left'; ctx.fillText(sim_fmtUsd(last.capital),cv.width-padR+6,yEnd);
  }

  if(simState.bankruptDay){
    const idx=series.findIndex(p=>p.date===simState.bankruptDay);
    if(idx>=0){
      const x=xAt(idx);
      ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,cv.height-padB);
      ctx.strokeStyle='#dc2626'; ctx.setLineDash([12,8]); ctx.lineWidth=3; ctx.stroke(); ctx.setLineDash([]);
    }
  }

  // ── TRỤC NGANG (ngày) — ngày đầu mỗi tháng + luôn thêm ngày cuối cùng của biểu đồ ──
  // ★ Chống đè chữ: bỏ qua nhãn tháng nào cách nhãn liền trước < minGap px, và bỏ qua nhãn quá gần nhãn ngày cuối
  // (nhãn ngày cuối luôn ưu tiên hiện). Xóa: gỡ 2 dòng "if(x-lastLabelX..." + "if(xLastPos..." để về hiện đủ mọi tháng.
  ctx.textBaseline='top';
  let lastLabelX=-Infinity;
  const minGap=54*2;
  const xLastPos=series.length?xAt(series.length-1):null;
  // ★ đo đúng bề rộng thật của nhãn ngày cuối (DD/MM/YY, dài hơn MM/YY) để chừa đủ chỗ, không dùng chung minGap ngắn
  let endExclude=minGap;
  if(series.length){
    const pLastMeasure=series[series.length-1];
    ctx.font='22px "JetBrains Mono",monospace';
    endExclude=ctx.measureText(pLastMeasure.date.slice(8,10)+'/'+pLastMeasure.date.slice(5,7)+'/'+pLastMeasure.date.slice(2,4)).width+20*2;
  }
  series.forEach((p,i)=>{
    if(p.date.slice(8,10)==='01'){
      const x=xAt(i);
      if(x-lastLabelX<minGap)return;
      if(xLastPos!=null&&xLastPos-x<endExclude)return;
      ctx.beginPath(); ctx.moveTo(x,cv.height-padB); ctx.lineTo(x,cv.height-padB+6);
      ctx.strokeStyle='rgba(120,120,120,.5)'; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle='#888780'; ctx.textAlign='center';
      ctx.fillText(p.date.slice(5,7)+'/'+p.date.slice(2,4),x,cv.height-padB+8); // ★ rút gọn MM/YY
      lastLabelX=x;
    }
  });
  if(series.length){
    const iLast=series.length-1, xLast=xAt(iLast), pLast=series[iLast];
    ctx.beginPath(); ctx.moveTo(xLast,cv.height-padB); ctx.lineTo(xLast,cv.height-padB+6);
    ctx.strokeStyle='rgba(22,163,74,.6)'; ctx.lineWidth=1.4; ctx.stroke();
    ctx.fillStyle='#16a34a'; ctx.textAlign='right';
    ctx.fillText(pLast.date.slice(8,10)+'/'+pLast.date.slice(5,7)+'/'+pLast.date.slice(2,4),cv.width-padR,cv.height-padB+8); // ★ rút gọn DD/MM/YY
  }
}
function sim_hoverInfoHtml(p,prev){
  const delta=prev?p.capital-prev.capital:0;
  const deltaC=delta>0?'var(--grn)':delta<0?'var(--red)':'var(--dim)';
  return `<b>${esc(p.date)}</b> · Vốn: <b>$${Math.round(p.capital).toLocaleString()}</b> · Ngày này: <span style="color:${deltaC}">${delta>=0?'+':''}$${Math.round(delta).toLocaleString()}</span>`;
}
// ★ geom tính LUÔN theo series đầy đủ (full) — dùng chung cho vẽ tĩnh + animation, để trục X/Y không bị đổi tỉ lệ
// giữa các khung hình khi đang chạy động (sim_playAnimation chỉ vẽ dần 1 phần điểm nhưng theo đúng geom cố định này).
function sim_computeGeom(cv,fullSeries){
  const vals=fullSeries.map(p=>p.capital);
  const minV=Math.min(0,...vals), maxV=Math.max(...vals);
  const padL=78*2, padR=92*2, padT=16*2, padB=34*2; // ★ padR đủ rộng để không cắt số $ mốc kết thúc (VD "$4,050") — đây là nguyên nhân số bị cắt trước đó
  return {
    padL,padR,padT,padB,
    xAt:i=>padL+i*(cv.width-padL-padR)/Math.max(1,fullSeries.length-1),
    yAt:v=>cv.height-padB-(v-minV)/((maxV-minV)||1)*(cv.height-padT-padB),
  };
}
let sim_animTimer=null;
// ★ Animation "chạy theo ngày" — mô phỏng cảm giác backtest chạy thật theo thời gian. Xóa: xóa biến sim_animTimer +
// hàm sim_playAnimation + nút "Xem lại theo ngày" trong sim_boxHtml() để gỡ riêng phần này, không ảnh hưởng chart tĩnh.
function sim_playAnimation(){
  const cv=document.getElementById('simCanvas'); if(!cv)return;
  const ctx=cv.getContext('2d');
  const series=simState.series; if(!series.length)return;
  if(sim_animTimer){clearInterval(sim_animTimer);sim_animTimer=null;}
  const geom=sim_computeGeom(cv,series);
  const hoverEl=document.getElementById('simHoverInfo');
  let i=0;
  const initCap=simState.capital||10000;
  sim_animTimer=setInterval(()=>{
    sim_drawBase(cv,ctx,series.slice(0,i+1),geom,initCap);
    if(hoverEl)hoverEl.innerHTML=sim_hoverInfoHtml(series[i],series[i-1]);
    i++;
    if(i>=series.length){clearInterval(sim_animTimer);sim_animTimer=null;}
  },35);
}
function sim_drawChart(){
  const cv=document.getElementById('simCanvas'); if(!cv)return;
  const ctx=cv.getContext('2d');
  const cw=cv.clientWidth||600, ch=230;
  cv.width=cw*2; cv.height=ch*2;
  const series=simState.series;
  const hoverEl=document.getElementById('simHoverInfo');
  if(!series.length){ ctx.clearRect(0,0,cv.width,cv.height); return; }
  const geom=sim_computeGeom(cv,series);
  const {padL,padR,padT,padB}=geom;
  const initCap=simState.capital||10000;
  sim_drawBase(cv,ctx,series,geom,initCap);
  // ★ Hover — mỗi điểm = 1 ngày (nến 1d). Xóa: xóa hàm sim_drawBase/sim_hoverInfoHtml + khối mousemove/mouseleave này +
  // #simHoverInfo trong sim_boxHtml() để gỡ riêng phần hover, không ảnh hưởng phần vẽ chart cơ bản.
  cv.onmousemove=(e)=>{
    const rect=cv.getBoundingClientRect();
    const scaleX=cv.width/rect.width;
    const mx=(e.clientX-rect.left)*scaleX;
    const step=(cv.width-padL-padR)/Math.max(1,series.length-1);
    let idx=Math.round((mx-padL)/step);
    idx=Math.max(0,Math.min(series.length-1,idx));
    const p=series[idx], prev=series[idx-1];
    sim_drawBase(cv,ctx,series,geom,initCap);
    const x=geom.xAt(idx), y=geom.yAt(p.capital);
    ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2); ctx.fillStyle=p.capital>=initCap?'#16a34a':'#dc2626'; ctx.fill();
    ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,cv.height-padB);
    ctx.strokeStyle='rgba(120,120,120,.35)'; ctx.lineWidth=1.5; ctx.stroke();
    if(hoverEl)hoverEl.innerHTML=sim_hoverInfoHtml(p,prev);
  };
  cv.onmouseleave=()=>{
    sim_drawBase(cv,ctx,series,geom,initCap);
    if(hoverEl)hoverEl.innerHTML='Di chuột vào biểu đồ để xem chi tiết từng ngày';
  };
}

  // wfo_run() + trả wfo_lastWinnerHtml()/wfo_exportLastConfig() về dùng "segments[segments.length-1]" như cũ.
  finalConfig:null,
  mc:{running:false, ddList:[], p95:null, histogram:[]},
  // ★ Ẩn/hiện tóm tắt từng phần cấu hình sau khi chọn xong — mặc định mở (false=đang mở đầy đủ). Xóa: xóa field
  // "collapsed" này + nút "▼/▲" quanh mỗi phần 1a/1b/1c/1d trong wfo_boxHtml() để gỡ, về hiện luôn đầy đủ như cũ.
  collapsed:{span:false, entry:false, filterTrade:false, filterTrend:false},
  // ★ Bấm icon (i) ở mỗi thẻ ổn định → xổ POPUP giải nghĩa chi tiết (giống popup Vùng cao nguyên), không phải
  // dòng text ngắn dưới thẻ nữa. Chỉ 1 popup mở tại 1 thời điểm (lưu key 'a'/'b'/'c'/'d' hoặc null). Xóa: xóa
  // field "showFormulaKey" này + hàm wfo_formulaInfoModalHtml() + dòng "${s.showFormulaKey?...}" cuối wfo_boxHtml()
  // + đổi onclick icon (i) về "wfoState.showFormula['${m.k}']=!..." kiểu cũ để gỡ, quay về text ngắn dưới thẻ.
  showFormulaKey:null,
  // ★ Danh sách config đã chọn từng đoạn (mục 3) — mặc định ẩn, bấm mới xổ ra bảng chi tiết. Xóa: xóa field này +
  // khối "danh sách N đoạn..." trong wfo_boxHtml() để gỡ riêng, không ảnh hưởng 4 công thức/Monte Carlo.
  showSegList:false,
  ...Object.fromEntries([
    ...ENTRY_BOXES.map(eb=>[eb.key,{...eb.defaultState}]),
    ...INDICATOR_BOXES.map(b=>[b.key,{...b.defaultState, tfs:[...b.defaultState.tfs]}]),
  ]),
};

// ─── công thức tham khảo, đúng nội dung đã chốt trong wfo-stability-formulas.md ───
const WFO_FORMULAS={
  a:'positiveRatio = (số đoạn OOS có kết quả dương) / N   ·   ngưỡng ≥ 0.6',
  b:'totalWithoutBest = tổng kết quả tất cả đoạn − kết quả đoạn tốt nhất   ·   ngưỡng > 0',
  c:'WFE = trung bình %lãi các đoạn OOS / trung bình %lãi các đoạn IS   ·   ngưỡng ≥ 0.5',
  d:'paramCV = stdev(TP%,SL% qua các đoạn)/mean(...) < 0.4   ·   modeRatio(period,dir) ≥ 0.5',
};

function wfo_toggleBox(box){ wfoState[box].on=!wfoState[box].on; renderUtility(); }
function wfo_toggleBoxTf(box,tf){
  const b=wfoState[box];
  const i=b.tfs.indexOf(tf);
  if(i>=0) b.tfs=b.tfs.filter(t=>t!==tf);
  else b.tfs=[...b.tfs,tf];
  renderUtility();
}

// ─── cắt Span thành N đoạn IS/OOS theo NGÀY (thuần phép tính mốc thời gian, không tốn mạng) ───
// Dùng lại parseDate(str,end) toàn cục có sẵn (đang dùng cho optState.start/end, Backtest Detail...) để parse
// DD/MM/YYYY — không viết lại logic parse ngày tháng mới, đúng nguyên tắc box độc lập chỉ orchestrate.
function wfo_dmy(ms){ const d=new Date(ms); return pad(d.getUTCDate())+'/'+pad(d.getUTCMonth()+1)+'/'+d.getUTCFullYear(); }

// ─── Chọn winner sau IS — modul con độc lập, chỉ đọc lại optState.results (không sửa runOptimizer()) ───
// wfo_netPnl: đúng công thức 'netpnl' sẵn có của Optimizer (b.pnl-b.trades*feeRate), dùng lại không viết công thức phí mới.
function wfo_netPnl(r){ return r.pnl-r.trades*feeRate; }
// wfo_plateauScore: điểm "vùng cao nguyên" của 1 ứng viên — trung bình netPnl của chính nó + các dòng LÂN CẬN
// (cùng period/dir/entrySignal/entryTf/tổ hợp filter TF, TP/SL lệch đúng 1 bậc liền kề trong lưới OPT_TP/OPT_SL).
function wfo_plateauScore(results,candidate){
  const tpIdx=OPT_TP.indexOf(candidate.tp), slIdx=OPT_SL.indexOf(candidate.sl);
  const sameCat=r=>r.period===candidate.period&&r.dir===candidate.dir&&r.entrySignal===candidate.entrySignal
    &&r.entryTf===candidate.entryTf&&INDICATOR_BOXES.every(b=>r[b.key+'Tf']===candidate[b.key+'Tf']);
  let sum=0,count=0;
  for(const r of results){
    if(!sameCat(r))continue;
    const rTpIdx=OPT_TP.indexOf(r.tp), rSlIdx=OPT_SL.indexOf(r.sl);
    if(Math.abs(rTpIdx-tpIdx)<=1&&Math.abs(rSlIdx-slIdx)<=1){ sum+=wfo_netPnl(r); count++; }
  }
  return count?sum/count:wfo_netPnl(candidate);
}
// wfo_pickWinner: 'plateau' = lọc top 30% theo netPnl trước (tránh chọn nhầm vùng phẳng toàn lỗ), rồi trong nhóm
// đó chọn điểm cao nguyên cao nhất. 'top1' = quay lại đúng hành vi cũ (dòng #1 netPnl). Trả kèm rawRank/rawTotal
// để UI hiện rõ winner đứng thứ mấy trong bảng xếp hạng netPnl gốc — không phải hộp đen.
function wfo_pickWinner(results){
  if(!results.length)return null;
  const sorted=[...results].sort((a,b)=>wfo_netPnl(b)-wfo_netPnl(a));
  if(wfoState.selectMethod!=='plateau'){
    return {winner:sorted[0], rawRank:1, rawTotal:sorted.length, plateauScore:wfo_netPnl(sorted[0]), rawScore:wfo_netPnl(sorted[0])};
  }
  const topK=Math.max(1,Math.ceil(sorted.length*0.3));
  const pool=sorted.slice(0,topK);
  let best=null,bestScore=-Infinity;
  for(const cand of pool){
    const score=wfo_plateauScore(sorted,cand);
    if(score>bestScore){bestScore=score;best=cand;}
  }
  return {winner:best, rawRank:sorted.indexOf(best)+1, rawTotal:sorted.length, plateauScore:bestScore, rawScore:wfo_netPnl(best)};
}

// ★ Trần thời gian thật — hết ngày hôm qua (UTC), vì hôm nay chưa trôi qua hết nên nến chưa đóng đầy đủ. Dùng
// chung cho cả wfo_buildSegments() (chặn không cho đoạn OOS nào vượt quá thời gian thật, KỂ CẢ khi người dùng lỡ
// nhập "Đến" vào tương lai) lẫn wfo_findDeploySegment() (tìm đúng đoạn IS kế tiếp đã đóng đủ ngày để deploy).
function wfo_liveCapMs(){
  const n=new Date();
  return Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate())-1;
}
function wfo_buildSegments(){
  const DAY=86400000;
  const spMs=parseDate(wfoState.spanStart,false);
  if(spMs==null)return [];
  const liveCapMs=wfo_liveCapMs();
  const userEndMs=wfoState.spanEnd?parseDate(wfoState.spanEnd,true):liveCapMs;
  if(userEndMs==null)return [];
  // ★ Luôn lấy min(Đến người dùng nhập, thời gian thật hôm qua) — không cho phép sinh đoạn OOS nào rơi vào
  // tương lai dù người dùng nhập "Đến" xa hơn hiện tại. Xóa: đổi "Math.min(userEndMs,liveCapMs)" thành
  // "userEndMs" để quay về tin hoàn toàn giá trị nhập tay, không tự cắt theo thời gian thực, để gỡ.
  const endMs=Math.min(userEndMs,liveCapMs);
  // ★ Bước trượt = OOS cố định (ô nhập riêng đã ẩn khỏi UI để tránh nhầm) — đảm bảo chuỗi OOS liền mạch, không
  // chồng lấn không bỏ sót ngày nào, đúng chuẩn walk-forward gốc. Xóa: đổi "STEP=OOS" thành dòng cũ
  // "Math.max(1,(wfoState.stepDays||OOS)|0)" + thêm lại ô input "Bước trượt" trong 1a để gỡ, cho chọn tay lại.
  const IS=Math.max(1,wfoState.isDays|0), OOS=Math.max(1,wfoState.oosDays|0), STEP=OOS;
  const segs=[];
  let k=0;
  while(k<3000){ // safety cap — bước ngày có thể sinh nhiều đoạn hơn bước tháng nên nới cap so với trước (500)
    const isStart=spMs+k*STEP*DAY;
    const isEnd=isStart+IS*DAY-1;
    const oosStart=isEnd+1;
    const oosEnd=oosStart+OOS*DAY-1;
    if(oosEnd>endMs)break;
    segs.push({isStart, isEnd, oosStart, oosEnd});
    k++;
  }
  return segs;
}
// ★ Tìm đoạn IS để DEPLOY — chính là đoạn kế tiếp NGAY SAU đoạn lịch sử cuối cùng, trên đúng cùng lưới bước
// nhảy OOS (không phải 1 cửa sổ tùy tiện "N ngày gần nhất"). Chỉ hợp lệ nếu IS của đoạn đó đã đóng đủ ngày
// (isEnd <= hôm qua) — OOS của đoạn này chính là tương lai thật nên không chạy, cũng không cần chạy.
function wfo_findDeploySegment(segs){
  const DAY=86400000;
  const spMs=parseDate(wfoState.spanStart,false);
  if(spMs==null)return null;
  const liveCapMs=wfo_liveCapMs();
  const IS=Math.max(1,wfoState.isDays|0), OOS=Math.max(1,wfoState.oosDays|0), STEP=OOS;
  const k=segs.length; // đoạn ngay sau đoạn lịch sử cuối cùng trên cùng lưới
  const isStart=spMs+k*STEP*DAY;
  const isEnd=isStart+IS*DAY-1;
  if(isEnd>liveCapMs)return null; // IS của đoạn kế tiếp cũng chưa đóng đủ ngày — chưa đủ dữ liệu để deploy
  return {isStart,isEnd};
}

// ─── vòng lặp chính — orchestrate runOptimizer()/runBacktest(), không viết lại thuật toán ───
async function wfo_run(){
  if(wfoState.running)return;
  const segs=wfo_buildSegments();
  if(!segs.length){alert('Span/IS/OOS không hợp lệ hoặc quá ngắn (kiểm tra định dạng DD/MM/YYYY)');return;}
  wfoState.running=true; wfoState.segIndex=0; wfoState.segTotal=segs.length;
  wfoState.segments=[]; wfoState.mergedTrades=[]; wfoState.stability=null; wfoState.finalConfig=null;
  wfoState.mc={running:false,ddList:[],p95:null,histogram:[]};
  const savedOpt=JSON.parse(JSON.stringify(optState));
  const savedBt=JSON.parse(JSON.stringify(btState));
  renderUtility();
  try{
    for(let i=0;i<segs.length;i++){
      const seg=segs[i];
      wfoState.statusMsg=`Optimize IS (${wfo_dmy(seg.isStart)} → ${wfo_dmy(seg.isEnd)})`;
      wfo_updateProgressDom(i,segs.length,wfoState.statusMsg);
      optState.coin=wfoState.coin;
      optState.start=wfo_dmy(seg.isStart); optState.end=wfo_dmy(seg.isEnd);
      optState.minTrades=wfoState.minTrades; optState.minWR=wfoState.minWR;
      optState.minPnl=0; optState.minTp=0; optState.minSl=0; optState.minNetPnl=wfoState.minNetPnl||0;
      // ★ Sort theo 'netpnl' (đã có sẵn trong Optimizer, đúng công thức b.pnl-b.trades*feeRate — không viết thêm logic
      // tính fee mới) để bước CHỌN winner mỗi đoạn khớp với bước ĐÁNH GIÁ 4 công thức ổn định (đều dùng net pnl sau
      // phí). Xóa: đổi lại thành 'pnl' để quay về sort theo pnl thô như trước, không ảnh hưởng gì khác.
      optState.consecLossOn=false; optState.maxOrders=wfoState.maxOrders; optState.sortBy='netpnl';
      optState.slopeOn=wfoState.slopeOn; optState.slopeK=wfoState.slopeK;
      ENTRY_BOXES.forEach(eb=>{ optState[eb.key].on=wfoState[eb.key].on; optState[eb.key].tf=wfoState[eb.key].tf; });
      INDICATOR_BOXES.forEach(b=>{ optState[b.key].on=wfoState[b.key].on; optState[b.key].tfs=[...wfoState[b.key].tfs]; });
      await runOptimizer();
      if(!optState.results.length){
        wfoState.segments.push({seg,winner:null,isPct:null,oosPct:null,trades:0});
        wfoState.segIndex=i+1;
        continue; // đoạn này không có tổ hợp nào thỏa minTrades/minWR — bỏ qua, đi tiếp đoạn sau
      }
      const pick=wfo_pickWinner(optState.results);
      const w=pick.winner;
      const cfg={coin:wfoState.coin,tp:w.tp,sl:w.sl,dir:w.dir,entrySignal:w.entrySignal,entryTf:w.entryTf,level:w.level,period:w.period,maxOrders:wfoState.maxOrders};
      INDICATOR_BOXES.forEach(b=>{ const v=w[b.key+'Tf']; if(v&&v!=='none')cfg[b.key]=v; });
      wfoState.statusMsg=`Test OOS mù (${wfo_dmy(seg.oosStart)} → ${wfo_dmy(seg.oosEnd)})`;
      wfo_updateProgressDom(i,segs.length,wfoState.statusMsg);
      btState.mode='load'; btState.configs=[{...cfg,_checked:true}];
      btState.ovSizeUsd=wfoState.sizeUsd||''; btState.ovLeverage=wfoState.leverage||'';
      btState.ovStart=wfo_dmy(seg.oosStart); btState.ovEnd=wfo_dmy(seg.oosEnd);
      btState.mergePositionOn=false;
      btState.slopeOn=wfoState.slopeOn; btState.slopeK=wfoState.slopeK;
      const _origRB=renderBacktest; renderBacktest=function(){};
      try{ await runBacktest(); } finally{ renderBacktest=_origRB; }
      const oosTrades=btState.results.filter(t=>t.result!=='OPEN');
      // ★ Trừ phí 2 chiều (feeRate, mặc định 0.1%/lệnh) trước khi đưa vào 4 công thức ổn định — khớp đúng cách
      // Optimizer/Backtest Detail tự tính "Net PnL%" ở nơi khác (r.pnl-r.trades*feeRate). Xóa: đổi "isPctNet"/"oosPctNet"
      // lại thành "w.pnl"/"oosPnlRaw" (bỏ "-...*feeRate") ở 2 dòng ngay dưới để quay về pnl thô như trước, không ảnh hưởng gì khác.
      const oosPnlRaw=oosTrades.reduce((s,t)=>s+(t.pnl||0),0);
      const oosPctNet=oosPnlRaw-oosTrades.length*feeRate;
      const isPctNet=w.pnl-w.trades*feeRate;
      wfoState.mergedTrades.push(...oosTrades.map(t=>({netUsdt:t.netUsdt||0, exitTs:t.exitTs})));
      wfoState.segments.push({seg,winner:w,isPct:isPctNet,oosPct:oosPctNet,trades:oosTrades.length,rawRank:pick.rawRank,rawTotal:pick.rawTotal});
      wfoState.segIndex=i+1;
      wfo_updateProgressDom(i+1,segs.length,wfoState.statusMsg);
      await new Promise(r=>setTimeout(r,0));
    }
    wfo_computeStability();
    // ★ Optimize thêm 1 lần trên đúng đoạn IS KẾ TIẾP trên cùng lưới bước nhảy OOS (không phải 1 cửa sổ tùy
    // tiện "N ngày gần nhất") — do wfo_findDeploySegment() xác định, chỉ hợp lệ khi IS đó đã đóng đủ ngày.
    // KHÔNG chạy OOS vì OOS của đoạn này chính là tương lai thật, chưa xảy ra. Đây mới là config đem trade thật,
    // tách biệt khỏi N đoạn IS+OOS lịch sử ở trên (những đoạn đó chỉ để đo 4 công thức ổn định + Monte Carlo).
    const deploySeg=wfo_findDeploySegment(segs);
    if(deploySeg){
      wfoState.statusMsg=`Optimize IS deploy (${wfo_dmy(deploySeg.isStart)} → ${wfo_dmy(deploySeg.isEnd)})`;
      wfo_updateProgressDom(segs.length,segs.length+1,wfoState.statusMsg);
      optState.coin=wfoState.coin;
      optState.start=wfo_dmy(deploySeg.isStart); optState.end=wfo_dmy(deploySeg.isEnd);
      optState.minTrades=wfoState.minTrades; optState.minWR=wfoState.minWR;
      optState.minPnl=0; optState.minTp=0; optState.minSl=0; optState.minNetPnl=wfoState.minNetPnl||0;
      optState.consecLossOn=false; optState.maxOrders=wfoState.maxOrders; optState.sortBy='netpnl';
      optState.slopeOn=wfoState.slopeOn; optState.slopeK=wfoState.slopeK;
      ENTRY_BOXES.forEach(eb=>{ optState[eb.key].on=wfoState[eb.key].on; optState[eb.key].tf=wfoState[eb.key].tf; });
      INDICATOR_BOXES.forEach(b=>{ optState[b.key].on=wfoState[b.key].on; optState[b.key].tfs=[...wfoState[b.key].tfs]; });
      await runOptimizer();
      if(optState.results.length){
        const finalPick=wfo_pickWinner(optState.results);
        wfoState.finalConfig={seg:deploySeg, winner:finalPick.winner, rawRank:finalPick.rawRank, rawTotal:finalPick.rawTotal};
      }else{
        wfoState.finalConfig=null;
      }
    }else{
      // ★ IS của đoạn kế tiếp cũng chưa đóng đủ ngày (Span/IS/OOS chưa đủ dữ liệu tới sát hiện tại) — không có
      // config deploy, mục 5 sẽ hiện rõ lý do thay vì hiện config sai.
      wfoState.finalConfig=null;
    }
    wfo_updateProgressDom(segs.length+1,segs.length+1,'Hoàn tất');
  }catch(e){ console.error('[WFO]',e); wfoState.statusMsg='❌ Lỗi: '+e.message; }
  finally{
    Object.assign(optState,savedOpt);
    Object.assign(btState,savedBt);
    wfoState.running=false;
    renderUtility();
  }
}
function wfo_updateProgressDom(done,total,msg){
  const pctEl=document.getElementById('wfoProgressPct');
  if(pctEl)pctEl.textContent=Math.round(done/total*100)+'% ('+done+'/'+total+')';
  const msgEl=document.getElementById('wfoProgressMsg');
  if(msgEl)msgEl.textContent=msg;
}

// ─── 4 công thức ổn định (đúng nội dung wfo-stability-formulas.md) — modul con, đổi công thức chỉ sửa hàm này ───
function wfo_computeStability(){
  const done=wfoState.segments.filter(s=>s.winner);
  const N=done.length;
  if(!N){wfoState.stability=null;return;}
  const oosArr=done.map(s=>s.oosPct), isArr=done.map(s=>s.isPct);
  const positiveRatio=oosArr.filter(v=>v>0).length/N;
  const total=oosArr.reduce((a,b)=>a+b,0);
  const best=Math.max(...oosArr);
  const totalWithoutBest=total-best;
  const meanIs=isArr.reduce((a,b)=>a+b,0)/N;
  const meanOos=total/N;
  const wfe=meanIs!==0?meanOos/meanIs:0;
  function cv(arr){
    const m=arr.reduce((a,b)=>a+b,0)/arr.length;
    if(!m)return 0;
    const variance=arr.reduce((a,b)=>a+(b-m)*(b-m),0)/arr.length;
    return Math.sqrt(variance)/Math.abs(m);
  }
  function modeRatio(arr){
    const cnt={};
    arr.forEach(v=>cnt[v]=(cnt[v]||0)+1);
    return Math.max(...Object.values(cnt))/arr.length;
  }
  const paramCV={tp:cv(done.map(s=>s.winner.tp)), sl:cv(done.map(s=>s.winner.sl))};
  const periodMode=modeRatio(done.map(s=>s.winner.period));
  const passA=positiveRatio>=0.6, passB=totalWithoutBest>0, passC=wfe>=0.5;
  const passD=paramCV.tp<0.4&&paramCV.sl<0.4&&periodMode>=0.5;
  // ★ Tổng Net PnL% OOS — chỉ mang tính THAM KHẢO tổng quan (không tính vào "đạt mấy/4"), vì tổng số dễ bị 1 đoạn
  // ăn may kéo lên (đã có "Bỏ đoạn tốt nhất" xử lý việc đó). Xóa: xóa field "totalOosPct" này + card 'e' trong
  // wfo_boxHtml() + key 'e' trong DETAIL của wfo_formulaInfoModalHtml() để gỡ, không ảnh hưởng 4 công thức A-D.
  wfoState.stability={N,positiveRatio,totalWithoutBest,wfe,paramCV,periodMode,totalOosPct:total,passA,passB,passC,passD,passAll:passA&&passB&&passC&&passD};
}

// ─── Monte Carlo trên chuỗi OOS đã ghép — modul con riêng, không đụng vòng lặp WFO ở trên ───
// Xóa: xóa hàm wfo_runMonteCarlo này + field "mc" trong wfoState + khối "4. Monte Carlo" trong wfo_boxHtml()
// để gỡ riêng phần Monte Carlo, WFO Runner vẫn chạy bình thường không ảnh hưởng gì.
function wfo_runMonteCarlo(){
  const trades=wfoState.mergedTrades;
  if(!trades.length){alert('Chưa có trades OOS để chạy Monte Carlo — chạy WFO trước.');return;}
  wfoState.mc.running=true; renderUtility();
  setTimeout(()=>{
    const N=10000, base=trades.map(t=>t.netUsdt), ddList=[];
    for(let i=0;i<N;i++){
      const arr=base.slice();
      for(let j=arr.length-1;j>0;j--){ const k=Math.floor(Math.random()*(j+1)); [arr[j],arr[k]]=[arr[k],arr[j]]; }
      let cap=0,peak=0,maxDdAbs=0;
      for(const v of arr){ cap+=v; if(cap>peak)peak=cap; const dd=cap-peak; if(dd<maxDdAbs)maxDdAbs=dd; }
      ddList.push(Math.abs(maxDdAbs));
    }
    ddList.sort((a,b)=>a-b);
    const p95=ddList[Math.floor(ddList.length*0.95)]||0;
    const maxV=ddList[ddList.length-1]||1;
    const bins=new Array(8).fill(0);
    ddList.forEach(v=>{ let idx=Math.floor(v/maxV*8); if(idx>=8)idx=7; bins[idx]++; });
    wfoState.mc={running:false,ddList,p95,histogram:bins};
    renderUtility();
  },10);
}

  const w=fc.winner;
  const cfg={coin:wfoState.coin,tp:w.tp,sl:w.sl,dir:w.dir,entrySignal:w.entrySignal,entryTf:w.entryTf,level:w.level,period:w.period,maxOrders:wfoState.maxOrders};

function wfo_summaryFilter(group){
  const parts=INDICATOR_BOXES.filter(b=>b.group===group&&wfoState[b.key].on&&wfoState[b.key].tfs.length)

  return parts.length?parts.join(' · '):'Không bật filter nào';
}
