<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>RSI/MFI · MACD/CMF Backtester — Binance Multi-TF v12</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#ffffff;--bg1:#f8f9fb;--bg2:#f0f2f5;--bg3:#e8eaed;
  --b1:#e0e3e8;--b2:#c8cdd6;--b3:#a8b0bc;
  --txt:#374151;--dim:#6b7280;--hi:#111827;
  --grn:#16a34a;--red:#dc2626;--ora:#d97706;
  --acc:#4f46e5;--cyn:#0891b2;
  --grn-bg:#dcfce7;--red-bg:#fee2e2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{min-height:100%;}
body{
  background:var(--bg0);color:var(--txt);
  font-family:'Outfit',sans-serif;font-size:14px;
  padding:env(safe-area-inset-top,16px) 16px 60px;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(var(--b1) 1px,transparent 1px),
    linear-gradient(90deg,var(--b1) 1px,transparent 1px);
  background-size:40px 40px;opacity:.5;
}
#app{position:relative;z-index:1;max-width:960px;margin:0 auto;}
.hdr{display:flex;align-items:center;gap:12px;padding:20px 0 22px;}
.hdr-stripe{width:4px;height:40px;border-radius:4px;flex-shrink:0;background:linear-gradient(180deg,var(--acc) 0%,var(--cyn) 100%);box-shadow:0 0 12px rgba(79,70,229,.3);}
.hdr-title{font-size:20px;font-weight:900;color:var(--hi);letter-spacing:-.5px;}
.hdr-sub{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}
.add-btn{margin-left:auto;background:transparent;border:1px solid var(--b2);border-radius:8px;color:var(--acc);padding:8px 14px;cursor:pointer;font:700 12px/1 'Outfit',sans-serif;letter-spacing:.5px;transition:all .15s;}
.add-btn:hover{background:var(--bg2);border-color:var(--acc);}
.card{background:var(--bg1);border:1px solid var(--b1);border-radius:16px;padding:16px;margin-bottom:14px;}
.sess-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.sess-tab{background:var(--bg1);border:1px solid var(--b1);border-radius:10px;padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .15s;}
.sess-tab.on{background:rgba(79,70,229,.08);border-color:var(--acc);}
.tab-lbl{font-size:13px;font-weight:700;color:var(--dim);}
.sess-tab.on .tab-lbl{color:var(--hi);}
.dir-pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.5px;}
.dp-buy{background:var(--grn-bg);color:var(--grn);}
.dp-sell{background:var(--red-bg);color:#b91c1c;}
.tab-x{color:var(--b2);font-size:15px;cursor:pointer;transition:color .1s;}
.tab-x:hover{color:var(--red);}
.flbl{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
input[type=text],input[type=number]{width:100%;background:var(--bg0);border:1.5px solid var(--b2);border-radius:9px;color:var(--hi);padding:10px 12px;font-size:13px;outline:none;font-family:'JetBrains Mono',monospace;transition:border-color .15s;-webkit-appearance:none;}
input:focus{border-color:var(--acc);}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button{display:none;}
.dir-row{display:flex;gap:8px;margin-bottom:14px;}
.dir-opt{flex:1;padding:10px 8px;border-radius:9px;cursor:pointer;font:700 12px/1 'Outfit',sans-serif;transition:all .15s;border:1.5px solid var(--b2);background:var(--bg0);color:var(--dim);}
.dir-opt.buy.on{background:var(--grn-bg);border-color:var(--grn);color:var(--grn);}
.dir-opt.sell.on{background:var(--red-bg);border-color:#dc2626;color:#b91c1c;}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.chip{background:var(--bg2);border:1px solid var(--b1);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--txt);}
.chip-v{font-family:'JetBrains Mono',monospace;font-weight:700;}
.rsi-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.rsi-label-wrap{flex:1;}
.rsi-input-wrap{display:flex;align-items:center;gap:6px;}
.rsi-input-wrap input{width:72px;text-align:center;}
.rsi-hint{font-size:11px;color:var(--dim);}
.run-btn{width:100%;padding:13px;border-radius:11px;border:none;font:900 14px/1 'Outfit',sans-serif;letter-spacing:1px;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--cyn));color:#fff;transition:all .2s;box-shadow:0 4px 20px rgba(79,70,229,.2);}
.run-btn:disabled{background:var(--bg3);color:var(--dim);cursor:not-allowed;box-shadow:none;}
.run-btn:not(:disabled):active{transform:scale(.98);}
.status-box{background:var(--bg2);border:1px solid var(--b1);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--acc);display:flex;align-items:center;gap:8px;}
.err-box{background:var(--red-bg);border:1px solid var(--red);border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--red);}
.coin-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.coin-tab{background:var(--bg1);border:1px solid var(--b1);border-radius:10px;padding:9px 14px;cursor:pointer;transition:all .15s;}
.coin-tab.on{background:rgba(79,70,229,.08);border-color:var(--acc);}
.c-name{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:var(--dim);}
.coin-tab.on .c-name{color:var(--hi);}
.c-wr{font-size:11px;margin-left:5px;}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.sc{background:var(--bg0);border:1px solid var(--b1);border-radius:11px;padding:11px 13px;min-width:80px;}
.sc-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.sc-val{font-size:21px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--hi);}
.wbar-wrap{background:var(--bg2);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.wbar-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:8px;}
.wbar{display:flex;height:22px;border-radius:6px;overflow:hidden;}
.ws{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}
.ws-w{background:linear-gradient(90deg,#16a34a,#15803d);}
.ws-l{background:linear-gradient(90deg,#b91c1c,#dc2626);}
.tbl-wrap{background:var(--bg1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:18px;}
.tbl-hdr{padding:11px 15px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
.tbl-title{font-size:11px;color:var(--acc);font-weight:700;letter-spacing:1px;}
.tbl-cnt{font-size:11px;color:var(--dim);}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.opt-vtbl{max-height:520px;overflow:auto;-webkit-overflow-scrolling:touch;}
.opt-vtbl thead th{position:sticky;top:0;z-index:2;background:var(--bg2);box-shadow:0 1px 0 var(--b1);}
table{width:100%;border-collapse:collapse;}
th{padding:5px 5px;text-align:left;color:var(--dim);font-size:10px;font-weight:600;border-bottom:1px solid var(--b1);background:var(--bg2);white-space:nowrap;}
.tbl-frozen{max-height:560px;overflow-y:auto;}
.tbl-frozen thead th{position:sticky;top:0;z-index:3;box-shadow:0 1px 0 var(--b1);}
.tbl-frozen th,.tbl-frozen td{padding:3px 4px;font-size:9px;}
@media(min-width:1000px){.tbl-wide{position:relative;width:94vw;max-width:1500px;left:50%;transform:translateX(-50%);}}
td{padding:4px 5px;border-bottom:1px solid #e5e7eb;font-family:'JetBrains Mono',monospace;font-size:10px;white-space:nowrap;color:var(--txt);}
tr:last-child td{border-bottom:none;}
tr:nth-child(even) td{background:rgba(243,244,246,.8);}
.badge{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:1px;border-width:1px;border-style:solid;display:inline-block;}
.bw{background:var(--grn-bg);color:var(--grn);border-color:var(--grn);}
.bl{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.bo{background:#f3f4f6;color:#6b7280;border-color:#d1d5db;}
.more-btn{width:100%;padding:11px;border:none;background:none;cursor:pointer;color:var(--acc);font:700 11px/1 'Outfit',sans-serif;letter-spacing:1px;border-top:1px solid var(--b1);transition:background .15s;}
.more-btn:hover{background:var(--bg2);}
.sum-wrap{background:var(--bg1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:18px;}
.sum-title{padding:11px 15px;font-size:11px;color:var(--acc);font-weight:700;letter-spacing:1px;border-bottom:1px solid var(--b1);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1.5px solid var(--b2);border-radius:10px;padding:11px 14px;margin-bottom:14px;cursor:pointer;transition:border-color .15s;}
.toggle-row.on{border-color:var(--acc);}
.toggle-info{flex:1;}
.toggle-title{font-size:13px;font-weight:700;color:var(--txt);}
.toggle-desc{font-size:11px;color:var(--dim);margin-top:3px;}
.toggle-sw{width:42px;height:24px;border-radius:12px;background:var(--b2);position:relative;flex-shrink:0;transition:background .2s;}
.toggle-sw.on{background:var(--acc);}
.toggle-sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle-sw.on::after{transform:translateX(18px);}
.footer{text-align:center;font-size:10px;color:#9ca3af;margin-top:16px;}
.opt-card{background:linear-gradient(135deg,rgba(79,70,229,.04),rgba(8,145,178,.03));border:1px solid var(--acc);border-radius:16px;padding:16px;margin-bottom:14px;}
.opt-title{font-size:13px;font-weight:900;color:var(--acc);letter-spacing:1px;margin-bottom:4px;}
.opt-sub{font-size:11px;color:var(--dim);margin-bottom:14px;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
/* BOX ĐỘC LẬP — grid cho khối "NGƯỠNG LỌC KẾT QUẢ" (5 ô WR/PnL/TP%/SL%/NetPnL) · xóa 2 rule này để gỡ, khối sẽ về flex-wrap mặc định của trình duyệt */
.opt-filter5{display:grid;grid-template-columns:repeat(3,1fr);gap:8px 10px;}
@media(min-width:640px){.opt-filter5{grid-template-columns:repeat(5,1fr);}}

.opt-run{width:100%;padding:12px;border-radius:10px;border:none;font:800 13px/1 'Outfit',sans-serif;letter-spacing:1px;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--cyn));color:#fff;transition:all .2s;box-shadow:0 4px 20px rgba(79,70,229,.2);}
.opt-run:disabled{background:var(--bg3);color:var(--dim);cursor:not-allowed;box-shadow:none;}
.opt-progress{background:var(--bg2);border-radius:8px;overflow:hidden;height:6px;margin-bottom:10px;}
.opt-bar{height:100%;background:linear-gradient(90deg,var(--acc),var(--cyn));transition:width .1s;}
.opt-result-wrap{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-top:14px;}
.opt-result-hdr{padding:11px 15px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.sort-btn{background:var(--bg2);border:1px solid var(--b1);border-radius:6px;color:var(--dim);padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.sort-btn:hover{border-color:var(--b2);}
.sort-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(79,70,229,.06);}
@media(max-width:380px){.fgrid{grid-template-columns:1fr;}.fgrid3{grid-template-columns:1fr 1fr;}.sc-val{font-size:18px;}.opt-grid{grid-template-columns:1fr;}}
@media(max-width:700px){.hide-sm{display:none;}#app{max-width:100%;}}

/* ══ BACKTEST DETAIL ══ */
.bt-card{background:#fff;border:1px solid var(--b1);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 1px 2px rgba(16,24,40,.04),0 6px 20px rgba(16,24,40,.05);}
.bt-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;cursor:pointer;}
.bt-title{font-size:14px;font-weight:800;color:var(--hi);letter-spacing:-.2px;}
.bt-sub{font-size:11px;color:var(--dim);margin-bottom:14px;}
.bt-toggle-btn{font-size:11px;color:var(--dim);background:var(--bg1);border:1px solid var(--b1);border-radius:8px;padding:5px 12px;cursor:pointer;flex-shrink:0;transition:all .15s;}
.bt-toggle-btn:hover{border-color:var(--b2);color:var(--txt);}
.bt-mode-tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg1);padding:4px;border-radius:12px;border:1px solid var(--b1);}
.bt-mode-tab{flex:1;text-align:center;padding:8px 16px;border-radius:9px;border:none;font-size:12px;cursor:pointer;color:var(--dim);background:transparent;font-family:'Outfit',sans-serif;font-weight:600;transition:all .15s;}
.bt-mode-tab.on{background:#fff;color:var(--acc);font-weight:700;box-shadow:0 1px 3px rgba(16,24,40,.12);}
.bt-sec-lbl{font-size:11px;color:var(--acc);font-weight:700;letter-spacing:.3px;margin-bottom:9px;}
.bt-boxes-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.bt-box{background:var(--bg1);border:1px solid var(--b1);border-radius:14px;padding:13px 15px;flex:1;min-width:185px;transition:all .15s;}
.bt-box:hover{border-color:var(--b2);}
.bt-box.on-rsi{border-color:var(--cyn);background:#fff;box-shadow:0 0 0 3px rgba(8,145,178,.08);}
.bt-box.on-mfi{border-color:#7c3aed;background:#fff;box-shadow:0 0 0 3px rgba(124,58,237,.08);}
.bt-box.bt-off{opacity:.55;}
.bt-box-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.bt-box-name{font-size:13px;font-weight:800;letter-spacing:.2px;color:var(--hi);}
.bt-tog{font-size:10px;padding:4px 11px;border-radius:6px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;transition:all .15s;}
.bt-tog.on{background:var(--grn);color:#fff;}
.bt-tog.off{background:var(--bg3);color:var(--dim);}
.bt-params{display:flex;gap:8px;margin-bottom:10px;}
.bt-plbl{font-size:10px;color:var(--dim);font-weight:600;margin-bottom:4px;}
.bt-pinp{background:#fff;border:1.5px solid var(--b2);border-radius:8px;padding:6px 9px;color:var(--hi);font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;transition:all .15s;}
.bt-pinp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(79,70,229,.12);}
.bt-tfs{display:flex;gap:5px;flex-wrap:wrap;}
.bt-tf{padding:4px 10px;border-radius:7px;border:1px solid var(--b1);font-size:10px;cursor:pointer;background:#fff;color:var(--dim);font-family:'JetBrains Mono',monospace;font-weight:700;transition:all .12s;}
.bt-tf:hover{border-color:var(--b2);}
.bt-tf.on{background:var(--cyn);color:#fff;border-color:var(--cyn);}
.bt-ind-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.bt-ind-row{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--bg1);border:1px solid var(--b1);border-radius:11px;transition:all .15s;}
.bt-ind-row:hover{border-color:var(--b2);}
.bt-ind-row.on-tr{border-color:var(--cyn);background:#fff;box-shadow:0 0 0 3px rgba(8,145,178,.07);}
.bt-ind-row.on-trd{border-color:var(--grn);background:#fff;box-shadow:0 0 0 3px rgba(22,163,74,.07);}
.bt-ind-row.bt-off{opacity:.55;}
.bt-ind-name{font-size:11px;font-weight:700;width:84px;flex-shrink:0;color:var(--hi);}
.bt-prow{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px;}
.bt-grp{display:flex;gap:6px;flex-wrap:wrap;}
.bt-gbtn{padding:7px 14px;border-radius:9px;border:1.5px solid var(--b2);font-size:11px;cursor:pointer;background:#fff;color:var(--dim);font-family:'Outfit',sans-serif;font-weight:700;transition:all .15s;}
.bt-gbtn:hover{border-color:var(--b3);}
.bt-gbtn.on-long{background:var(--grn-bg);border-color:var(--grn);color:var(--grn);}
.bt-gbtn.on-short{background:var(--red-bg);border-color:var(--red);color:#b91c1c;}
.bt-gbtn.on-both{background:rgba(79,70,229,.08);border-color:var(--acc);color:var(--acc);}
.bt-gbtn.on-ord{background:rgba(79,70,229,.08);border-color:var(--acc);color:var(--acc);}
.bt-run-row{display:flex;gap:8px;margin-bottom:16px;}
.bt-run-btn{flex:1;padding:13px;border-radius:12px;border:none;font:800 13px/1 'Outfit',sans-serif;letter-spacing:.5px;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--cyn));color:#fff;transition:all .2s;box-shadow:0 4px 16px rgba(79,70,229,.25);}
.bt-run-btn:not(:disabled):hover{box-shadow:0 6px 22px rgba(79,70,229,.35);transform:translateY(-1px);}
.bt-run-btn:not(:disabled):active{transform:translateY(0);}
.bt-run-btn:disabled{background:var(--bg3);color:var(--dim);cursor:not-allowed;box-shadow:none;}
.bt-save-btn{width:44px;height:44px;border-radius:12px;border:1.5px solid var(--b2);background:#fff;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;transition:all .15s;}
.bt-save-btn:hover{border-color:var(--acc);color:var(--acc);background:rgba(79,70,229,.04);}
.bt-cfg-list{background:#fff;border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.bt-cfg-item{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--b1);font-size:11px;cursor:pointer;color:var(--txt);transition:background .1s;}
.bt-cfg-item:last-child{border-bottom:none;}
.bt-cfg-item:hover{background:var(--bg1);}
.bt-cfg-item.bt-off{color:var(--dim);}
.bt-cb{width:17px;height:17px;border:1.5px solid var(--b2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;font-weight:700;}
.bt-cb.on{background:var(--grn);border-color:var(--grn);color:#fff;}
.bt-sum-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.bt-sum{background:#fff;border:1px solid var(--b1);border-radius:14px;padding:13px 15px;flex:0 0 auto;width:auto;min-width:90px;box-shadow:0 1px 3px rgba(16,24,40,.05);}
.bt-sum-lbl{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.2px;margin-bottom:6px;}
.bt-sum-val{font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--hi);letter-spacing:-.5px;white-space:nowrap;}
.bt-open-warn{background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:9px 13px;font-size:11px;color:#92400e;margin-bottom:12px;}
.bt-sort-row{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.bt-sort-lbl{font-size:10px;color:var(--dim);font-weight:600;}
.bt-sbtn{padding:6px 12px;border-radius:8px;border:1px solid var(--b1);font-size:10px;cursor:pointer;background:#fff;color:var(--dim);font-family:'Outfit',sans-serif;font-weight:600;transition:all .12s;}
.bt-sbtn:hover{border-color:var(--b2);}
.bt-sbtn.on{background:rgba(79,70,229,.08);border-color:var(--acc);color:var(--acc);font-weight:700;}
.bt-tbl-wrap{background:#fff;border:1px solid var(--b1);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(16,24,40,.05);}
.bt-tbl-scroll{overflow:visible;-webkit-overflow-scrolling:touch;}
.bt-tbl-frozen{max-height:520px;overflow:auto;-webkit-overflow-scrolling:touch;}
.bt-tbl-frozen th{font-size:10px;padding:7px 8px;color:var(--dim);font-weight:600;height:30px;}
.bt-tbl-frozen td{font-size:11px;padding:7px 8px;}
/* header 2 tầng cố định */
.bt-tbl-frozen thead th{position:sticky;background:var(--bg1);}
.bt-tbl-frozen thead tr:first-child th{top:0;z-index:6;box-shadow:0 1px 0 var(--b1);}

<script>

// ── saveOptConfig V12 — format mới: phần chung + từng box ──
function optCfgObj(r){
  const coin=optState.coin||'BTCUSDT';
  const tf=v=>(!v||v==='none')?null:v;
  return {
    coin,
    dir:r.dir,

    sl:r.sl,
    maxOrders:optState.maxOrders,
    ...Object.fromEntries(INDICATOR_BOXES.map(b=>[b.key,tf(r[b.key+'Tf'])])),
    // ★ BOX ĐỘC LẬP (Độ dốc filter) — chỉ xuất khi đang BẬT (giống khuôn DCA), tắt thì không có 2 field này trong
    // JSON, giữ tương thích ngược file cũ. Xóa: xóa dòng "...(optState.slopeOn?...)" này để gỡ, không ảnh hưởng gì khác.
    ...(optState.slopeOn?{slopeOn:true,slopeK:optState.slopeK}:{}),
  };
}
function optCfgDefName(r){
  const coin=optState.coin||'BTCUSDT';
  return coin.replace('USDT','')+'_'+r.dir+'_'+(r.entrySignal||'rsi')+r.level;
}
function _downloadJson(obj,name){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.json';a.click();URL.revokeObjectURL(a.href);

function saveOptConfig(r){

// danh sách kết quả sau khi áp filter Period/Dir + lọc trùng theo bộ chỉ báo (AND)
function optFilteredResults(){
  const o=optState;
  let f=o.results;
  if(o.filterPeriod!==null) f=f.filter(r=>r.period===o.filterPeriod);
  if(o.filterDir!==null) f=f.filter(r=>r.dir===o.filterDir);
  const keys=(o.dedupKeys||[]).filter(k=>o.activeBoxKeys.includes(k)); // chỉ báo đang bật
  const byLevel=(o.dedupKeys||[]).includes('level');
  const byPeriod=(o.dedupKeys||[]).includes('period');
  if(keys.length||byLevel||byPeriod){
    const seen=new Set(),out=[];
    for(const r of f){
      const parts=[r.entrySignal,r.dir];                 // luôn tách buy/sell, rsi/mfi
      if(byPeriod) parts.push('p'+r.period);
      if(byLevel)  parts.push('lv'+r.level);
      for(const k of keys) parts.push(r[k+'Tf']||'none'); // AND theo chỉ báo đã chọn
      const sig=parts.join('|');
      if(seen.has(sig))continue;
      seen.add(sig);out.push(r);
    }
    f=out;
  }
  return f; // f giữ nguyên thứ tự sort hiện tại → dòng đầu mỗi nhóm là tốt nhất
}
function toggleDedup(key){
  const a=optState.dedupKeys,i=a.indexOf(key);
  if(i>=0)a.splice(i,1);else a.push(key);
  renderOptimizer();
}

// ═══════════════════════════════════════════════════════════
//  SAVE-ALL-ZIP — KHỐI CÔ LẬP (xóa từ đây tới END để gỡ)
//  Gói toàn bộ cấu hình sau lọc (optFilteredResults) vào 1 file .zip.
//  Không đụng thuật toán/box — chỉ đọc helper sẵn có + zip thuần JS.
// ═══════════════════════════════════════════════════════════
const _zipCrcTable=(()=>{let c,t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function _zipCrc32(bytes){let c=0xFFFFFFFF;for(let i=0;i<bytes.length;i++)c=_zipCrcTable[(c^bytes[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function _zipConcat(parts){let len=0;for(const p of parts)len+=p.length;const out=new Uint8Array(len);let o=0;for(const p of parts){out.set(p,o);o+=p.length;}return out;}
function _makeZip(files){ // files: [{name, data:Uint8Array}] — store (không nén)
  const u16=v=>new Uint8Array([v&255,(v>>8)&255]);
  const u32=v=>new Uint8Array([v&255,(v>>8)&255,(v>>16)&255,(v>>>24)&255]);
  const body=[],central=[];let offset=0;
  for(const f of files){
    const name=f.name, data=f.data, crc=_zipCrc32(data);
    const lh=_zipConcat([u32(0x04034b50),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),name]);
    body.push(lh,data);
    central.push(_zipConcat([u32(0x02014b50),u16(20),u16(20),u16(0x0800),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset),name]));
    offset+=lh.length+data.length;
  }
  const cd=_zipConcat(central);
  const eocd=_zipConcat([u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cd.length),u32(offset),u16(0)]);
  return _zipConcat([...body,cd,eocd]);
}
function saveAllOptZip(){
  const list=optFilteredResults();
  if(!list.length){alert('Không có cấu hình nào để lưu');return;}
  const enc=new TextEncoder();
  const files=list.map((r,i)=>{
    const inds=INDICATOR_BOXES.filter(b=>r[b.key+'Tf']&&r[b.key+'Tf']!=='none').map(b=>b.label.split(' ')[0]+r[b.key+'Tf']).join('-');
    let nm=String(i+1).padStart(3,'0')+'_'+optCfgDefName(r)+'_P'+r.period+'_tp'+r.tp+'_sl'+r.sl+(inds?'_'+inds:'')+'.json';
    nm=nm.replace(/[\/\\:*?"<>|]/g,'_');
    return {name:enc.encode(nm), data:enc.encode(JSON.stringify(optCfgObj(r),null,2))};
  });
  const coin=(optState.coin||'BTC').replace('USDT','');
  const blob=new Blob([_makeZip(files)],{type:'application/zip'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=coin+'_'+files.length+'-configs.zip';a.click();URL.revokeObjectURL(a.href);
}
// ═══════════════════ END SAVE-ALL-ZIP ═══════════════════

  return {id,label:'Phiên '+id,coins:'BTCUSDT, ETHUSDT, BNBUSDT, SOLUSDT, XRPUSDT',start:'13/04/2025',end:todayStr(),dir:'buy',rsiLevel:50,tp:3,sl:1.5,maxOrders:1,rsiPeriod:14,rsiTF:'1h',macdTf:'none',macdAlign:'trend',macdTrendTf:'none'};
}
function todayStr(){const n=new Date();return pad(n.getDate())+'/'+pad(n.getMonth()+1)+'/'+n.getFullYear();}
function pad(n){return String(n).padStart(2,'0');}

// ══════════════════════════════════════════════
//  RSI
// ══════════════════════════════════════════════
function calcRSI(closes,period){
  period=period||14;
  const rsi=new Array(closes.length).fill(null);
  if(closes.length<period+1)return rsi;
  let g=0,l=0;
  for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1];d>0?g+=d:l-=d;}
  let ag=g/period,al=l/period;
  rsi[period]=al===0?100:100-100/(1+ag/al);
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+(d>0?d:0))/period;
    al=(al*(period-1)+(d<0?-d:0))/period;
    rsi[i]=al===0?100:100-100/(1+ag/al);
  }
  return rsi;
}

// ══════════════════════════════════════════════
//  BACKTEST
// ══════════════════════════════════════════════
function backtest(candles,dir,startTs,endTs,rsiLevel,tpPct,slPct,maxOrders,rsiPeriod,entrySignal='rsi',mfiLevel=50,mfiPeriod=14){
  const closes=candles.map(c=>parseFloat(c[4]));
  const highs=candles.map(c=>parseFloat(c[2]));
  const lows=candles.map(c=>parseFloat(c[3]));
  const vols=candles.map(c=>parseFloat(c[5]));
  const times=candles.map(c=>c[0]);
  const rsi=calcRSI(closes,rsiPeriod||14);
  const useMfi=entrySignal==='mfi';
  const mfi=useMfi?calcMFI(highs,lows,closes,vols,mfiPeriod||14):null;
  const trades=[];let openExitBars=[];
  for(let i=16;i<candles.length-1;i++){
    if(useMfi){if(mfi[i-1]==null||mfi[i]==null)continue;}
    else{if(!rsi[i-1]||!rsi[i])continue;}
    if(times[i]<startTs||times[i]>endTs)continue;
    openExitBars=openExitBars.filter(b=>b>i);
    if(maxOrders>0&&openExitBars.length>=maxOrders)continue;
    const _ind=useMfi?mfi:rsi,_lvl=useMfi?mfiLevel:rsiLevel;
    const sig=dir==='buy'?(_ind[i-1]<_lvl&&_ind[i]>_lvl):(_ind[i-1]>_lvl&&_ind[i]<_lvl);
    if(!sig)continue;
    const entry=closes[i];
    const tp=dir==='buy'?entry*(1+tpPct/100):entry*(1-tpPct/100);
    const sl=dir==='buy'?entry*(1-slPct/100):entry*(1+slPct/100);
    let result='OPEN',pnl=null,exitBar=-1;
    for(let j=i+1;j<candles.length;j++){
      if(dir==='buy'){if(highs[j]>=tp){result='WIN';pnl=tpPct;exitBar=j;break;}if(lows[j]<=sl){result='LOSS';pnl=-slPct;exitBar=j;break;}}
      else{if(lows[j]<=tp){result='WIN';pnl=tpPct;exitBar=j;break;}if(highs[j]>=sl){result='LOSS';pnl=-slPct;exitBar=j;break;}}
    }
    if(maxOrders>0)openExitBars.push(exitBar>0?exitBar:candles.length);
    const d=new Date(times[i]);
    const exitTime=exitBar>0?(()=>{const e=new Date(times[exitBar]);return pad(e.getDate())+'/'+pad(e.getMonth()+1)+'/'+String(e.getFullYear()).slice(-2)+' '+pad(e.getHours())+':'+pad(e.getMinutes());})():'—';
    trades.push({time:pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(-2)+' '+pad(d.getHours())+':'+pad(d.getMinutes()),exitTime,entry:entry>100?entry.toFixed(2):entry.toFixed(4),rsi:useMfi?null:rsi[i].toFixed(2),mfi:useMfi&&mfi[i]!=null?mfi[i].toFixed(2):null,cmfTrade:null,tp:tp>100?tp.toFixed(2):tp.toFixed(4),sl:sl>100?sl.toFixed(2):sl.toFixed(4),result,pnl});
  }
  return trades;
}

function summarize(trades){
  const wins=trades.filter(t=>t.result==='WIN').length;
  const losses=trades.filter(t=>t.result==='LOSS').length;
  const closed=wins+losses;
  const totalPnl=trades.reduce((s,t)=>s+(t.pnl||0),0);
  return {trades,wins,losses,closed,totalPnl};
}

// ══════════════════════════════════════════════
//  FETCH BINANCE
// ══════════════════════════════════════════════
const _baseCache={};
const _sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function fetchKlines(symbol,startTs,endTs,interval='1h'){
  if(!_baseCache[symbol]){
    const spot='https://api.binance.com/api/v3/klines';
    const fut='https://fapi.binance.com/fapi/v1/klines';
    let resolved=null;
    for(let attempt=0;attempt<3&&!resolved;attempt++){
      if(attempt>0)await _sleep(500);
      try{const r=await fetch(`${spot}?symbol=${symbol}&interval=1h&limit=1`);if(r.ok)resolved=spot;else if(r.status===400)resolved=fut;}catch(e){}
    }
    if(!resolved)throw new Error(symbol+': Spot lỗi tạm thời (rate-limit/mạng) — chạy lại');
    _baseCache[symbol]=resolved;
  }
  const base=_baseCache[symbol];
  const all=[];let cur=startTs;
  while(cur<endTs){
    const url=`${base}?symbol=${symbol}&interval=${interval}&startTime=${cur}&endTime=${endTs}&limit=1000`;
    const res=await fetch(url);
    if(!res.ok)throw new Error(symbol+': HTTP '+res.status);
    const chunk=await res.json();
    if(!chunk.length)break;
    all.push(...chunk);
    if(chunk.length<1000)break;
    cur=chunk[chunk.length-1][0]+1;
  }
  return all;
}

function parseDate(str,end){
  const p=str.trim().split('/').map(Number);
  if(p.length!==3||p.some(isNaN))return null;
  const[d,m,y]=p;
  const base=Date.UTC(y<100?2000+y:y,m-1,d);
  return end?base+86400000-1:base;
}

function setField(id,k,v){const s=sessions.find(s=>s.id===id);if(s){s[k]=v;renderConfig();}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ══════════════════════════════════════════════
//  MACD / MFI / CMF / OBV HELPERS
// ══════════════════════════════════════════════
function calcEMA(values,period){
  const k=2/(period+1);const ema=new Array(values.length).fill(null);
  ema[0]=values[0];for(let i=1;i<values.length;i++)ema[i]=values[i]*k+ema[i-1]*(1-k);return ema;
}
function calcMacdHist(closes){
  const ema12=calcEMA(closes,12);const ema26=calcEMA(closes,26);
  const diff=closes.map((_,i)=>ema12[i]-ema26[i]);const dea=calcEMA(diff,9);
  return diff.map((d,i)=>d-dea[i]);
}
function calcMFI(highs,lows,closes,volumes,period=14){
  const tp=closes.map((c,i)=>(highs[i]+lows[i]+c)/3);
  const mfi=new Array(closes.length).fill(null);
  for(let i=period;i<closes.length;i++){
    let posFlow=0,negFlow=0;
    for(let j=i-period+1;j<=i;j++){const mf=tp[j]*volumes[j];if(tp[j]>tp[j-1])posFlow+=mf;else if(tp[j]<tp[j-1])negFlow+=mf;}
    if(negFlow===0){mfi[i]=100;continue;}
    mfi[i]=100-(100/(1+posFlow/negFlow));
  }
  return mfi;
}
function calcCMF(highs,lows,closes,volumes,period=20){
  const cmf=new Array(closes.length).fill(null);
  for(let i=period-1;i<closes.length;i++){
    let sumMFV=0,sumVol=0;
    for(let j=i-period+1;j<=i;j++){const hl=highs[j]-lows[j];const mfm=hl===0?0:(2*closes[j]-lows[j]-highs[j])/hl;sumMFV+=mfm*volumes[j];sumVol+=volumes[j];}
    cmf[i]=sumVol===0?0:sumMFV/sumVol;
  }
  return cmf;
}
function calcOBVdiff(closes,volumes,emaPeriod=20){
  const obv=new Array(closes.length).fill(0);
  for(let i=1;i<closes.length;i++){obv[i]=closes[i]>closes[i-1]?obv[i-1]+volumes[i]:closes[i]<closes[i-1]?obv[i-1]-volumes[i]:obv[i-1];}
  const ema=calcEMA(obv,emaPeriod);return obv.map((o,i)=>o-ema[i]);
}
function bsearchMacd(opens,hist,signalTs,periodMs){
  let lo=0,hi=opens.length-1,res=-1;
  while(lo<=hi){const mid=(lo+hi)>>1;if(opens[mid]+periodMs<=signalTs){res=mid;lo=mid+1;}else hi=mid-1;}
  return res>=0?hist[res]:null;
}
function bsearchMacdTs(opens,signalTs,periodMs){
  let lo=0,hi=opens.length-1,res=-1;
  while(lo<=hi){const mid=(lo+hi)>>1;if(opens[mid]+periodMs<=signalTs){res=mid;lo=mid+1;}else hi=mid-1;}
  return res>=0?opens[res]:null;
}
// ★ BOX ĐỘC LẬP (Độ dốc filter) — bản sao bsearchMacd() nhưng trả về CHỈ SỐ (idx) thay vì giá trị, để lấy thêm
// được giá trị tại nến lùi k bước (hist[idx-k]) khi tính độ dốc. Không sửa bsearchMacd() gốc — chỗ khác vẫn
// dùng bản gốc bình thường. Xóa: xóa hàm này để gỡ, không ảnh hưởng gì khác.
function bsearchMacdIdx(opens,signalTs,periodMs){
  let lo=0,hi=opens.length-1,res=-1;
  while(lo<=hi){const mid=(lo+hi)>>1;if(opens[mid]+periodMs<=signalTs){res=mid;lo=mid+1;}else hi=mid-1;}
  return res;
}
// ★ BOX ĐỘC LẬP (Độ dốc filter) — kiểm tra "đang tăng dần" (buy) / "đang giảm dần" (sell) so với nến lùi
// optState.slopeK bước, cùng TF filter (idx tính bằng bsearchMacdIdx, cùng mảng data.hist). Tắt (slopeOn=false,
// mặc định) → luôn trả true, không đổi hành vi cũ. Xóa: xóa hàm này để gỡ, đồng thời xóa phần dùng nó trong
// 6 filter của INDICATOR_BOXES.
function optSlopePass(data,idx,dir){
  if(!optState.slopeOn)return true;
  const k=Math.max(1,optState.slopeK|0);
  if(idx-k<0)return false;
  const vK=data.hist[idx-k];
  if(vK==null)return false;
  const vI=data.hist[idx];
  return dir==='buy'?vI>vK:vI<vK;
}

// ★ FIX (thứ tự Max lệnh cùng lúc) — trước đây maxOrders bị áp NGAY LÚC sinh tín hiệu thô, trước cả khi lọc
// MACD/CMF/OBV/độ dốc — khiến 1 tín hiệu thô sau này chắc chắn bị lọc loại vẫn "giữ chỗ", chặn mất tín hiệu tốt
// phía sau nó. Sửa: sinh tín hiệu KHÔNG giới hạn (maxOrders truyền vào eb.generate luôn =0), lọc chỉ báo/độ dốc
// xong xuôi, RỒI MỚI gọi applyMaxOrdersPost() này trên danh sách đã lọc sạch — đúng thứ tự "lọc trước, giới hạn
// số lệnh sau". Dùng lại đúng logic chặn cũ (so sánh mốc thời gian rawTs/exitTs, tương đương "b>i" theo chỉ số
// nến trước đây), không đổi cách tính TP/SL/kết quả từng lệnh. Dùng chung cho cả Optimizer lẫn Backtest Detail
// (cùng cấu trúc {rawTs,exitTs}). Không ảnh hưởng nhánh Gộp vị thế DCA (bt_genMergedPositions() không gọi hàm này).
// Xóa: xóa hàm này + trả "eb.generate(...,optState.maxOrders)"/"eb.generate(...,btState.maxOrders)" về như cũ
// (bỏ đối số "0") + xóa 2 dòng gọi "...=applyMaxOrdersPost(...)" ở runOptimizer()/runBacktest() để gỡ, quay về
// hành vi cũ (có lỗi thứ tự).
function applyMaxOrdersPost(trades,maxOrders){
  if(!(maxOrders>0))return trades; // Multi = không giới hạn, giữ nguyên y hệt input
  const sorted=[...trades].sort((a,b)=>a.rawTs-b.rawTs);
  let openUntil=[];
  const kept=[];
  for(const t of sorted){
    openUntil=openUntil.filter(ts=>ts>t.rawTs); // bỏ các lệnh đã đóng trước hoặc đúng lúc lệnh này vào
    if(openUntil.length>=maxOrders)continue; // đang đủ chỗ — bỏ tín hiệu này, đúng y hệt logic chặn cũ
    kept.push(t);
    openUntil.push(t.exitTs!=null?t.exitTs:Infinity); // chưa đóng (OPEN) → coi như giữ chỗ tới hết
  }
  return kept;
}

// helper dùng chung trong generate (không export ra ngoài)
function _genTrades(candles,hist,dir,startTs,endTs,level,tp,sl,maxOrders){
  const closes=candles.map(c=>+c[4]),highs=candles.map(c=>+c[2]),lows=candles.map(c=>+c[3]),times=candles.map(c=>c[0]);
  const fmt=t=>{const x=new Date(t);return pad(x.getDate())+'/'+pad(x.getMonth()+1)+'/'+String(x.getFullYear()).slice(-2)+' '+pad(x.getHours())+':'+pad(x.getMinutes());};
  const trades=[];let openExitBars=[];
  for(let i=16;i<candles.length-1;i++){
    if(hist[i-1]==null||hist[i]==null)continue;
    if(times[i]<startTs||times[i]>endTs)continue;
    openExitBars=openExitBars.filter(b=>b>i);
    if(maxOrders>0&&openExitBars.length>=maxOrders)continue;
    const sig=dir==='buy'?(hist[i-1]<level&&hist[i]>level):(hist[i-1]>level&&hist[i]<level);
    if(!sig)continue;
    const e=closes[i];
    const tpP=dir==='buy'?e*(1+tp/100):e*(1-tp/100);
    const slP=dir==='buy'?e*(1-sl/100):e*(1+sl/100);
    let result='OPEN',pnl=null,exitBar=-1;
    for(let j=i+1;j<candles.length;j++){
      if(dir==='buy'){if(highs[j]>=tpP){result='WIN';pnl=tp;exitBar=j;break;}if(lows[j]<=slP){result='LOSS';pnl=-sl;exitBar=j;break;}}
      else{if(lows[j]<=tpP){result='WIN';pnl=tp;exitBar=j;break;}if(highs[j]>=slP){result='LOSS';pnl=-sl;exitBar=j;break;}}
    }
    if(maxOrders>0)openExitBars.push(exitBar>0?exitBar:candles.length);
    const rawTs=times[i];
    const exitTime=exitBar>0?fmt(times[exitBar]):'—';
    trades.push({time:fmt(times[i]),exitTime,rawTs,entry:e>100?e.toFixed(2):e.toFixed(4),tp:tpP>100?tpP.toFixed(2):tpP.toFixed(4),sl:slP>100?slP.toFixed(2):slP.toFixed(4),result,pnl});
  }
  return trades;
}

const OPT_RSI         = [35, 40, 45, 50, 55, 60, 65];
const OPT_TP          = [1, 1.5, 2, 2.5, 3, 4, 5];
const OPT_SL          = [0.5, 1, 1.5, 2, 2.5, 3];
const OPT_DIRS        = ['buy','sell'];
const OPT_RSI_PERIODS = [7, 10, 14, 21];

function toggleBox(box){ optState[box].on=!optState[box].on; renderOptimizer(); }
function toggleBoxTf(box,tf){
  const b=optState[box];
  const i=b.tfs.indexOf(tf);
  if(i>=0) b.tfs=b.tfs.filter(t=>t!==tf);
  else b.tfs=[...b.tfs,tf];
  renderOptimizer();
}

function maxConsecLosses(trades){
  let max=0,cur=0;
  for(const t of trades){
    if(t.result==='LOSS'){cur++;if(cur>max)max=cur;}
    else if(t.result==='WIN') cur=0;
  }
  return max;
}

async function runOptimizer(){
  Object.keys(_baseCache).forEach(k=>delete _baseCache[k]);
  if(optState.running) return;
  const startTs=parseDate(optState.start,false);
  const endTs=parseDate(optState.end,true);
  if(!startTs||!endTs){alert('Ngày không hợp lệ');return;}
  const activeEntries=ENTRY_BOXES.filter(e=>optState[e.key].on);
  if(!activeEntries.length){alert('Bật ít nhất 1 entry (RSI hoặc MFI)');return;}
  optState.running=true;optState.results=[];optState.progress=0;
  optState.filterPeriod=null;optState.filterDir=null;optState.dedupKeys=[];

  // cartesian product của tất cả indicator TF (pre-compute 1 lần)
  const boxTfLists=INDICATOR_BOXES.map(b=>{
    const st=optState[b.key];
    return st.on&&st.tfs.length?st.tfs:[null];
  });
  const allIndCombos=(()=>{
    let result=[[]];
    for(const tfs of boxTfLists){
      const next=[];
      for(const prev of result) for(const tf of tfs) next.push([...prev,tf]);
      result=next;
    }
    return result;
  })();

  const combos=activeEntries.length*OPT_RSI_PERIODS.length*OPT_DIRS.length*OPT_RSI.length
    *OPT_TP.length*OPT_SL.length*allIndCombos.length;
  optState.total=combos;

  const entryCandles={};
  const entryHists={};
  const boxData={};
  try{
    // Load entry candles + pre-compute hist theo từng period
    for(const eb of activeEntries){
      const tf=optState[eb.key].tf;
      optState.statusMsg=`Đang tải nến ${eb.label} ${tf.toUpperCase()} ${optState.coin}...`;
      renderOptimizer();
      entryCandles[eb.key]=await fetchKlines(optState.coin,startTs-eb.warmup(tf),endTs,tf);
      entryHists[eb.key]={};
      for(const period of OPT_RSI_PERIODS){
        entryHists[eb.key][period]=eb.buildHist(entryCandles[eb.key].slice(0,-1),period);
      }
    }
    // Load indicator data qua từng box object
    for(const box of INDICATOR_BOXES){
      const st=optState[box.key];
      if(!st.on||!st.tfs.length) continue;
      boxData[box.key]={};
      for(const tf of st.tfs){
        if(tf==='none')continue; // "Trống" = tổ hợp bỏ qua box này, không tải nến
        optState.statusMsg=`Đang tải ${box.label} ${tf.toUpperCase()}...`;
        renderOptimizer();
        const pMs=MACD_TF_MS[tf]||86400000;
        const raw=await fetchKlines(optState.coin,startTs-box.warmup(pMs),endTs,tf);
        const cl=raw.slice(0,-1);
        boxData[box.key][tf]={opens:cl.map(c=>c[0]),hist:box.buildHist(cl),pMs};
      }
    }
  }catch(e){
    optState.statusMsg='❌ Lỗi: '+e.message;optState.running=false;renderOptimizer();return;
  }

  optState.statusMsg=`Đang thử ${combos.toLocaleString()} tổ hợp...`;renderOptimizer();
  const res=[];let done=0;

  for(const eb of activeEntries){
    for(const period of OPT_RSI_PERIODS){
      for(const dir of OPT_DIRS){
        for(const level of OPT_RSI){
          for(const tp of OPT_TP){
            for(const sl of OPT_SL){
              const base=eb.generate(entryCandles[eb.key],entryHists[eb.key][period],dir,startTs,endTs,level,tp,sl,0);
              for(const combo of allIndCombos){
                let ft=base;
                for(let i=0;i<INDICATOR_BOXES.length;i++){
                  const tf=combo[i];
                  if(tf&&tf!=='none') ft=INDICATOR_BOXES[i].filter(ft,boxData[INDICATOR_BOXES[i].key][tf],dir);
                }
                ft=applyMaxOrdersPost(ft,optState.maxOrders);
                const sum=summarize(ft);
                const wr=sum.closed>0?sum.wins/sum.closed*100:0;
                const mcl=optState.consecLossOn?maxConsecLosses(ft):0;
                if(sum.closed>=optState.minTrades&&wr>=optState.minWR&&sum.totalPnl>=optState.minPnl
                  &&(!optState.consecLossOn||mcl<=optState.consecLoss)
                  &&tp>=optState.minTp&&sl>=optState.minSl /* BOX ĐỘC LẬP — LỌC TP%/SL% · xóa đúng "&&tp>=optState.minTp&&sl>=optState.minSl" này để gỡ */
                  &&(sum.totalPnl-sum.closed*feeRate)>=optState.minNetPnl){ /* BOX ĐỘC LẬP — LỌC NET PNL% · xóa đúng "&&(sum.totalPnl-sum.closed*feeRate)>=optState.minNetPnl" này để gỡ */
                  const tfRes={};
                  INDICATOR_BOXES.forEach((b,i)=>tfRes[b.key+'Tf']=combo[i]||'none');
                  res.push({
                    period,dir,level,tp,sl,
                    entrySignal:eb.signal,entryTf:optState[eb.key].tf,
                    ...tfRes,
                    trades:sum.closed,wins:sum.wins,losses:sum.losses,
                    wr:parseFloat(wr.toFixed(1)),pnl:parseFloat(sum.totalPnl.toFixed(2))
                  });
                }
                done++;
                if(done%200===0){optState.progress=done;renderOptimizerProgress();}
              }
            }
          }
        }
      }
    }
  }

  res.sort((a,b)=>{
    if(optState.sortBy==='wr') return b.wr-a.wr;
    if(optState.sortBy==='trades') return b.trades-a.trades;
    if(optState.sortBy==='netpnl') return (b.pnl-b.trades*feeRate)-(a.pnl-a.trades*feeRate);
    return b.pnl-a.pnl;
  });
  optState.results=res;optState.progress=combos;optState.running=false;
  optState.activeBoxKeys=INDICATOR_BOXES.filter(b=>optState[b.key].on).map(b=>b.key);
  optState.statusMsg=`✅ Xong! ${combos.toLocaleString()} tổ hợp → tìm được ${res.length} thỏa điều kiện`;
  renderOptimizer();
}

function setOptSort(by){
  optState.sortBy=by;
  optState.results.sort((a,b)=>{
    if(by==='wr') return b.wr-a.wr;
    if(by==='trades') return b.trades-a.trades;
    if(by==='netpnl') return (b.pnl-b.trades*feeRate)-(a.pnl-a.trades*feeRate);
    return b.pnl-a.pnl;
  });
  renderOptimizer();
}

function renderOptimizerProgress(){
  const bar=document.getElementById('optBar');
  const pct=document.getElementById('optPct');
  if(bar) bar.style.width=(optState.progress/optState.total*100)+'%';
  if(pct) pct.textContent=Math.round(optState.progress/optState.total*100)+'%';
}

  const rr=(r.tp/r.sl).toFixed(1);

  const pc=r.pnl>=0?'var(--grn)':'var(--red)';
  const dc=r.dir==='buy'?'var(--grn)':'var(--red)';
  const net=r.pnl-(r.trades*feeRate);
  const nc=net>=0?'var(--grn)':'var(--red)';
  const bg=idx%2===1?'background:rgba(243,244,246,.7);':'';
  return `<tr style="${bg}">`

    +`<td style="color:var(--acc)">${r.level}</td>`
    +`<td style="color:var(--grn)">+${r.tp}%</td><td style="color:var(--red)">-${r.sl}%</td>`
    +`<td style="color:var(--dim)">${rr}</td><td>${r.trades}</td>`
    +`<td style="color:var(--grn);font-weight:700">${r.wins}</td>`
    +`<td style="color:var(--red);font-weight:700">${r.losses}</td>`
    +`<td style="color:${wrc};font-weight:800">${r.wr}%</td>`
    +`<td style="color:${pc};font-weight:800">${r.pnl>=0?'+':''}${r.pnl}%</td>`
    +`<td style="color:${nc};font-weight:800">${net>=0?'+':''}${net.toFixed(2)}%</td>`

    +`</tr>`;

function optRenderRows(){
  const sec=document.getElementById('optimizerSection');if(!sec||!optView)return;
  const cont=sec.querySelector('.opt-vtbl');
  const tb=sec.querySelector('#optTbody');
  if(!cont||!tb)return;
  const {sorted,activeCols,totalCols,headerH}=optView;
  const rowH=optView.rowH;
  const N=sorted.length;
  if(!N){tb.innerHTML='';return;}
  const BUF=12;
  const vis=Math.ceil(Math.max(0,cont.clientHeight-headerH)/rowH)+1;
  let start=Math.floor(cont.scrollTop/rowH)-BUF; if(start<0)start=0;
  let end=start+vis+2*BUF; if(end>N)end=N;
  const topH=start*rowH, botH=(N-end)*rowH;
  let html='';
  if(topH>0)html+=`<tr aria-hidden="true"><td colspan="${totalCols}" style="padding:0;border:0;height:${topH}px"></td></tr>`;
  for(let k=start;k<end;k++)html+=optRowHtml(sorted[k],k,activeCols);
  if(botH>0)html+=`<tr aria-hidden="true"><td colspan="${totalCols}" style="padding:0;border:0;height:${botH}px"></td></tr>`;
  tb.innerHTML=html;
  if(!optView._measured){
    optView._measured=true;
    const rr=tb.querySelector('tr:not([aria-hidden])');
    const th=cont.querySelector('thead');
    let ch=false;
    if(rr){const h=rr.getBoundingClientRect().height;if(h>0&&Math.abs(h-rowH)>0.5){optView.rowH=h;ch=true;}}
    if(th){const hh=th.getBoundingClientRect().height;if(hh>0&&Math.abs(hh-headerH)>0.5){optView.headerH=hh;ch=true;}}
    if(ch)optRenderRows();
  }
}
function optMountRows(){
  const sec=document.getElementById('optimizerSection');if(!sec||!optView)return;
  const cont=sec.querySelector('.opt-vtbl');
  if(!cont)return;
  let ticking=false;
  cont.addEventListener('scroll',()=>{if(ticking)return;ticking=true;requestAnimationFrame(()=>{ticking=false;optRenderRows();});});
  optRenderRows();
}

//  CHECK INDICATORS — BOX ĐỘC LẬP (xóa block này để gỡ)
// ══════════════════════════════════════════════
let indChk={
  coin:'BTCUSDT',
  entrySig:'rsi',   // 'rsi' | 'mfi' — loại trừ, chỉ 1 tại 1 thời điểm
  period:14,        // 7 | 10 | 14 | 21
  entryTf:'1h',     // TF nến tín hiệu (bắt buộc trước khi nhập filter)
  macd:'', cmf:'', obv:'',   // TF bộ lọc — căn theo nến tín hiệu
  loading:false, results:[], error:''
};

// ─── helper nội bộ khối (không phụ thuộc box ngoài) ───
const _CHK_TF_MS={'5m':300000,'15m':900000,'30m':1800000,'1h':3600000,'2h':7200000,'4h':14400000,'1d':86400000,'3d':259200000,'1w':604800000};
function _chkFmt(ts){const d=new Date(ts);return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());}
// bsearch: nến HTF đóng TRƯỚC khi nến tín hiệu MỞ (open+pMs ≤ rawTs) — y hệt Optimizer/Backtest
function _chkBsearch(opens,arr,rawTs,pMs){let lo=0,hi=opens.length-1,res=-1;while(lo<=hi){const m=(lo+hi)>>1;if(opens[m]+pMs<=rawTs){res=m;lo=m+1;}else hi=m-1;}return res>=0?{val:arr[res],ts:opens[res]}:null;}
// bộ lọc — căn theo nến tín hiệu (tái dùng calc* chung như box khác)
const CHK_FILTERS=[
  {key:'macd', ind:'MACD', label:'MACD hist', limit:200,  buildHist:cl=>calcMacdHist(cl.map(c=>+c[4]))},
  {key:'cmf',  ind:'CMF',  label:'CMF P20',   limit:200,  buildHist:cl=>calcCMF(cl.map(c=>+c[2]),cl.map(c=>+c[3]),cl.map(c=>+c[4]),cl.map(c=>+c[5]),20)},
  {key:'obv',  ind:'OBV',  label:'OBV diff',  limit:1000, buildHist:cl=>calcOBVdiff(cl.map(c=>+c[4]),cl.map(c=>+c[5]),20)},
];
function setChkSig(s){indChk.entrySig=s;renderUtility();}
function setChkPeriod(p){indChk.period=p;renderUtility();}

async function runIndCheck(){
  if(indChk.loading)return;
  const coin=(indChk.coin||'BTCUSDT').trim().toUpperCase();
  const sig=indChk.entrySig, period=indChk.period||14;
  const entryTf=(indChk.entryTf||'').trim();
  if(!entryTf){alert('Nhập Entry TF (RSI/MFI) trước khi check');return;}
  indChk.loading=true; indChk.results=[]; indChk.error='';
  renderUtility();
  const base=await(async()=>{
    const spot='https://api.binance.com/api/v3/klines';
    const fut='https://fapi.binance.com/fapi/v1/klines';
    try{const r=await fetch(`${spot}?symbol=${coin}&interval=1h&limit=1`);if(r.ok)return spot;if(r.status===400)return fut;}catch(e){}
    return fut;
  })();
  const results=[];
  try{
    // 1) NẾN TÍN HIỆU: RSI/MFI tại nến đã đóng gần nhất
    const rawE=await fetch(`${base}?symbol=${coin}&interval=${entryTf}&limit=300`).then(r=>r.json());
    const clE=rawE.slice(0,-1);
    const histE = sig==='mfi'
      ? calcMFI(clE.map(c=>+c[2]),clE.map(c=>+c[3]),clE.map(c=>+c[4]),clE.map(c=>+c[5]),period)
      : calcRSI(clE.map(c=>+c[4]),period);
    const iE=clE.length-1;
    const rawTs=clE[iE][0];   // giờ MỞ nến tín hiệu (UTC epoch) — mốc căn cho filter
    results.push({ind:sig.toUpperCase(),label:sig.toUpperCase()+' '+period,tf:entryTf,val:histE[iE],sign:null,ts:_chkFmt(rawTs),ok:true,role:'signal'});
    // 2) BỘ LỌC: căn theo nến tín hiệu (lấy nến HTF đóng trước rawTs)
    for(const f of CHK_FILTERS){
      const tf=(indChk[f.key]||'').trim();
      if(!tf)continue;
      const raw=await fetch(`${base}?symbol=${coin}&interval=${tf}&limit=${f.limit}`).then(r=>r.json());
      const cl=raw.slice(0,-1);
      const opens=cl.map(c=>c[0]);
      const arr=f.buildHist(cl);
      const pMs=_CHK_TF_MS[tf]||3600000;
      const hit=_chkBsearch(opens,arr,rawTs,pMs);
      if(!hit||hit.val==null){results.push({ind:f.ind,label:f.label,tf,val:null,sign:null,ts:'',ok:false,err:'không đủ nến trước tín hiệu'});continue;}
      results.push({ind:f.ind,label:f.label,tf,val:hit.val,sign:hit.val>0?'DƯƠNG':'ÂM',ts:_chkFmt(hit.ts),ok:true,role:'filter'});
    }
  }catch(e){ indChk.results=[{ind:'LỖI',label:'Lỗi',tf:'',val:null,sign:null,ts:'',ok:false,err:e.message}]; indChk.loading=false; renderUtility(); return; }
  indChk.results=results; indChk.loading=false; renderUtility();
}

let bulkGen={
  template:null,       // object JSON mẫu đã nạp
  templateName:'',     // tên file mẫu gốc (dùng để tách hậu tố khi đặt tên file xuất)
  coinListText:'',     // text paste danh sách coin
  generated:[]          // [{coin,obj,filename}]
};

// ─── Box con 1: Nạp file mẫu — xóa hàm này + input file trong HTML để gỡ riêng ───
function bulkGenLoadTemplate(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const obj=JSON.parse(e.target.result);
      bulkGen.template=obj;
      bulkGen.templateName=file.name;
      bulkGen.generated=[];
      renderUtility();
    }catch(err){
      alert('File mẫu không phải JSON hợp lệ: '+err.message);
    }
  };
  reader.readAsText(file);
  input.value='';
}
// ── END box con 1 ──

// ─── Box con 2: Danh sách coin — xóa hàm này + textarea trong HTML để gỡ riêng ───
function bulkGenSetCoinList(text){
  bulkGen.coinListText=text;
}
function bulkGenParseCoins(){
  // ★ Tự thêm hậu tố "USDT" nếu người dùng chỉ gõ tên coin trần (vd "BTC" → "BTCUSDT"). Xóa .map(s=>s.endsWith('USDT')?s:s+'USDT') để gỡ, quay về nhập nguyên văn.
  return (bulkGen.coinListText||'')
    .split(/[,\n\r]+/)
    .map(s=>s.trim().toUpperCase())
    .filter(Boolean)
    .map(s=>s.endsWith('USDT')?s:s+'USDT');
}
// ── END box con 2 ──

// ─── Box con 3: Generate — xóa hàm này + nút "TẠO FILE" trong HTML để gỡ riêng ───
function _bulkGenFilenameSuffix(){
  // tách "hậu tố" từ tên file mẫu (vd "XRPUSDT_both.json" + coin gốc "XRPUSDT" → hậu tố "_both")
  const t=bulkGen.template, name=bulkGen.templateName||'';
  const base=name.replace(/\.json$/i,'');
  const origCoin=(t&&t.coin)?String(t.coin):'';
  if(origCoin&&base.toUpperCase().startsWith(origCoin.toUpperCase()))return base.slice(origCoin.length)||'_gen';
  return base?('_'+base):'_gen';
}
function bulkGenGenerate(){
  if(!bulkGen.template){alert('Chưa nạp file mẫu');return;}
  const coins=bulkGenParseCoins();
  if(!coins.length){alert('Chưa nhập danh sách coin');return;}
  const suffix=_bulkGenFilenameSuffix();
  bulkGen.generated=coins.map(coin=>{
    const obj=JSON.parse(JSON.stringify(bulkGen.template)); // clone sâu, giữ nguyên mọi field khác của mẫu
    obj.coin=coin;
    return {coin, obj, filename:coin+suffix};
  });
  renderUtility();
}
// ── END box con 3 ──

// ─── Box con 4: Save từng file / Save tất cả (.zip) — xóa hàm này + 2 nút Save trong HTML để gỡ riêng ───
function bulkGenSaveOne(i){
  const g=bulkGen.generated[i];
  if(!g)return;
  _downloadJson(g.obj,g.filename);
}
function bulkGenSaveAll(){
  if(!bulkGen.generated.length){alert('Chưa có file nào để lưu');return;}
  const enc=new TextEncoder();
  const files=bulkGen.generated.map(g=>({
    name:enc.encode(g.filename+'.json'),
    data:enc.encode(JSON.stringify(g.obj,null,2))
  }));
  const blob=new Blob([_makeZip(files)],{type:'application/zip'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='bulk_'+files.length+'-configs.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ─── CONSTANTS ───
const _btCache = {};
const BT_RSI_TF_MS = {'5m':300000,'15m':900000,'30m':1800000,'1h':3600000,'2h':7200000,'4h':14400000};
const BT_MACD_TF_MS = {'1h':3600000,'2h':7200000,'4h':14400000,'1d':86400000,'3d':259200000,'1w':604800000};
const BT_MACD_WARMUP = 200;
const BT_ENTRY_TFS = ['5m','15m','30m','1h'];

const BT_TREND_TFS = ['1h','2h','4h','1d','3d','1w'];

// ─── UTILITY FUNCTIONS (copy riêng, prefix bt_) ───
function bt_calcEMA(values,period){
  const k=2/(period+1),ema=new Array(values.length).fill(null);
  ema[0]=values[0];for(let i=1;i<values.length;i++)ema[i]=values[i]*k+ema[i-1]*(1-k);return ema;
}
function bt_calcRSI(closes,period){
  period=period||14;const rsi=new Array(closes.length).fill(null);
  if(closes.length<period+1)return rsi;
  let g=0,l=0;
  for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1];d>0?g+=d:l-=d;}
  let ag=g/period,al=l/period;
  rsi[period]=al===0?100:100-100/(1+ag/al);
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+(d>0?d:0))/period;al=(al*(period-1)+(d<0?-d:0))/period;
    rsi[i]=al===0?100:100-100/(1+ag/al);
  }
  return rsi;
}
function bt_calcMFI(highs,lows,closes,volumes,period=14){
  const tp=closes.map((c,i)=>(highs[i]+lows[i]+c)/3),mfi=new Array(closes.length).fill(null);
  for(let i=period;i<closes.length;i++){
    let pf=0,nf=0;
    for(let j=i-period+1;j<=i;j++){const mf=tp[j]*volumes[j];tp[j]>tp[j-1]?pf+=mf:tp[j]<tp[j-1]&&(nf+=mf);}
    mfi[i]=nf===0?100:100-(100/(1+pf/nf));
  }
  return mfi;
}
function bt_calcMacdHist(closes){
  const e12=bt_calcEMA(closes,12),e26=bt_calcEMA(closes,26);
  const diff=closes.map((_,i)=>e12[i]-e26[i]);
  const dea=bt_calcEMA(diff,9);return diff.map((d,i)=>d-dea[i]);
}
function bt_calcCMF(highs,lows,closes,volumes,period=20){
  const cmf=new Array(closes.length).fill(null);
  for(let i=period-1;i<closes.length;i++){
    let smv=0,sv=0;
    for(let j=i-period+1;j<=i;j++){const hl=highs[j]-lows[j];const mfm=hl===0?0:(2*closes[j]-lows[j]-highs[j])/hl;smv+=mfm*volumes[j];sv+=volumes[j];}
    cmf[i]=sv===0?0:smv/sv;
  }
  return cmf;
}
function bt_calcOBVdiff(closes,volumes,emaPeriod=20){
  const obv=new Array(closes.length).fill(0);
  for(let i=1;i<closes.length;i++)obv[i]=closes[i]>closes[i-1]?obv[i-1]+volumes[i]:closes[i]<closes[i-1]?obv[i-1]-volumes[i]:obv[i-1];
  const ema=bt_calcEMA(obv,emaPeriod);return obv.map((o,i)=>o-ema[i]);
}
function bt_bsearchMacd(opens,hist,signalTs,periodMs){
  let lo=0,hi=opens.length-1,res=-1;
  while(lo<=hi){const mid=(lo+hi)>>1;opens[mid]+periodMs<=signalTs?(res=mid,lo=mid+1):hi=mid-1;}
  return res>=0?hist[res]:null;
}
function bt_bsearchTs(opens,signalTs,periodMs){
  let lo=0,hi=opens.length-1,res=-1;
  while(lo<=hi){const mid=(lo+hi)>>1;opens[mid]+periodMs<=signalTs?(res=mid,lo=mid+1):hi=mid-1;}
  return res>=0?opens[res]:null;
}
// ★ BOX ĐỘC LẬP (Độ dốc filter) — bản sao bt_bsearchMacd() trả về CHỈ SỐ (idx) thay vì giá trị, để lấy thêm giá
// trị tại nến lùi k bước (hist[idx-k]). Không sửa bt_bsearchMacd() gốc. Xóa: xóa hàm này + bt_slopePass() bên
// dưới để gỡ, không ảnh hưởng gì khác.
function bt_bsearchMacdIdx(opens,signalTs,periodMs){
  let lo=0,hi=opens.length-1,res=-1;
  while(lo<=hi){const mid=(lo+hi)>>1;opens[mid]+periodMs<=signalTs?(res=mid,lo=mid+1):hi=mid-1;}
  return res;
}
// ★ BOX ĐỘC LẬP (Độ dốc filter) — kiểm tra "đang tăng dần"(buy)/"đang giảm dần"(sell) so với nến lùi
// btState.slopeK bước, cùng TF filter. Tắt (slopeOn=false, mặc định) → luôn true, không đổi hành vi cũ.
// Xóa: xóa hàm này + phần dùng nó trong 6 filter của BT_IND_BOXES để gỡ.
function bt_slopePass(data,idx,dir){
  if(!btState.slopeOn)return true;
  const k=Math.max(1,btState.slopeK|0);
  if(idx-k<0)return false;
  const vK=data.hist[idx-k];
  if(vK==null)return false;
  const vI=data.hist[idx];
  return dir==='buy'?vI>vK:vI<vK;
}
async function bt_fetchKlines(coin,startMs,endMs,tf){
  const key=`${coin}_${tf}_${startMs}_${endMs}`;
  if(_btCache[key])return _btCache[key];
  const spot='https://api.binance.com/api/v3/klines';
  const fut='https://fapi.binance.com/fapi/v1/klines';
  const bk='__base_'+coin;
  if(!_btCache[bk]){
    for(let a=0;a<3;a++){
      try{const r=await fetch(`${spot}?symbol=${coin}&interval=1h&limit=1`);
        if(r.ok){_btCache[bk]=spot;break;}else if(r.status===400){_btCache[bk]=fut;break;}}catch(e){}
      await new Promise(r=>setTimeout(r,500));
    }
    if(!_btCache[bk])throw new Error(coin+': không kết nối Binance');
  }
  const base=_btCache[bk];const all=[];let cur=startMs;
  while(cur<endMs){
    const url=`${base}?symbol=${coin}&interval=${tf}&startTime=${cur}&endTime=${endMs}&limit=1000`;
    const res=await fetch(url);if(!res.ok)throw new Error(coin+': HTTP '+res.status);
    const chunk=await res.json();if(!chunk.length)break;
    all.push(...chunk);if(chunk.length<1000)break;cur=chunk[chunk.length-1][0]+1;
  }
  _btCache[key]=all;return all;
}
function bt_genTrades(candles,hist,dir,startTs,endTs,level,tp,sl,maxOrders){
  const closes=candles.map(c=>parseFloat(c[4]));
  const highs=candles.map(c=>parseFloat(c[2]));
  const lows=candles.map(c=>parseFloat(c[3]));
  const opens=candles.map(c=>c[0]);
  const trades=[];let openExitBars=[];
  for(let i=16;i<candles.length-1;i++){
    if(hist[i-1]==null||hist[i]==null)continue;
    if(opens[i]<startTs||opens[i]>endTs)continue;
    openExitBars=openExitBars.filter(b=>b>i);
    if(maxOrders>0&&openExitBars.length>=maxOrders)continue;
    const sig=dir==='buy'?(hist[i-1]<level&&hist[i]>level):(hist[i-1]>level&&hist[i]<level);
    if(!sig)continue;
    const entry=closes[i];
    const tpP=dir==='buy'?entry*(1+tp/100):entry*(1-tp/100);
    const slP=dir==='buy'?entry*(1-sl/100):entry*(1+sl/100);
    let result='OPEN',pnl=null,exitBar=-1,exitTs=null,exitPrice=null; // ★ BOX ĐỘC LẬP (Giá thoát) — exitPrice=tpP/slP đã chạm, để hiện cột "Giá thoát" đối chiếu thủ công. Xóa biến này + field trong trades.push() để gỡ, không đổi pnl/netUsdt/kết quả nào khác.
    for(let j=i+1;j<candles.length;j++){
      if(dir==='buy'){if(highs[j]>=tpP){result='WIN';pnl=tp;exitBar=j;exitTs=opens[j];exitPrice=tpP;break;}if(lows[j]<=slP){result='LOSS';pnl=-sl;exitBar=j;exitTs=opens[j];exitPrice=slP;break;}}
      else{if(lows[j]<=tpP){result='WIN';pnl=tp;exitBar=j;exitTs=opens[j];exitPrice=tpP;break;}if(highs[j]>=slP){result='LOSS';pnl=-sl;exitBar=j;exitTs=opens[j];exitPrice=slP;break;}}
    }
    if(maxOrders>0)openExitBars.push(exitBar>0?exitBar:candles.length);
    trades.push({rawTs:opens[i],exitTs,entry,result,pnl,exitPrice,signalCandleTs:opens[i],signalVal:hist[i]});
  }
  return trades;
}

// ══════════════════════════════════════════════
//  GỘP VỊ THẾ THEO COIN — BOX ĐỘC LẬP (viết mới hoàn toàn, không đụng bt_genTrades/bt_genTradesDca)
//  Flow (d) đã chốt: mọi tín hiệu (RSI/MFI) trên cùng coin+chiều gộp thành 1 vị thế duy nhất.
//  - Entry mới LUÔN 100% Size USD (không phải 50%). Nấc ĐÃ khớp không bao giờ bị hủy — cộng dồn vĩnh viễn vào avgEntry.
//  - Chỉ lệnh DCA CHƯA khớp mới bị hủy khi có Entry mới; DCA1/DCA2 tính từ avgEntry HIỆN HÀNH (không cascading DCA1→DCA2 trong cùng 1 thang).
//  - avgEntry = tổng vốn $ ÷ tổng khối lượng coin (chuẩn sàn), y hệt công thức đã verify ở bt_genTradesDca().
//  - SL chỉ bật khi thang DCA hiện hành (DCA1+DCA2) khớp đủ cả 2; Entry mới luôn reset lại yêu cầu này (thang DCA mới từ avgEntry mới).
//  - Ưu tiên trong cùng 1 nến: TP → SL (nếu đã bật) → DCA (giá, thụ động) → Entry mới (xác nhận lúc đóng nến).
//  - Số lần Entry mới: không giới hạn. Đồng hồ chung = khung nhỏ nhất trong các entry box đang bật.
//  Để gỡ: xóa toàn bộ hàm này (tới hết _mergeSourcesLabel) + nhánh "if(btState.mergePositionOn)" trong runBacktest().
// ══════════════════════════════════════════════
async function bt_genMergedPositions(coin,dir,activeEntry,startMs,endMs){
  const s=btState;
  const sizeUsd=s.sizeUsd||100;
  // ★ Field DCA riêng của Gộp vị thế: mergeDca1Pct/mergeDca2Pct/mergeDca1SizePct/mergeDca2SizePct.
  const dca1Pct=s.mergeDca1Pct||1.5, dca2Pct=s.mergeDca2Pct||3;
  const dca1SizePct=s.mergeDca1SizePct||50, dca2SizePct=s.mergeDca2SizePct||50;
  const tp=s.tp, sl=s.sl;
  // ★ BOX ĐỘC LẬP con (Giới hạn Entry mới) — 0=không giới hạn.
  const mergeMaxEntries=s.mergeMaxEntries||0;

  // 1) sinh sự kiện entry ứng viên từ TỪNG entry box đang bật — LUÔN dùng bt_genTrades gốc (không bt_genTradesDca),
  //    maxOrders=0 để lấy MỌI lần cắt ngưỡng (không gate theo lệnh đang mở — gộp vị thế tự quản lý điều đó).
  //    Enrich y hệt pipeline chính (Nến Signal + từng chỉ báo MACD/CMF/OBV) để khi 1 sự kiện trở thành "Entry gốc" của
  //    1 vị thế, bảng kết quả ngoài có đủ thông số giám sát thủ công y hệt lúc tắt Gộp vị thế (★ theo yêu cầu).
  let events=[];
  const activeIndBoxes=BT_IND_BOXES.filter(b=>s[b.key].on);
  for(const eb of activeEntry){
    const st=s[eb.key];
    const pMs=BT_RSI_TF_MS[st.tf];
    const candles=await bt_fetchKlines(coin,startMs-eb.warmup(st.tf),endMs,st.tf);
    const hist=eb.buildHist(candles.slice(0,-1),st.period);
    let trades=bt_genTrades(candles,hist,dir,startMs,endMs,st.level,tp,sl,0);
    const opens=candles.map(c=>c[0]);
    for(const t of trades){
      t.signalCandleTs=bt_bsearchTs(opens,t.rawTs+pMs,pMs)??t.rawTs;
      t.signalVal=bt_bsearchMacd(opens,hist,t.rawTs+pMs,pMs)??t.signalVal;
    }
    // áp bộ lọc chỉ báo (MACD/CMF/OBV trade+trend) y hệt pipeline chính + gắn nến/giá trị chỉ báo lên từng trade ứng viên
    for(const box of activeIndBoxes){
      const bs=s[box.key];
      let primaryData=null;
      for(const tf of bs.tfs){
        const ipMs=BT_MACD_TF_MS[tf];
        const iC=await bt_fetchKlines(coin,startMs-box.warmup(ipMs),endMs,tf);
        const cl=iC.slice(0,-1);
        const iOpens=cl.map(c=>c[0]); const iHist=box.buildHist(cl);
        const data={opens:iOpens,hist:iHist,pMs:ipMs};
        trades=box.filter(trades,data,dir);
        if(!primaryData)primaryData=data;
      }
      if(primaryData){
        for(const t of trades){
          t[box.key+'CandleTs']=bt_bsearchTs(primaryData.opens,t.rawTs,primaryData.pMs);
          t[box.key+'Val']=bt_bsearchMacd(primaryData.opens,primaryData.hist,t.rawTs,primaryData.pMs);
          t[box.key+'Tf']=bs.tfs[0];
        }
      }
    }
    for(const t of trades){
      const indFields={};
      for(const box of activeIndBoxes) indFields[box.key]={candleTs:t[box.key+'CandleTs'],val:t[box.key+'Val'],tf:t[box.key+'Tf']};
      events.push({ts:t.rawTs,price:t.entry,source:eb.label,tf:st.tf,
        signalCandleTs:t.signalCandleTs,signalVal:t.signalVal,indFields});
    }
  }
  events.sort((a,b)=>a.ts-b.ts);
  if(!events.length)return [];

  // 2) "đồng hồ chung" — khung nhỏ nhất trong các entry box đang bật, theo dõi giá liên tục cho TP/SL/DCA
  const masterTf=activeEntry.map(eb=>s[eb.key].tf).sort((a,b)=>BT_RSI_TF_MS[a]-BT_RSI_TF_MS[b])[0];
  const masterCandles=await bt_fetchKlines(coin,startMs,endMs,masterTf);
  if(!masterCandles.length)return [];
  const mOpens=masterCandles.map(c=>c[0]);
  const mHigh=masterCandles.map(c=>parseFloat(c[2]));
  const mLow=masterCandles.map(c=>parseFloat(c[3]));

  const eventsByTs=new Map();
  for(const e of events){ if(!eventsByTs.has(e.ts))eventsByTs.set(e.ts,[]); eventsByTs.get(e.ts).push(e); }

  function newDcaLadder(avgEntry){
    return {
      dca1Price: dir==='buy'?avgEntry*(1-dca1Pct/100):avgEntry*(1+dca1Pct/100),
      dca2Price: dir==='buy'?avgEntry*(1-dca2Pct/100):avgEntry*(1+dca2Pct/100),
      dca1Filled:false, dca2Filled:false,
    };
  }
  function recalcTpSl(avgEntry){
    return {
      tp: dir==='buy'?avgEntry*(1+tp/100):avgEntry*(1-tp/100),
      sl: dir==='buy'?avgEntry*(1-sl/100):avgEntry*(1+sl/100),
    };
  }
  function openPosition(e,ts){
    const costUsd=sizeUsd, qty=costUsd/e.price;
    const p={ legs:[{type:'Entry gốc',price:e.price,ts,costUsd,source:e.source,tf:e.tf}],
      totalCost:costUsd, totalQty:qty, avgEntry:e.price, slArmed:false, entryTs:ts,
      // ★ mang theo chỉ số của Entry gốc (tín hiệu/TF/nến signal/từng chỉ báo) để bảng kết quả ngoài hiển thị đủ như lệnh thường
      entrySignal:e.source, entryTf:e.tf, signalCandleTs:e.signalCandleTs, signalVal:e.signalVal, indFields:e.indFields };
    Object.assign(p,recalcTpSl(p.avgEntry));
    Object.assign(p,newDcaLadder(p.avgEntry));
    return p;
  }
  function addLeg(p,type,price,costUsd,ts,source,tf){
    const qty=costUsd/price;
    p.totalCost+=costUsd; p.totalQty+=qty; p.avgEntry=p.totalCost/p.totalQty;
    Object.assign(p,recalcTpSl(p.avgEntry));
    p.legs.push({type,price,ts,costUsd,source:source||null,tf:tf||null});
  }
  function resetLadder(p){ Object.assign(p,newDcaLadder(p.avgEntry)); p.slArmed=false; }
  function finalize(p,result,exitTs,exitPrice){
    const pnl=result==='WIN'?tp:result==='LOSS'?-sl:null;
    // dca1Hit/dca2Hit — CHỈ tính nấc DCA thuộc thang của Entry gốc (trước khi có "Entry mới" đầu tiên, nếu có) để giám sát đúng theo entry gốc
    let dca1Hit=null, dca2Hit=null;
    for(const l of p.legs){ if(l.type==='Entry mới')break; if(l.type==='DCA1')dca1Hit=l.price; if(l.type==='DCA2')dca2Hit=l.price; }
    const out={ coin,dir,entrySignal:p.entrySignal,entryTf:p.entryTf,
      rawTs:p.entryTs, exitTs:exitTs??null, exitPrice:exitPrice??null,
      entry:p.legs[0].price, avgEntry:parseFloat(p.avgEntry.toFixed(8)),
      totalSizeUsed:parseFloat(p.totalCost.toFixed(6)),
      legsCount:p.legs.length, legs:p.legs, entrySources:_mergeSourcesLabel(p.legs),
      dca1Hit, dca2Hit,
      tp:p.tp, sl:p.slArmed?p.sl:null, result, pnl,
      signalCandleTs:p.signalCandleTs, signalVal:p.signalVal };
    if(p.indFields) for(const k in p.indFields){ out[k+'CandleTs']=p.indFields[k].candleTs; out[k+'Val']=p.indFields[k].val; out[k+'Tf']=p.indFields[k].tf; }
    return out;
  }

  const closedTrades=[]; let pos=null;
  for(let j=0;j<masterCandles.length;j++){
    const ts=mOpens[j], hi=mHigh[j], lo=mLow[j];
    if(ts<startMs||ts>endMs)continue;

    if(pos){ const tpHit=dir==='buy'?hi>=pos.tp:lo<=pos.tp;
      if(tpHit){ closedTrades.push(finalize(pos,'WIN',ts,pos.tp)); pos=null; } }
    if(pos){ const slHit=pos.slArmed&&(dir==='buy'?lo<=pos.sl:hi>=pos.sl);
      if(slHit){ closedTrades.push(finalize(pos,'LOSS',ts,pos.sl)); pos=null; } }
    if(pos){
      if(!pos.dca1Filled&&(dir==='buy'?lo<=pos.dca1Price:hi>=pos.dca1Price)){
        addLeg(pos,'DCA1',pos.dca1Price,sizeUsd*dca1SizePct/100,ts); pos.dca1Filled=true;
      }
      if(pos.dca1Filled&&!pos.dca2Filled&&(dir==='buy'?lo<=pos.dca2Price:hi>=pos.dca2Price)){
        addLeg(pos,'DCA2',pos.dca2Price,sizeUsd*dca2SizePct/100,ts); pos.dca2Filled=true; pos.slArmed=true;
      }
    }
    const evs=eventsByTs.get(ts);
    if(evs){
      for(const e of evs){
        if(!pos){ pos=openPosition(e,ts); }
        else{
          // ★ BOX ĐỘC LẬP con (Giới hạn Entry mới) — đã đủ mergeMaxEntries lần thì bỏ qua tín hiệu, giữ nguyên vị thế hiện tại.
          const entryMoiCount=pos.legs.filter(l=>l.type==='Entry mới').length;
          if(mergeMaxEntries>0&&entryMoiCount>=mergeMaxEntries){ continue; }
          addLeg(pos,'Entry mới',e.price,sizeUsd,ts,e.source,e.tf); resetLadder(pos);
        }
      }
    }
  }
  if(pos)closedTrades.push(finalize(pos,'OPEN',null));
  return closedTrades;
}
function _mergeSourcesLabel(legs){
  const counts={};
  for(const l of legs){ if(!l.source)continue; counts[l.source]=(counts[l.source]||0)+1; }
  return Object.entries(counts).map(([k,v])=>`${k}×${v}`).join(', ')||'—';
}

function btLocalTime(ts){
  if(!ts)return '—';
  const d=new Date(ts),p=n=>String(n).padStart(2,'0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function btParseDate(str){
  if(!str)return null;
  if(str.includes('-')){const[y,m,d]=str.split('-').map(Number);return Date.UTC(y,m-1,d);}
  const[d,m,y]=str.split('/').map(Number);return Date.UTC(y<100?2000+y:y,m-1,d);
}

function btStateFromConfig(cfg){
  ['coin','sizeUsd','leverage','start','end','tp','sl','fee','dir','maxOrders'].forEach(k=>{if(cfg[k]!=null)btState[k]=cfg[k];});
  // Entry boxes: flat format (entrySignal, entryTf, level, period)
  // ★ BOX ĐỘC LẬP (Multi-entry "both") — entrySignal==="both": bật CẢ RSI VÀ MFI, nạp riêng theo rsiTf/rsiPeriod/rsiLevel + mfiTf/mfiPeriod/mfiLevel.
  // entrySignal khác "both" (file cũ/1 entry): GIỮ NGUYÊN logic gốc bên dưới, không đổi gì — file cũ đọc y hệt trước.
  // Để gỡ: xóa nhánh "if(cfg.entrySignal==='both'){...}" này, chỉ giữ lại nhánh else (logic gốc).
  const sig=cfg.entrySignal||'rsi';
  if(sig==='both'){
    for(const eb of BT_ENTRY_BOXES){
      btState[eb.key].on=true;
      const tfK=eb.signal+'Tf', perK=eb.signal+'Period', lvlK=eb.signal+'Level';
      if(cfg[tfK])btState[eb.key].tf=cfg[tfK];
      if(cfg[lvlK]!=null)btState[eb.key].level=cfg[lvlK];
      if(cfg[perK]!=null)btState[eb.key].period=cfg[perK];
    }
  }else{
    for(const eb of BT_ENTRY_BOXES){
      btState[eb.key].on=(eb.signal===sig);
      if(eb.signal===sig){
        if(cfg.entryTf)btState[eb.key].tf=cfg.entryTf;
        if(cfg.level!=null)btState[eb.key].level=cfg.level;
        if(cfg.period!=null)btState[eb.key].period=cfg.period;
      }
    }
  }
  // Ind boxes: flat format (string TF hoặc null)
  for(const b of BT_IND_BOXES){
    const v=cfg[b.key];
    if(v&&typeof v==='string'){
      btState[b.key].on=true;
      btState[b.key].tfs=v.split(',').map(t=>t.trim()).filter(Boolean);
    } else {
      btState[b.key].on=false;
    }
  }
  // ★ BOX ĐỘC LẬP (Gộp vị thế DCA) — file có field "dca1Pct" → TỰ BẬT mergePositionOn; file không có → TỰ TẮT.
  // (Đổi từ hành vi cũ "toggle do UI quyết định" sang tự động theo đúng nội dung file, áp dụng chung cho cả
  // Backtest Detail load tay lẫn Sim — Sim vốn đã tự làm việc này riêng, giờ nhất quán ở đúng 1 chỗ).
  // Để gỡ: xóa dòng "btState.mergePositionOn=cfg.dca1Pct!=null;" để quay lại "toggle do UI quyết định" như cũ,
  // không ảnh hưởng 5 dòng cập nhật %DCA bên dưới (giữ nguyên, không đổi).
  btState.mergePositionOn=cfg.dca1Pct!=null;
  if(cfg.dca1Pct!=null)btState.mergeDca1Pct=cfg.dca1Pct;
  if(cfg.dca2Pct!=null)btState.mergeDca2Pct=cfg.dca2Pct;
  if(cfg.dca1SizePctOfEntry!=null)btState.mergeDca1SizePct=cfg.dca1SizePctOfEntry;
  if(cfg.dca2SizePctOfEntry!=null)btState.mergeDca2SizePct=cfg.dca2SizePctOfEntry;
  if(cfg.mergeMaxEntries!=null)btState.mergeMaxEntries=cfg.mergeMaxEntries;
  // ★ BOX ĐỘC LẬP (Độ dốc filter) — file có field "slopeOn" → TỰ BẬT + nạp đúng slopeK; file không có → TỰ TẮT.
  // Áp dụng chung cho cả Backtest Detail load tay lẫn Sim (cùng qua hàm này). Xóa: xóa 2 dòng dưới để gỡ, quay
  // về giữ nguyên slopeOn/slopeK đang có trên UI khi load file, không tự đổi theo file nữa.
  btState.slopeOn=cfg.slopeOn===true;
  btState.slopeK=cfg.slopeK||1;
}

function loadBtConfigs(files){
  btState.configs=[];let loaded=0;
  for(const f of files){
    const reader=new FileReader();
    reader.onload=e=>{
      try{btState.configs.push({...JSON.parse(e.target.result),_checked:true,_name:f.name});}
      catch(err){console.error('Parse lỗi:',f.name,err);}
      if(++loaded===files.length){
        // sắp xếp theo tên file (001_, 002_…) để giữ đúng thứ tự, khớp số Slot — đọc bất đồng bộ nên phải sort lại
        btState.configs.sort((a,b)=>String(a._name||'').localeCompare(String(b._name||''),undefined,{numeric:true}));
        renderBacktest();
      }
    };
    reader.readAsText(f);
  }
}

    const reader=new FileReader();
    const fin=()=>{
      if(++done===total){
        btState.configs.sort((a,b)=>String(a._name||'').localeCompare(String(b._name||''),undefined,{numeric:true})); // giữ thứ tự 001,002… (numeric)
        btSetStatus('✅ Đã nạp '+btState.configs.length+' config từ thư mục');
        renderBacktest();
      } else if(done%200===0){ btSetStatus('⏳ Đang đọc '+done+'/'+total+' file...'); }
    };
    reader.onload=e=>{ try{btState.configs.push({...JSON.parse(e.target.result),_checked:true,_name:f.name});}catch(err){console.error('Parse lỗi:',f.name,err);} fin(); };
    reader.onerror=fin;
    reader.readAsText(f);
  });
}
