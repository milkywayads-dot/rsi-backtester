        ${!s.running&&done.length?`<div style="font-size:11px;color:var(--dim);margin-top:6px;">Đã chạy xong ${done.length}/${s.segments.length} đoạn có kết quả.</div>`:''}
      </div>

      ${st?`
      <!-- 3. Kiểm tra ổn định — modul con, xóa div này + hàm wfo_computeStability + field "stability" để đổi/gỡ riêng công thức -->
      <div style="margin-bottom:12px;">
        <div style="font-size:10px;font-weight:700;color:var(--hi);letter-spacing:1px;margin-bottom:8px;">3. KIỂM TRA ỔN ĐỊNH (đạt ${[st.passA,st.passB,st.passC,st.passD].filter(Boolean).length}/4)</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;">
          ${[
            {k:'a',label:'Đoạn dương',val:st.positiveRatio.toFixed(2),pass:st.passA},
            {k:'b',label:'Bỏ đoạn tốt nhất',val:(st.totalWithoutBest>=0?'+':'')+st.totalWithoutBest.toFixed(1)+'%',pass:st.passB},
            {k:'c',label:'WFE',val:st.wfe.toFixed(2),pass:st.passC},
            {k:'d',label:'Tham số ổn định',val:'CV '+Math.max(st.paramCV.tp,st.paramCV.sl).toFixed(2),pass:st.passD},
            // ★ Thẻ tham khảo (không tính vào "đạt mấy/4") — tổng Net PnL% cộng dồn tất cả đoạn OOS, dễ bị 1 đoạn
            // ăn may kéo lên nên chỉ mang tính tổng quan, thẻ "Bỏ đoạn tốt nhất" mới là thẻ kiểm định thật.
            {k:'e',label:'Tổng Net PnL% OOS',val:(st.totalOosPct>=0?'+':'')+st.totalOosPct.toFixed(1)+'%',pass:null},
          ].map(m=>{
            const c=m.pass===null?'var(--acc)':(m.pass?'var(--grn)':'var(--red)');
            const bg=m.pass===null?'rgba(79,70,229,.06)':(m.pass?'rgba(22,163,74,.08)':'rgba(220,38,38,.08)');
            return `<div style="background:${bg};border:1px solid ${c};border-radius:10px;padding:8px 10px;">
            <div style="display:flex;align-items:center;justify-content:space-between;">
              <span style="font-size:10px;font-weight:700;color:${c};">${m.label}${m.pass===null?' (tham khảo)':''}</span>
              <span onclick="wfoState.showFormulaKey='${m.k}';renderUtility()" title="Xem giải thích chi tiết" style="cursor:pointer;font-size:11px;font-weight:900;color:${c};border:1px solid ${c};border-radius:50%;width:15px;height:15px;display:flex;align-items:center;justify-content:center;">i</span>
            </div>
            <div style="font-size:15px;font-weight:800;color:${c};margin-top:2px;">${m.val}</div>
          </div>`;}).join('')}
        </div>
        <!-- Danh sách config đã chọn từng đoạn, chuyển tiếp sang Monte Carlo — modul con, xóa khối này + field
        "showSegList" để gỡ riêng, không ảnh hưởng 4 công thức phía trên hay Monte Carlo phía dưới. -->
        <div style="margin-top:8px;">
          <div onclick="wfoState.showSegList=!wfoState.showSegList;renderUtility()" style="cursor:pointer;font-size:10px;color:var(--acc);font-weight:700;">
            ${s.showSegList?'▲ Ẩn':'▼ Xem'} danh sách ${done.length} config đã chọn (đã qua IS+OOS, chuyển tiếp sang Monte Carlo)
          </div>
          ${s.showSegList?`
          <div style="font-size:9px;color:var(--dim);margin:5px 0 6px;">Mỗi dòng = 1 đoạn IS đã tối ưu xong + test mù trên đúng OOS kế tiếp. "Kết quả OOS" là %lãi sau phí của riêng đoạn đó (đã gộp vào Monte Carlo); dòng đỏ = đoạn lỗ, dòng xanh = đoạn lãi.</div>
          <div style="font-size:9px;color:var(--acc);font-weight:700;margin-bottom:6px;">★ Danh sách config thỏa mãn điều kiện ★ (Số lệnh tối thiểu/đoạn + Win rate tối thiểu, tính trên IS) — đoạn nào không tổ hợp nào đạt cả 2 điều kiện này đã bị loại, không xuất hiện ở đây.</div>
          ${s.selectMethod==='plateau'&&done.length?(()=>{const matched=done.filter(x=>x.rawRank===1).length;return `<div style="font-size:9px;color:var(--dim);margin-bottom:6px;">🏔 Đang chọn theo Vùng cao nguyên · ${matched}/${done.length} đoạn trùng với top-1 netpnl gốc, ${done.length-matched}/${done.length} đoạn khác top-1 (xem cột "Hạng gốc").</div>`;})():''}
          <div style="max-height:220px;overflow-y:auto;border:1px solid var(--b2);border-radius:8px;">
            <table style="width:100%;border-collapse:collapse;font-size:10px;">
              <thead><tr style="position:sticky;top:0;background:var(--bg2);">
                <th style="padding:5px 7px;text-align:left;">#</th>
                <th style="padding:5px 7px;text-align:left;">IS → OOS</th>
                <th style="padding:5px 7px;text-align:left;">Tham số thắng</th>
                <th style="padding:5px 7px;text-align:right;" title="Số lệnh của tổ hợp thắng khi chạy Optimize trên IS">Lệnh IS</th>
                <th style="padding:5px 7px;text-align:right;" title="Net PnL% (đã trừ phí) của tổ hợp thắng, TRÊN CHÍNH đoạn IS đã tối ưu ra nó">Kết quả IS</th>
                <th style="padding:5px 7px;text-align:right;">Lệnh OOS</th>
                <th style="padding:5px 7px;text-align:right;">Kết quả OOS</th>
                <th style="padding:5px 7px;text-align:right;" title="Winner đứng thứ mấy trong bảng xếp hạng netPnl gốc của IS — #1 nghĩa là trùng với 'lời nhất', số khác #1 nghĩa là Vùng cao nguyên đã chọn khác tổ hợp lời nhất đơn lẻ.">Hạng gốc</th>
              </tr></thead>
              <tbody>
                ${done.map((seg,i)=>{
                  const w=seg.winner;
                  const indTxt=INDICATOR_BOXES.filter(b=>w[b.key+'Tf']&&w[b.key+'Tf']!=='none').map(b=>b.label.split(' ')[0]+' '+w[b.key+'Tf']).join(', ')||'không filter';
                  const pos=seg.oosPct>=0;
                  const isTop1=seg.rawRank===1;
                  return `<tr style="border-top:1px solid var(--b1);${pos?'':'background:rgba(220,38,38,.05);'}">
                    <td style="padding:5px 7px;color:var(--dim);">${i+1}</td>
                    <td style="padding:5px 7px;color:var(--dim);white-space:nowrap;">${wfo_dmy(seg.seg.isStart)}→${wfo_dmy(seg.seg.isEnd)} · <span style="color:var(--hi)">${wfo_dmy(seg.seg.oosStart)}→${wfo_dmy(seg.seg.oosEnd)}</span></td>
                    <td style="padding:5px 7px;color:var(--dim);">${w.entrySignal.toUpperCase()} ${w.entryTf} · ${w.dir} · Lv${w.level} · TP${w.tp}/SL${w.sl} · P${w.period} · ${esc(indTxt)}</td>
                    <td style="padding:5px 7px;text-align:right;color:var(--dim);">${w.trades}</td>
                    <td style="padding:5px 7px;text-align:right;color:var(--dim);">${seg.isPct>=0?'+':''}${seg.isPct.toFixed(1)}%</td>
                    <td style="padding:5px 7px;text-align:right;color:var(--hi);">${seg.trades}</td>
                    <td style="padding:5px 7px;text-align:right;font-weight:700;color:${pos?'var(--grn)':'var(--red)'};">${pos?'+':''}${seg.oosPct.toFixed(1)}%</td>
                    <td style="padding:5px 7px;text-align:right;font-weight:700;color:${isTop1?'var(--dim)':'#f59e0b'};">#${seg.rawRank}/${seg.rawTotal}</td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
          ${s.segments.length>done.length?`<div style="font-size:9px;color:var(--dim);margin-top:5px;">+ ${s.segments.length-done.length} đoạn bị bỏ qua (không tìm được tổ hợp thỏa "Số lệnh tối thiểu"/"Win rate tối thiểu" trong IS) — không tính vào Monte Carlo.</div>`:''}
          `:''}
        </div>
      </div>

      <!-- 4. Monte Carlo — modul con riêng, xóa div này + hàm wfo_runMonteCarlo + field "mc" để gỡ, không ảnh hưởng WFO -->
      <div style="margin-bottom:12px;">
        <div style="font-size:10px;font-weight:700;color:var(--hi);letter-spacing:1px;margin-bottom:8px;">4. MONTE CARLO (${s.mergedTrades.length} lệnh OOS đã ghép)</div>
        ${!s.mc.ddList.length?`<button onclick="wfo_runMonteCarlo()" ${s.mc.running?'disabled':''} style="padding:8px 16px;border-radius:8px;cursor:pointer;font:700 11px/1 'Outfit',sans-serif;background:rgba(79,70,229,.08);border:1.5px solid var(--acc);color:var(--acc);">${s.mc.running?'⏳ Đang xáo trộn...':'🎲 Chạy Monte Carlo (10.000 lần)'}</button>`:`
        <div style="background:var(--bg0);border-radius:10px;padding:10px 12px;display:flex;gap:14px;align-items:center;">
          <div style="display:flex;align-items:flex-end;gap:3px;height:50px;">
            ${s.mc.histogram.map(v=>{const max=Math.max(...s.mc.histogram)||1;return `<div style="width:8px;height:${Math.max(3,v/max*50)}px;background:var(--acc);border-radius:2px;"></div>`;}).join('')}
          </div>
          <div>
            <div style="font-size:9px;color:var(--dim);">Max drawdown, 95% các lần xáo trộn (trên vốn dự kiến $${s.capital.toLocaleString()})</div>
            <div style="font-size:16px;font-weight:800;color:var(--hi);">dưới $${Math.round(s.mc.p95).toLocaleString()} <span style="font-size:12px;color:var(--dim);">(${(s.mc.p95/s.capital*100).toFixed(1)}%)</span></div>
          </div>
          <button onclick="wfo_runMonteCarlo()" style="margin-left:auto;font-size:10px;color:var(--dim);background:none;border:1px solid var(--b2);border-radius:6px;padding:4px 10px;cursor:pointer;">↻ Chạy lại</button>
        </div>`}
      </div>

      <!-- 5. Config cuối để deploy — modul con, xóa div này + hàm wfo_exportLastConfig để gỡ riêng -->
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--hi);letter-spacing:1px;margin-bottom:8px;">5. CONFIG ĐỂ TRADE THẬT (Optimize IS sát hiện tại, chưa chạy OOS)</div>
        <div style="background:var(--bg0);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
          <div>${wfo_lastWinnerHtml()}</div>
          <button onclick="wfo_exportLastConfig()" style="padding:7px 16px;border-radius:8px;cursor:pointer;font:700 11px/1 'Outfit',sans-serif;background:rgba(22,163,74,.1);border:1.5px solid var(--grn);color:var(--grn);flex-shrink:0;">💾 Xuất config</button>
        </div>
      </div>
      `:!s.running?(
        s.statusMsg.includes('❌')
          ? `<div style="font-size:11px;color:var(--red);background:rgba(220,38,38,.06);border:1px solid var(--red);border-radius:8px;padding:8px 12px;">${esc(s.statusMsg)}</div>`
          : s.segments.length
            ? `<div style="font-size:11px;color:var(--red);background:rgba(220,38,38,.06);border:1px solid var(--red);border-radius:8px;padding:8px 12px;">⚠ Đã chạy ${s.segments.length} đoạn nhưng KHÔNG đoạn nào tìm được tổ hợp thỏa "Số lệnh tối thiểu/đoạn" (${s.minTrades}) hoặc "Win rate tối thiểu" (${s.minWR}%) trong IS — thử giảm 2 ngưỡng này, nới bớt filter trade/trend đang bật (1c/1d), hoặc tăng IS dài hơn để có nhiều lệnh hơn mỗi đoạn.</div>`
            : '<div style="font-size:11px;color:var(--dim);">Chưa có kết quả — chỉnh cấu hình rồi bấm Chạy WFO.</div>'
      ):''}
      `:''}
    </div>
    ${s.showPlateauInfo?wfo_plateauInfoModalHtml():''}
    ${s.showFormulaKey?wfo_formulaInfoModalHtml(s.showFormulaKey):''}
  `;
}
// ★ Popup giải nghĩa Vùng cao nguyên — modul con riêng, xóa hàm này + "${s.showPlateauInfo?...}" ở trên + nút (i)
// trong 1a + field "showPlateauInfo" trong wfoState để gỡ, không ảnh hưởng cách chọn winner đang chạy thật.
function wfo_plateauInfoModalHtml(){
  return `<div onclick="if(event.target===this){wfoState.showPlateauInfo=false;renderUtility();}" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:var(--bg1);border:1px solid var(--b2);border-radius:14px;padding:18px;max-width:460px;max-height:82vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:900;color:#f59e0b;">🏔 Cách tính Vùng cao nguyên</div>
        <span onclick="wfoState.showPlateauInfo=false;renderUtility()" style="cursor:pointer;font-size:16px;color:var(--dim);padding:0 4px;">✕</span>
      </div>
      <div style="font-size:11px;color:var(--hi);line-height:1.6;">
        <b>Bước 1 — Sắp xếp:</b> lấy toàn bộ tổ hợp TP/SL/RSI đã thỏa "Số lệnh tối thiểu"/"Win rate tối thiểu" trong IS, sắp theo Net PnL (đã trừ phí) từ cao xuống thấp.
        <br><br>
        <b>Bước 2 — Lấy Top 30%:</b> chỉ giữ lại 30% số dòng đứng đầu (nhóm đã đủ tốt, loại hết vùng lỗ) — không xét cao nguyên trên toàn bộ danh sách, để tránh chọn nhầm 1 "vùng phẳng nhưng toàn lỗ".
        <br><br>
        <b>Bước 3 — Tìm hàng xóm:</b> với mỗi tổ hợp trong Top 30%, tìm các tổ hợp KHÁC có cùng RSI period/hướng lệnh/entry TF/filter TF, chỉ khác đúng TP hoặc SL lệch 1 bậc liền kề trong bảng giá trị (ví dụ TP=2.5 thì hàng xóm là TP=2 và TP=3).
        <br><br>
        <b>Công thức điểm cao nguyên:</b>
        <div style="background:var(--bg0);border-radius:8px;padding:8px 10px;margin:6px 0;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--acc);">
          điểm(x) = trung bình NetPnL của [ x + các hàng xóm tìm được ]
        </div>
        <b>Bước 4 — Chọn winner:</b> trong nhóm Top 30%, lấy tổ hợp có điểm cao nguyên CAO NHẤT — không phải tổ hợp có NetPnL riêng cao nhất.
        <br><br>
        <b>Vì sao khác "Lời nhất (top-1)":</b> top-1 chỉ nhìn đúng 1 con số của chính nó, dễ chọn nhầm "đỉnh nhọn" (số đẹp do ăn may, hàng xóm toàn xấu). Vùng cao nguyên ưu tiên tổ hợp mà xung quanh nó cũng tốt — ít nhạy cảm với sai số nhỏ, đáng tin hơn khi mang ra trade thật.
        <br><br>
        <span style="color:var(--dim);">Xem cột "Hạng gốc" trong bảng danh sách config (mục 3) để biết winner mỗi đoạn có trùng với "Lời nhất" (#1) hay không.</span>
      </div>
    </div>
  </div>`;
}
// ★ Popup giải nghĩa 4 công thức ổn định — modul con riêng, xóa hàm này + field "showFormulaKey" trong wfoState
// + dòng "${s.showFormulaKey?...}" cuối wfo_boxHtml() + đổi icon (i) ở mục 3 về kiểu cũ để gỡ, không ảnh hưởng
// cách tính wfo_computeStability() đang chạy thật.
function wfo_formulaInfoModalHtml(k){
  const st=wfoState.stability;
  const DETAIL={
    a:{
      title:'Đoạn dương (positiveRatio)',
      formula:'positiveRatio = (số đoạn OOS có lãi) / (tổng số đoạn N)',
      body:`<b>Đo gì:</b> trong toàn bộ các đoạn OOS (test mù) đã chạy, bao nhiêu phần trăm đoạn có kết quả dương (lãi)?<br><br>
        <b>Cách tính:</b> đếm số dòng "Kết quả OOS" tô xanh trong bảng danh sách mục 3, chia cho tổng số dòng.<br><br>
        ${st?`<b>Của bạn:</b> ${Math.round(st.positiveRatio*st.N)}/${st.N} đoạn có lãi → positiveRatio = ${st.positiveRatio.toFixed(2)}.<br><br>`:''}
        <b>Ngưỡng ≥ 0.6:</b> ít nhất 6/10 đoạn phải có lãi. Nếu thấp hơn, nghĩa là tổng lãi chỉ nhờ vài đoạn ăn may hiếm hoi kéo lên, không phải thắng đều đặn theo thời gian.`
    },
    b:{
      title:'Bỏ đoạn tốt nhất (totalWithoutBest)',
      formula:'totalWithoutBest = (tổng %OOS tất cả đoạn) − (%OOS của đoạn cao nhất)',
      body:`<b>Đo gì:</b> cộng dồn kết quả %OOS của TẤT CẢ các đoạn, sau đó trừ đi đúng đoạn có kết quả tốt nhất — xem phần còn lại có còn dương không.<br><br>
        <b>Vì sao cần:</b> nếu tổng lãi toàn bộ chỉ dương nhờ đúng 1 đoạn ăn may cực lớn (còn lại toàn lỗ), bỏ đoạn đó ra sẽ lộ ngay sự thật — chiến lược không thắng đều, chỉ ăn may 1 lần.<br><br>
        ${st?`<b>Của bạn:</b> ${st.totalWithoutBest>=0?'+':''}${st.totalWithoutBest.toFixed(1)}% — ${st.totalWithoutBest>0?'vẫn dương sau khi bỏ đoạn tốt nhất, đạt ngưỡng.':'ÂM sau khi bỏ đoạn tốt nhất — nghĩa là không có đoạn ăn may đó, tổng thể đang lỗ.'}<br><br>`:''}
        <b>Ngưỡng > 0:</b> dù bỏ đoạn ăn may nhất, tổng các đoạn còn lại vẫn phải dương.`
    },
    c:{
      title:'WFE — Walk-Forward Efficiency',
      formula:'WFE = trung bình %lãi các đoạn OOS / trung bình %lãi các đoạn IS',
      body:`<b>Đo gì:</b> hiệu suất lúc test mù (OOS) còn giữ được bao nhiêu % so với lúc tối ưu (IS) — đo khoảng cách giữa "trong phòng thí nghiệm" và "ngoài đời thật".<br><br>
        <b>Ví dụ dễ hiểu:</b> IS trung bình lãi 40%/đoạn (lúc dò tham số, đã biết trước kết quả), OOS trung bình chỉ lãi 4%/đoạn (lúc test mù) → WFE = 4/40 = 0.1 → tham số chỉ đúng trong phòng thí nghiệm, ra đời thực gần như mất sạch hiệu quả.<br><br>
        ${st?`<b>Của bạn:</b> WFE = ${st.wfe.toFixed(2)} — ${st.passC?'OOS giữ được phần lớn hiệu suất so với IS, đáng tin.':'OOS mất phần lớn hiệu suất so với IS, dấu hiệu overfit khi tối ưu.'}<br><br>`:''}
        <b>Ngưỡng ≥ 0.5:</b> OOS phải giữ được ít nhất một nửa hiệu suất so với IS. Đây là chỉ số gốc của Robert Pardo, cha đẻ phương pháp Walk-Forward, không phải tự nghĩ ra.`
    },
    d:{
      title:'Tham số ổn định (CV / modeRatio)',
      formula:'CV = stdev(TP hoặc SL qua các đoạn)/mean(...)   ·   modeRatio = (số đoạn chọn đúng period/hướng phổ biến nhất)/N',
      body:`<b>Đo gì:</b> qua nhiều đoạn IS khác nhau, tham số thắng (TP%, SL%, RSI period, hướng lệnh...) có luôn na ná nhau, hay nhảy lung tung mỗi đoạn 1 kiểu?<br><br>
        <b>Vì sao quan trọng:</b> nếu đoạn này chọn TP2/SL3, đoạn sau lại TP5/SL1 — nghĩa là Optimizer đang "vơ được gì hay nấy" mỗi đoạn, không tìm ra quy luật xuyên suốt, dấu hiệu overfit riêng lẻ từng đoạn.<br><br>
        ${st?`<b>Của bạn:</b> CV(TP) = ${st.paramCV.tp.toFixed(2)}, CV(SL) = ${st.paramCV.sl.toFixed(2)}, modeRatio(period) = ${st.periodMode.toFixed(2)} — ${st.passD?'tham số khá ổn định qua các đoạn.':'tham số dao động khá mạnh qua các đoạn.'}<br><br>`:''}
        <b>Ngưỡng:</b> CV < 0.4 (TP/SL dao động dưới 40% so với trung bình) và modeRatio ≥ 0.5 (ít nhất nửa số đoạn đồng thuận cùng 1 period/hướng).`
    },
    e:{
      title:'Tổng Net PnL% OOS (tham khảo)',
      formula:'totalOosPct = tổng cộng dồn %OOS (đã trừ phí) của TẤT CẢ đoạn',
      body:`<b>Đo gì:</b> cộng thẳng %lãi/lỗ OOS của mọi đoạn lại với nhau — bức tranh tổng quan "cả hành trình cộng lại lãi hay lỗ".<br><br>
        ${st?`<b>Của bạn:</b> ${st.totalOosPct>=0?'+':''}${st.totalOosPct.toFixed(1)}% cộng dồn qua ${st.N} đoạn.<br><br>`:''}
        <b>Vì sao chỉ là thẻ THAM KHẢO, không tính vào "đạt mấy/4":</b> con số này rất dễ bị 1 đoạn ăn may cực lớn kéo lên, khiến tổng nhìn đẹp dù phần lớn đoạn còn lại đang lỗ — đây chính là lỗ hổng mà thẻ "Bỏ đoạn tốt nhất" (mục b) đã xử lý riêng. Nên luôn đọc thẻ này CÙNG với "Bỏ đoạn tốt nhất" và "Đoạn dương", không đọc một mình.`
    },
  };
  const d=DETAIL[k];
  if(!d)return '';
  return `<div onclick="if(event.target===this){wfoState.showFormulaKey=null;renderUtility();}" style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;">
    <div style="background:var(--bg1);border:1px solid var(--b2);border-radius:14px;padding:18px;max-width:460px;max-height:82vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:13px;font-weight:900;color:var(--acc);">📐 ${d.title}</div>
        <span onclick="wfoState.showFormulaKey=null;renderUtility()" style="cursor:pointer;font-size:16px;color:var(--dim);padding:0 4px;">✕</span>
      </div>
      <div style="background:var(--bg0);border-radius:8px;padding:8px 10px;margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--acc);">${esc(d.formula)}</div>
      <div style="font-size:11px;color:var(--hi);line-height:1.6;">${d.body}</div>
    </div>
  </div>`;
}
function wfo_lastWinnerHtml(){
  const fc=wfoState.finalConfig;
  if(!fc)return '<span style="font-size:11px;color:var(--dim);">Chưa có (IS sát hiện tại không có tổ hợp nào thỏa "Số lệnh tối thiểu"/"Win rate tối thiểu" ★)</span>';
  const w=fc.winner;
  const indTxt=INDICATOR_BOXES.filter(b=>w[b.key+'Tf']&&w[b.key+'Tf']!=='none').map(b=>`${b.label.split(' ')[0]} ${w[b.key+'Tf']}`).join(', ')||'không filter';
  return `<div style="font-size:12px;color:var(--hi);">IS sát hiện tại: ${wfo_dmy(fc.seg.isStart)}→${wfo_dmy(fc.seg.isEnd)} <span style="color:var(--dim);font-weight:400;">(chưa chạy OOS — OOS chính là tương lai thật)</span></div>
    <div style="font-size:10px;color:var(--dim);margin-top:3px;">${w.entrySignal.toUpperCase()} ${w.entryTf} · dir ${w.dir} · TP ${w.tp}% · SL ${w.sl}% · period ${w.period} · level ${w.level} · ${esc(indTxt)} · Hạng gốc #${fc.rawRank}/${fc.rawTotal}</div>`;
}
// END BOX ĐỘC LẬP — WFO RUNNER + MONTE CARLO

// init
renderOptimizer();
renderUtility();
renderBacktest();
</script>
