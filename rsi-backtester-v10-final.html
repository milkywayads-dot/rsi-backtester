<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>RSI Backtester — Binance Multi-TF v10</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#ffffff;--bg1:#f8f9fb;--bg2:#f0f2f5;--bg3:#e8eaed;
  --b1:#e0e3e8;--b2:#c8cdd6;--b3:#a8b0bc;
  --txt:#374151;--dim:#6b7280;--hi:#111827;
  --grn:#16a34a;--red:#dc2626;--ora:#d97706;
  --acc:#4f46e5;--cyn:#0891b2;
  --grn-bg:#dcfce7;--red-bg:#fee2e2;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{min-height:100%;}
body{
  background:var(--bg0);color:var(--txt);
  font-family:'Outfit',sans-serif;font-size:14px;
  padding:env(safe-area-inset-top,16px) 16px 60px;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(var(--b1) 1px,transparent 1px),
    linear-gradient(90deg,var(--b1) 1px,transparent 1px);
  background-size:40px 40px;opacity:.5;
}
#app{position:relative;z-index:1;max-width:960px;margin:0 auto;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:12px;padding:20px 0 22px;}
.hdr-stripe{
  width:4px;height:40px;border-radius:4px;flex-shrink:0;
  background:linear-gradient(180deg,var(--acc) 0%,var(--cyn) 100%);
  box-shadow:0 0 12px rgba(79,70,229,.3);
}
.hdr-title{font-size:20px;font-weight:900;color:var(--hi);letter-spacing:-.5px;}
.hdr-sub{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}
.add-btn{
  margin-left:auto;background:transparent;border:1px solid var(--b2);
  border-radius:8px;color:var(--acc);padding:8px 14px;
  cursor:pointer;font:700 12px/1 'Outfit',sans-serif;letter-spacing:.5px;
  transition:all .15s;
}
.add-btn:hover{background:var(--bg2);border-color:var(--acc);}

/* ── CARD ── */
.card{
  background:var(--bg1);border:1px solid var(--b1);
  border-radius:16px;padding:16px;margin-bottom:14px;
}

/* ── SESSION TABS ── */
.sess-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.sess-tab{
  background:var(--bg1);border:1px solid var(--b1);
  border-radius:10px;padding:9px 14px;cursor:pointer;
  display:flex;align-items:center;gap:7px;transition:all .15s;
}
.sess-tab.on{background:rgba(79,70,229,.08);border-color:var(--acc);}
.tab-lbl{font-size:13px;font-weight:700;color:var(--dim);}
.sess-tab.on .tab-lbl{color:var(--hi);}
.dir-pill{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.5px;}
.dp-buy {background:var(--grn-bg);color:var(--grn);}
.dp-sell{background:var(--red-bg);color:#b91c1c;}
.tab-x{color:var(--b2);font-size:15px;cursor:pointer;transition:color .1s;}
.tab-x:hover{color:var(--red);}

/* ── FORM ── */
.flbl{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
input[type=text],input[type=number]{
  width:100%;background:var(--bg0);border:1.5px solid var(--b2);border-radius:9px;
  color:var(--hi);padding:10px 12px;font-size:13px;outline:none;
  font-family:'JetBrains Mono',monospace;transition:border-color .15s;
  -webkit-appearance:none;
}
input:focus{border-color:var(--acc);}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-inner-spin-button{display:none;}
.dir-row{display:flex;gap:8px;margin-bottom:14px;}
.dir-opt{
  flex:1;padding:10px 8px;border-radius:9px;cursor:pointer;
  font:700 12px/1 'Outfit',sans-serif;transition:all .15s;
  border:1.5px solid var(--b2);background:var(--bg0);color:var(--dim);
}
.dir-opt.buy.on {background:var(--grn-bg);border-color:var(--grn);color:var(--grn);}
.dir-opt.sell.on{background:var(--red-bg);border-color:#dc2626;color:#b91c1c;}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.chip{
  background:var(--bg2);border:1px solid var(--b1);
  border-radius:8px;padding:7px 12px;font-size:12px;color:var(--txt);
}
.chip-v{font-family:'JetBrains Mono',monospace;font-weight:700;}

/* RSI level row */
.rsi-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.rsi-label-wrap{flex:1;}
.rsi-input-wrap{display:flex;align-items:center;gap:6px;}
.rsi-input-wrap input{width:72px;text-align:center;}
.rsi-hint{font-size:11px;color:var(--dim);}

/* ── RUN BTN ── */
.run-btn{
  width:100%;padding:13px;border-radius:11px;border:none;
  font:900 14px/1 'Outfit',sans-serif;letter-spacing:1px;cursor:pointer;
  background:linear-gradient(135deg,var(--acc),var(--cyn));
  color:#fff;transition:all .2s;
  box-shadow:0 4px 20px rgba(79,70,229,.2);
}
.run-btn:disabled{background:var(--bg3);color:var(--dim);cursor:not-allowed;box-shadow:none;}
.run-btn:not(:disabled):active{transform:scale(.98);}

/* ── STATUS / ERROR ── */
.status-box{background:var(--bg2);border:1px solid var(--b1);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--acc);display:flex;align-items:center;gap:8px;}
.err-box{background:var(--red-bg);border:1px solid var(--red);border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--red);}

/* ── COIN TABS ── */
.coin-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.coin-tab{
  background:var(--bg1);border:1px solid var(--b1);
  border-radius:10px;padding:9px 14px;cursor:pointer;transition:all .15s;
}
.coin-tab.on{background:rgba(79,70,229,.08);border-color:var(--acc);}
.c-name{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;color:var(--dim);}
.coin-tab.on .c-name{color:var(--hi);}
.c-wr{font-size:11px;margin-left:5px;}

/* ── STAT CARDS ── */
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.sc{background:var(--bg0);border:1px solid var(--b1);border-radius:11px;padding:11px 13px;min-width:80px;}
.sc-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.sc-val{font-size:21px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--hi);}

/* ── WIN BAR ── */
.wbar-wrap{background:var(--bg2);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;margin-bottom:14px;}
.wbar-lbl{font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:8px;}
.wbar{display:flex;height:22px;border-radius:6px;overflow:hidden;}
.ws{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;}
.ws-w{background:linear-gradient(90deg,#16a34a,#15803d);}
.ws-l{background:linear-gradient(90deg,#b91c1c,#dc2626);}

/* ── TABLE ── */
.tbl-wrap{background:var(--bg1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:18px;}
.tbl-hdr{padding:11px 15px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
.tbl-title{font-size:11px;color:var(--acc);font-weight:700;letter-spacing:1px;}
.tbl-cnt{font-size:11px;color:var(--dim);}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;}
th{padding:5px 5px;text-align:left;color:var(--dim);font-size:10px;font-weight:600;border-bottom:1px solid var(--b1);background:var(--bg2);white-space:nowrap;}
td{padding:4px 5px;border-bottom:1px solid #e5e7eb;font-family:'JetBrains Mono',monospace;font-size:10px;white-space:nowrap;color:var(--txt);}
tr:last-child td{border-bottom:none;}
tr:nth-child(even) td{background:rgba(243,244,246,.8);}
.badge{border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:1px;border-width:1px;border-style:solid;display:inline-block;}
.bw{background:var(--grn-bg);color:var(--grn);border-color:var(--grn);}
.bl{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.bo{background:#f3f4f6;color:#6b7280;border-color:#d1d5db;}
.more-btn{
  width:100%;padding:11px;border:none;background:none;cursor:pointer;
  color:var(--acc);font:700 11px/1 'Outfit',sans-serif;letter-spacing:1px;
  border-top:1px solid var(--b1);transition:background .15s;
}
.more-btn:hover{background:var(--bg2);}

/* ── SUMMARY ── */
.sum-wrap{background:var(--bg1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:18px;}
.sum-title{padding:11px 15px;font-size:11px;color:var(--acc);font-weight:700;letter-spacing:1px;border-bottom:1px solid var(--b1);}

/* ── TOGGLE SWITCH ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1.5px solid var(--b2);border-radius:10px;padding:11px 14px;margin-bottom:14px;cursor:pointer;transition:border-color .15s;}
.toggle-row.on{border-color:var(--acc);}
.toggle-info{flex:1;}
.toggle-title{font-size:13px;font-weight:700;color:var(--txt);}
.toggle-desc{font-size:11px;color:var(--dim);margin-top:3px;}
.toggle-sw{width:42px;height:24px;border-radius:12px;background:var(--b2);position:relative;flex-shrink:0;transition:background .2s;}
.toggle-sw.on{background:var(--acc);}
.toggle-sw::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle-sw.on::after{transform:translateX(18px);}

/* ── FOOTER ── */
.footer{text-align:center;font-size:10px;color:#9ca3af;margin-top:16px;}

/* ── OPTIMIZER ── */
.opt-card{background:linear-gradient(135deg,rgba(79,70,229,.04),rgba(8,145,178,.03));border:1px solid var(--acc);border-radius:16px;padding:16px;margin-bottom:14px;}
.opt-title{font-size:13px;font-weight:900;color:var(--acc);letter-spacing:1px;margin-bottom:4px;}
.opt-sub{font-size:11px;color:var(--dim);margin-bottom:14px;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.opt-run{width:100%;padding:12px;border-radius:10px;border:none;font:800 13px/1 'Outfit',sans-serif;letter-spacing:1px;cursor:pointer;background:linear-gradient(135deg,var(--acc),var(--cyn));color:#fff;transition:all .2s;box-shadow:0 4px 20px rgba(79,70,229,.2);}
.opt-run:disabled{background:var(--bg3);color:var(--dim);cursor:not-allowed;box-shadow:none;}
.opt-progress{background:var(--bg2);border-radius:8px;overflow:hidden;height:6px;margin-bottom:10px;}
.opt-bar{height:100%;background:linear-gradient(90deg,var(--acc),var(--cyn));transition:width .1s;}
.opt-result-wrap{background:var(--bg1);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-top:14px;}
.opt-result-hdr{padding:11px 15px;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.sort-btn{background:var(--bg2);border:1px solid var(--b1);border-radius:6px;color:var(--dim);padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.sort-btn:hover{border-color:var(--b2);}
.sort-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(79,70,229,.06);}

@media(max-width:380px){
  .fgrid{grid-template-columns:1fr;}
  .fgrid3{grid-template-columns:1fr 1fr;}
  .sc-val{font-size:18px;}
  .opt-grid{grid-template-columns:1fr;}
}
@media(max-width:700px){
  .hide-sm{display:none;}
  #app{max-width:100%;}
}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-stripe"></div>
    <div>
      <div class="hdr-title">RSI Backtester</div>
      <div class="hdr-sub">Binance · Multi-TF · RSI + MACD Filter · v10</div>
    </div>
  </div>

  <div id="optimizerSection" style="margin-top:8px;"></div>
  <div id="multiSlotSection" style="margin-top:8px;"></div>

  <div class="footer">⚠ Backtest chỉ mang tính tham khảo – không phải tư vấn đầu tư.</div>
</div>

<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════

let optimizerOpen = false;
let feeRate = 0.1; // % phí round-trip/lệnh (OKX futures taker: 0.05%×2 = 0.1%)

// ── MULTI SLOT STATE ──
let multiSlotOpen = false;
let multiSlotLoading = false;
let multiSlotStatus = '';
let multiSlotResults = null;
let slotIdCnt = 1;
let slots = [mkSlot(1)];
let msStart = '01/01/2025';
let msEnd = todayStr();
let msShowAll = false;
let msSortBy = 'entry';
let msSortDir = 'asc';

function mkSlot(id){
  return {
    id, expanded:true,
    coin:'BTCUSDT', sizeUsd:10, leverage:10, maxOrders:1,
    macdTf:'1d', rsiTf:'1h',
    macdAuto:true, macdTrendTf:'none',
    longEnabled:true, shortEnabled:true,
    long:{rsiPeriod:14, rsiLevel:55, tp:4, sl:2, macdAlign:'trend'},
    short:{rsiPeriod:14, rsiLevel:45, tp:4, sl:2, macdAlign:'trend'}
  };
}
function addSlot(){
  slotIdCnt++;
  slots.push(mkSlot(slotIdCnt));
  renderMultiSlot();
}
function removeSlot(id){
  if(slots.length<=1) return;
  slots=slots.filter(s=>s.id!==id);
  renderMultiSlot();
}
function toggleSlot(id){
  const s=slots.find(s=>s.id===id);
  if(s){s.expanded=!s.expanded;renderMultiSlot();}
}
function setSlot(id,k,v){
  const s=slots.find(s=>s.id===id);
  if(s){s[k]=v;renderMultiSlot();}
}
function setSlotDir(id,dir,k,v){
  const s=slots.find(s=>s.id===id);
  if(s){s[dir][k]=v;renderMultiSlot();}
}
function setMultiStatus(msg){
  multiSlotStatus=msg;
  const el=document.getElementById('msStatusLine');
  if(el) el.textContent=msg;
}
function setSortMs(by){
  if(msSortBy===by) msSortDir=msSortDir==='asc'?'desc':'asc';
  else{msSortBy=by;msSortDir='asc';}
  renderMultiSlot();
}
function parseExitKey(str){
  if(!str||str==='—') return 9999999999999;
  const m=str.match(/^(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)$/);
  if(!m) return 9999999999999;
  return parseInt(m[3])*100000000+parseInt(m[2])*1000000+parseInt(m[1])*10000+parseInt(m[4])*100+parseInt(m[5]);
}
// ── Load hàng loạt: xóa slots cũ, tạo slot mới từ nhiều file JSON ────────────
function loadAllSlotConfigs(input){
  const files=Array.from(input.files);
  if(!files.length) return;
  let loaded=0;
  const parsed=[];
  files.forEach((file,idx)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const cfg=JSON.parse(e.target.result);
        if(cfg.coin) parsed.push({idx,cfg});
      }catch(err){}
      loaded++;
      if(loaded===files.length){
        parsed.sort((a,b)=>a.idx-b.idx);
        if(!parsed.length) return;
        slots=[];
        slotIdCnt=0;
        parsed.forEach(({cfg})=>{
          slotIdCnt++;
          const s=mkSlot(slotIdCnt);
          s.expanded=false;
          if(cfg.coin!==undefined) s.coin=cfg.coin.toUpperCase().trim();
          if(cfg.sizeUsd!==undefined) s.sizeUsd=cfg.sizeUsd;
          if(cfg.leverage!==undefined) s.leverage=cfg.leverage;
          if(cfg.maxOrders!==undefined) s.maxOrders=cfg.maxOrders;
          if(cfg.macdTf!==undefined) s.macdTf=cfg.macdTf;
          if(cfg.rsiTf!==undefined) s.rsiTf=cfg.rsiTf;
          if(cfg.macdAuto!==undefined) s.macdAuto=cfg.macdAuto;
          if(cfg.macdTrendTf!==undefined) s.macdTrendTf=cfg.macdTrendTf;
          if(cfg.long) s.long={...s.long,...cfg.long};
          if(cfg.short) s.short={...s.short,...cfg.short};
          if(cfg.longEnabled!==undefined) s.longEnabled=cfg.longEnabled;
          if(cfg.shortEnabled!==undefined) s.shortEnabled=cfg.shortEnabled;
          slots.push(s);
        });
        renderMultiSlot();
      }
    };
    reader.readAsText(file);
  });
  input.value='';
}

function saveSlotConfig(slotId){
  const s=slots.find(x=>x.id===slotId);if(!s) return;
  const def=s.coin.replace('USDT','')+'_cfg';
  const name=(prompt('Tên cấu hình (VD: BTC1, ETH_15m):',def)||'').trim();
  if(!name) return;
  const cfg={coin:s.coin,sizeUsd:s.sizeUsd,leverage:s.leverage,maxOrders:s.maxOrders,macdTf:s.macdTf,rsiTf:s.rsiTf,macdAuto:s.macdAuto!==false,macdTrendTf:s.macdTrendTf||'none',long:{...s.long},short:{...s.short},longEnabled:s.longEnabled!==false,shortEnabled:s.shortEnabled!==false};
  const blob=new Blob([JSON.stringify(cfg,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function loadSlotConfig(slotId,input){
  const file=input.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const cfg=JSON.parse(e.target.result);
      const s=slots.find(x=>x.id===slotId);if(!s) return;
      if(cfg.coin!==undefined) s.coin=cfg.coin.toUpperCase().trim();
      if(cfg.sizeUsd!==undefined) s.sizeUsd=cfg.sizeUsd;
      if(cfg.leverage!==undefined) s.leverage=cfg.leverage;
      if(cfg.maxOrders!==undefined) s.maxOrders=cfg.maxOrders;
      if(cfg.macdTf!==undefined) s.macdTf=cfg.macdTf;
      if(cfg.rsiTf!==undefined) s.rsiTf=cfg.rsiTf;
      if(cfg.macdAuto!==undefined) s.macdAuto=cfg.macdAuto;
      if(cfg.macdTrendTf!==undefined) s.macdTrendTf=cfg.macdTrendTf;
      if(cfg.long) s.long={...s.long,...cfg.long};
      if(cfg.short) s.short={...s.short,...cfg.short};
      if(cfg.longEnabled!==undefined) s.longEnabled=cfg.longEnabled;
      if(cfg.shortEnabled!==undefined) s.shortEnabled=cfg.shortEnabled;
      renderMultiSlot();
    }catch(err){alert('File JSON không hợp lệ');}
  };
  reader.readAsText(file);
  input.value='';
}

function mkSess(id){
  return { id, label:'Phiên '+id,
    coins:'BTCUSDT, ETHUSDT, BNBUSDT, SOLUSDT, XRPUSDT',
    start:'13/04/2025', end:todayStr(),
    dir:'buy', rsiLevel:50,
    tp:3, sl:1.5, maxOrders:1, reverseMode:false, flipWindow:5,
    rsiPeriod:14, rsiTF:'1h',
    macdTf:'none', macdAlign:'trend', macdTrendTf:'none' };
}
function todayStr(){
  const n=new Date();
  return pad(n.getDate())+'/'+pad(n.getMonth()+1)+'/'+n.getFullYear();
}
function pad(n){return String(n).padStart(2,'0');}

// ══════════════════════════════════════════════
//  RSI
// ══════════════════════════════════════════════
function calcRSI(closes, period){
  period = period||14;
  const rsi = new Array(closes.length).fill(null);
  if(closes.length < period+1) return rsi;
  let g=0,l=0;
  for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1];d>0?g+=d:l-=d;}
  let ag=g/period,al=l/period;
  rsi[period]=al===0?100:100-100/(1+ag/al);
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    ag=(ag*(period-1)+(d>0?d:0))/period;
    al=(al*(period-1)+(d<0?-d:0))/period;
    rsi[i]=al===0?100:100-100/(1+ag/al);
  }
  return rsi;
}

// ══════════════════════════════════════════════
//  BACKTEST
// ══════════════════════════════════════════════
function backtest(candles, dir, startTs, endTs, rsiLevel, tpPct, slPct, maxOrders, rsiPeriod){
  const closes=candles.map(c=>parseFloat(c[4]));
  const highs =candles.map(c=>parseFloat(c[2]));
  const lows  =candles.map(c=>parseFloat(c[3]));
  const times =candles.map(c=>c[0]);
  const rsi   =calcRSI(closes, rsiPeriod||14);
  const trades=[];
  let openExitBars=[];

  for(let i=16;i<candles.length-1;i++){
    if(!rsi[i-1]||!rsi[i]) continue;
    if(times[i]<startTs||times[i]>endTs) continue;
    openExitBars=openExitBars.filter(b=>b>i);
    if(maxOrders>0 && openExitBars.length>=maxOrders) continue;

    const sig = dir==='buy'
      ? (rsi[i-1]<rsiLevel && rsi[i]>rsiLevel)
      : (rsi[i-1]>rsiLevel && rsi[i]<rsiLevel);
    if(!sig) continue;

    const entry=closes[i];
    const tp=dir==='buy'?entry*(1+tpPct/100):entry*(1-tpPct/100);
    const sl=dir==='buy'?entry*(1-slPct/100):entry*(1+slPct/100);
    let result='OPEN',pnl=null,exitBar=-1;

    for(let j=i+1;j<candles.length;j++){
      if(dir==='buy'){
        if(highs[j]>=tp){result='WIN';pnl=tpPct;exitBar=j;break;}
        if(lows[j]<=sl){result='LOSS';pnl=-slPct;exitBar=j;break;}
      } else {
        if(lows[j]<=tp){result='WIN';pnl=tpPct;exitBar=j;break;}
        if(highs[j]>=sl){result='LOSS';pnl=-slPct;exitBar=j;break;}
      }
    }
    if(maxOrders>0) openExitBars.push(exitBar>0?exitBar:candles.length);

    const d=new Date(times[i]);
    const exitTime = exitBar>0
      ? (()=>{ const e=new Date(times[exitBar]); return pad(e.getDate())+'/'+pad(e.getMonth()+1)+'/'+String(e.getFullYear()).slice(-2)+' '+pad(e.getHours())+':'+pad(e.getMinutes()); })()
      : '—';
    trades.push({
      time:pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(-2)+' '+pad(d.getHours())+':'+pad(d.getMinutes()),
      exitTime,
      entry:entry>100?entry.toFixed(2):entry.toFixed(4),
      rsi:rsi[i].toFixed(2),
      tp:tp>100?tp.toFixed(2):tp.toFixed(4),
      sl:sl>100?sl.toFixed(2):sl.toFixed(4),
      result, pnl
    });
  }
  return trades;
}

function summarize(trades){
  const wins=trades.filter(t=>t.result==='WIN').length;
  const losses=trades.filter(t=>t.result==='LOSS').length;
  const closed=wins+losses;
  const totalPnl=trades.reduce((s,t)=>s+(t.pnl||0),0);
  return {trades,wins,losses,closed,totalPnl};
}

// Base URL cache: test 1 lần per symbol per run (Spot trước, Futures fallback)
const _baseCache={};
async function fetchKlines(symbol, startTs, endTs, interval='1h'){
  if(!_baseCache[symbol]){
    const spot='https://api.binance.com/api/v3/klines';
    const fut ='https://fapi.binance.com/fapi/v1/klines';
    try{
      const r=await fetch(`${spot}?symbol=${symbol}&interval=1h&limit=1`);
      await r.text();
      _baseCache[symbol]=r.ok?spot:fut;
    }catch(e){ _baseCache[symbol]=fut; }
  }
  const base=_baseCache[symbol];

  const all=[];let cur=startTs;
  while(cur<endTs){
    const url=`${base}?symbol=${symbol}&interval=${interval}&startTime=${cur}&endTime=${endTs}&limit=1000`;
    const res=await fetch(url);
    if(!res.ok) throw new Error(symbol+': HTTP '+res.status);
    const chunk=await res.json();
    if(!chunk.length) break;
    all.push(...chunk);
    if(chunk.length<1000) break;
    cur=chunk[chunk.length-1][0]+1;
  }
  return all;
}

// ══════════════════════════════════════════════
//  DATE PARSE  dd/mm/yyyy
// ══════════════════════════════════════════════
function parseDate(str,end){
  const p=str.trim().split('/').map(Number);
  if(p.length!==3||p.some(isNaN)) return null;
  const[d,m,y]=p;
  const base=Date.UTC(y<100?2000+y:y,m-1,d)-7*3600000;
  return end?base+86400000-1:base;
}

//  MACD HELPERS (dùng cho Optimizer và Backtest)
// ══════════════════════════════════════════════
function calcEMA(values, period){
  const k=2/(period+1);
  const ema=new Array(values.length).fill(null);
  ema[0]=values[0];
  for(let i=1;i<values.length;i++) ema[i]=values[i]*k+ema[i-1]*(1-k);
  return ema;
}

function calcMacdHist(closes){
  const ema12=calcEMA(closes,12);
  const ema26=calcEMA(closes,26);
  const diff=closes.map((_,i)=>ema12[i]-ema26[i]);
  const dea=calcEMA(diff,9);
  return diff.map((d,i)=>d-dea[i]);
}


function bsearchMacd(opens, hist, signalTs, periodMs){
  let lo=0, hi=opens.length-1, res=-1;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    if(opens[mid]+periodMs<=signalTs){res=mid;lo=mid+1;}
    else hi=mid-1;
  }
  return res>=0?hist[res]:null;
}
function bsearchMacdTs(opens, signalTs, periodMs){
  let lo=0, hi=opens.length-1, res=-1;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    if(opens[mid]+periodMs<=signalTs){res=mid;lo=mid+1;}
    else hi=mid-1;
  }
  return res>=0?opens[res]:null;
}

const MACD_INTRADAY_MS={'1h':3600000,'2h':7200000,'4h':14400000};
const MACD_TF_MS={'1h':3600000,'2h':7200000,'4h':14400000,'1d':86400000,'3d':259200000,'1w':604800000};
const MACD_WARM_UP=200;
const RSI_TF_MS={'5m':300000,'15m':900000,'30m':1800000,'1h':3600000,'2h':7200000,'4h':14400000};
const RSI_WARM_UP=300;

function backtestWithMacd(candles, dir, startTs, endTs, rsiLevel, tpPct, slPct, maxOrders, rsiPeriod, macdMap, align='trend', lookupFn=null, macdTrendMap=null, trendLookupFn=null, macdTsLookup=null, trendTsLookup=null){
  const closes=candles.map(c=>parseFloat(c[4]));
  const highs =candles.map(c=>parseFloat(c[2]));
  const lows  =candles.map(c=>parseFloat(c[3]));
  const times =candles.map(c=>c[0]);
  const rsi   =calcRSI(closes, rsiPeriod||14);
  const trades=[];
  let openExitBars=[];

  for(let i=16;i<candles.length-1;i++){
    if(!rsi[i-1]||!rsi[i]) continue;
    if(times[i]<startTs||times[i]>endTs) continue;
    openExitBars=openExitBars.filter(b=>b>i);
    if(maxOrders>0 && openExitBars.length>=maxOrders) continue;

    const sig = dir==='buy'
      ? (rsi[i-1]<rsiLevel && rsi[i]>rsiLevel)
      : (rsi[i-1]>rsiLevel && rsi[i]<rsiLevel);
    if(!sig) continue;

    const hist=lookupFn(macdMap, times[i]);
    if(hist===null) continue;
    if(align==='trend'){
      if(dir==='buy'  && hist<=0) continue;
      if(dir==='sell' && hist>=0) continue;
    } else {
      if(dir==='buy'  && hist>=0) continue;
      if(dir==='sell' && hist<=0) continue;
    }

    // ── MACD Trend filter (xác nhận xu hướng, luôn thuận chiều) ─────────────
    let trendHist=null;
    if(macdTrendMap!==null){
      const th=trendLookupFn(macdTrendMap,times[i]);
      if(th===null) continue;
      trendHist=th;
      if(dir==='buy'  && th<=0) continue;
      if(dir==='sell' && th>=0) continue;
    }

    const entry=closes[i];
    const tp=dir==='buy'?entry*(1+tpPct/100):entry*(1-tpPct/100);
    const sl=dir==='buy'?entry*(1-slPct/100):entry*(1+slPct/100);
    let result='OPEN',pnl=null,exitBar=-1;

    for(let j=i+1;j<candles.length;j++){
      if(dir==='buy'){
        if(highs[j]>=tp){result='WIN';pnl=tpPct;exitBar=j;break;}
        if(lows[j]<=sl){result='LOSS';pnl=-slPct;exitBar=j;break;}
      } else {
        if(lows[j]<=tp){result='WIN';pnl=tpPct;exitBar=j;break;}
        if(highs[j]>=sl){result='LOSS';pnl=-slPct;exitBar=j;break;}
      }
    }
    if(maxOrders>0) openExitBars.push(exitBar>0?exitBar:candles.length);
    const d=new Date(times[i]);
    const exitTime=exitBar>0
      ?(()=>{const e=new Date(times[exitBar]);return pad(e.getDate())+'/'+pad(e.getMonth()+1)+'/'+String(e.getFullYear()).slice(-2)+' '+pad(e.getHours())+':'+pad(e.getMinutes());})()
      :'—';
    trades.push({
      time:pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(-2)+' '+pad(d.getHours())+':'+pad(d.getMinutes()),
      exitTime,
      rawTs:times[i],
      entry:entry>100?entry.toFixed(2):entry.toFixed(4),
      tp:tp>100?tp.toFixed(2):tp.toFixed(4),
      sl:sl>100?sl.toFixed(2):sl.toFixed(4),
      rsi:rsi[i].toFixed(2), result, pnl,
      macdHist:hist!==undefined?hist:null,
      trendHist,
      macdCandleTs:macdTsLookup?macdTsLookup(null,times[i]):null,
      trendCandleTs:trendTsLookup?trendTsLookup(null,times[i]):null
    });
  }
  return trades;
}

let optState = {
  coin: 'BTCUSDT',
  start: '01/01/2025',
  end: todayStr(),

  consecLoss: 5,
  sortBy: 'pnl',
  filterPeriod: null,
  filterDir: null,
  filterAlign: null,
  running: false,
  progress: 0,
  total: 0,
  results: [],
  statusMsg: ''
};

const OPT_RSI         = [35, 40, 45, 50, 55, 60, 65];
const OPT_TP          = [1, 1.5, 2, 2.5, 3, 4, 5];
const OPT_SL          = [0.5, 1, 1.5, 2, 2.5, 3];
const OPT_DIRS        = ['buy','sell'];
const OPT_RSI_PERIODS = [7, 10, 14, 21];

function toggleAlignMode(m){
  const idx=optState.alignModes.indexOf(m);
  if(idx>=0) optState.alignModes=optState.alignModes.filter(x=>x!==m);
  else optState.alignModes=[...optState.alignModes,m];
  renderOptimizer();
}
function toggleMacdMode(tf){
  const idx=optState.macdModes.indexOf(tf);
  if(idx>=0) optState.macdModes=optState.macdModes.filter(m=>m!==tf);
  else optState.macdModes=[...optState.macdModes,tf];
  renderOptimizer();
}
function toggleTrendMode(tf){
  const idx=optState.macdTrendModes.indexOf(tf);
  if(idx>=0) optState.macdTrendModes=optState.macdTrendModes.filter(m=>m!==tf);
  else optState.macdTrendModes=[...optState.macdTrendModes,tf];
  renderOptimizer();
}
function maxConsecLosses(trades){
  let max=0,cur=0;
  for(const t of trades){
    if(t.result==='LOSS'){cur++;if(cur>max)max=cur;}
    else if(t.result==='WIN') cur=0;
  }
  return max;
}

async function runOptimizer(){
  Object.keys(_baseCache).forEach(k=>delete _baseCache[k]);
  if(optState.running) return;
  const startTs=parseDate(optState.start,false);
  const endTs  =parseDate(optState.end,true);
  if(!startTs||!endTs){alert('Ngày không hợp lệ');return;}

  optState.running=true;optState.results=[];optState.progress=0;
  optState.filterPeriod=null;optState.filterDir=null;optState.filterAlign=null;

  const selectedTfs=optState.macdModes;
  if(selectedTfs.length===0){alert('Chọn ít nhất 1 MACD mode!');optState.running=false;return;}

  const hasNone=selectedTfs.includes('none');
  const tfMacd=selectedTfs.filter(t=>t!=='none');
  const selectedTrendTfs=(optState.macdTrendModes||['none']).filter(m=>m!=='none');
  const hasTrendNone=(optState.macdTrendModes||['none']).includes('none');
  const alN=(optState.alignModes||['trend']).length;
  const modesNoTrend=hasTrendNone?((hasNone?1:0)+tfMacd.length*alN):0;
  const modesWithTrend=tfMacd.length*selectedTrendTfs.length;
  const totalModes=modesNoTrend+modesWithTrend;
  const combos=OPT_RSI_PERIODS.length*OPT_RSI.length*OPT_TP.length*OPT_SL.length*OPT_DIRS.length*totalModes;
  optState.total=combos;
  const rsiTFLabel=(optState.rsiTF||'1h').toUpperCase();
  optState.statusMsg=`Đang tải nến ${rsiTFLabel} ${optState.coin}...`;
  renderOptimizer();

  let candles1H;
  const macdDataByTf={};
  const macdTrendDataByTf={};

  try{
    candles1H=await fetchKlines(optState.coin,startTs-RSI_WARM_UP*(RSI_TF_MS[optState.rsiTF||'1h']||3600000),endTs,optState.rsiTF||'1h');
    for(const tf of tfMacd){
      optState.statusMsg=`Đang tải nến ${tf.toUpperCase()} (MACD Trading)...`;
      renderOptimizer();
      const startD=startTs-MACD_WARM_UP*(MACD_TF_MS[tf]||86400000);
      const pMs=MACD_TF_MS[tf]||86400000;
      const raw=await fetchKlines(optState.coin,startD,endTs,tf);
      const closed=raw.slice(0,-1);
      const hist=calcMacdHist(closed.map(c=>parseFloat(c[4])));
      const opens=closed.map(c=>c[0]);
      macdDataByTf[tf]={opens,hist,pMs};
    }
    // ── MACD Trend maps (1D/3D/1W) ────────────────────────────────────────────
    for(const tf of selectedTrendTfs){
      optState.statusMsg=`Đang tải nến ${tf.toUpperCase()} (MACD Trend)...`;
      renderOptimizer();
      const startD=startTs-MACD_WARM_UP*(MACD_TF_MS[tf]||86400000);
      const pMs=MACD_TF_MS[tf]||86400000;
      const rawTrend=await fetchKlines(optState.coin,startD,endTs,tf);
      const closedTrend=rawTrend.slice(0,-1);
      const histTrend=calcMacdHist(closedTrend.map(c=>parseFloat(c[4])));
      const opensTrend=closedTrend.map(c=>c[0]);
      macdTrendDataByTf[tf]={opens:opensTrend,hist:histTrend,pMs};
    }
  }catch(e){
    optState.statusMsg='❌ Lỗi: '+e.message;
    optState.running=false;
    renderOptimizer();return;
  }

  optState.statusMsg=`Đang thử ${combos} tổ hợp...`;
  renderOptimizer();

  const res=[];let done=0;

  // ── Build combo modes: [tradingMode, trendTf] pairs ──────────────────────
  const comboPairs=[];
  // Without MACD Trend (trendTf=null)
  if(hasTrendNone){
    if(hasNone) comboPairs.push({trading:{key:'none',label:'none',tf:null,align:'trend',periodMs:null},trendTf:null});
    for(const tf of tfMacd){
      const periodMs=MACD_INTRADAY_MS[tf]||null;
      for(const align of (optState.alignModes||['trend'])){
        comboPairs.push({trading:{key:tf+'_'+align,label:'macd',tf,align,periodMs},trendTf:null});
      }
    }
  }
  // With MACD Trend (trendTf set, align forced to 'trend')
  for(const trendTf of selectedTrendTfs){
    for(const tf of tfMacd){
      const periodMs=MACD_INTRADAY_MS[tf]||null;
      comboPairs.push({trading:{key:tf+'_trend+'+trendTf,label:'macd',tf,align:'trend',periodMs},trendTf});
    }
  }

  for(const {trading:mode, trendTf} of comboPairs){
    const trendEntry=trendTf?macdTrendDataByTf[trendTf]:null;
    const trendLookupFn=trendEntry
      ?(_,signalTs)=>bsearchMacd(trendEntry.opens,trendEntry.hist,signalTs,trendEntry.pMs)
      :null;
    for(const period of OPT_RSI_PERIODS){
      for(const dir of OPT_DIRS){
        for(const rsi of OPT_RSI){
          for(const tp of OPT_TP){
            for(const sl of OPT_SL){
              let trades;
              if(mode.label==='none'){
                trades=backtest(candles1H,dir,startTs,endTs,rsi,tp,sl,optState.maxOrders,period);
              } else {
                const macdEntry=macdDataByTf[mode.tf];
                const lookupFn=(_,signalTs)=>bsearchMacd(macdEntry.opens,macdEntry.hist,signalTs,macdEntry.pMs);
                trades=backtestWithMacd(candles1H,dir,startTs,endTs,rsi,tp,sl,optState.maxOrders,period,
                  null,mode.align,lookupFn,
                  trendEntry,trendLookupFn);
              }
              const sum=summarize(trades);
              const wr=sum.closed>0?sum.wins/sum.closed*100:0;
              const mcl=optState.consecLossOn?maxConsecLosses(trades):0;
              if(sum.closed>=optState.minTrades&&wr>=optState.minWR&&sum.totalPnl>=optState.minPnl
                 &&(!optState.consecLossOn||mcl<=optState.consecLoss)){
                res.push({macdMode:mode.key,macdTf:mode.tf||'none',align:mode.align,
                  macdTrendTf:trendTf||'none',
                  period,dir,rsi,tp,sl,
                  trades:sum.closed,wins:sum.wins,losses:sum.losses,
                  wr:parseFloat(wr.toFixed(1)),pnl:parseFloat(sum.totalPnl.toFixed(2))});
              }
              done++;
              if(done%100===0){optState.progress=done;renderOptimizerProgress();}
            }
          }
        }
      }
    }
  }

  res.sort((a,b)=>{
    if(optState.sortBy==='wr') return b.wr-a.wr;
    if(optState.sortBy==='trades') return b.trades-a.trades;
    if(optState.sortBy==='netpnl') return (b.pnl-b.trades*feeRate)-(a.pnl-a.trades*feeRate);
    return b.pnl-a.pnl;
  });
  optState.results=res;
  optState.progress=combos;
  optState.running=false;
  optState.statusMsg=`✅ Xong! ${combos} tổ hợp → tìm được ${res.length} thỏa điều kiện`;
  renderOptimizer();
}

function setOptSort(by){
  optState.sortBy=by;
  optState.results.sort((a,b)=>{
    if(by==='wr') return b.wr-a.wr;
    if(by==='trades') return b.trades-a.trades;
    if(by==='netpnl') return (b.pnl-b.trades*feeRate)-(a.pnl-a.trades*feeRate);
    return b.pnl-a.pnl;
  });
  renderOptimizer();
}

// ── Wrapper cho MACD OFF: gọi backtest() rồi gán rawTs từ candle timestamps ──
function backtestNoMacd(candles, dir, startTs, endTs, rsiLevel, tpPct, slPct, maxOrders, rsiPeriod){
  const trades=backtest(candles,dir,startTs,endTs,rsiLevel,tpPct,slPct,maxOrders,rsiPeriod);
  const timeLookup=new Map();
  candles.forEach(c=>{
    const d=new Date(c[0]);
    const key=pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+String(d.getFullYear()).slice(-2)+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    if(!timeLookup.has(key)) timeLookup.set(key,c[0]);
  });
  trades.forEach(t=>{t.rawTs=timeLookup.get(t.time)||0;});
  return trades;
}

// ══════════════════════════════════════════════
//  MULTI SLOT — RUN + RENDER
// ══════════════════════════════════════════════
async function runMultiSlot(){
  Object.keys(_baseCache).forEach(k=>delete _baseCache[k]);
  if(multiSlotLoading) return;
  const startTs=parseDate(msStart,false);
  const endTs=parseDate(msEnd,true);
  if(!startTs||!endTs){alert('Ngày không hợp lệ (dd/mm/yyyy)');return;}

  multiSlotLoading=true;
  multiSlotResults=null;
  multiSlotStatus='';
  renderMultiSlot();

  const slotSummaries=[];
  const allTrades=[];

  try{
    for(const slot of slots){
      const sym=slot.coin.toUpperCase().trim();

      setMultiStatus('⏳ '+sym+': tải nến RSI '+slot.rsiTf.toUpperCase()+'...');
      const candles=await fetchKlines(sym,startTs-RSI_WARM_UP*(RSI_TF_MS[slot.rsiTf]||3600000),endTs,slot.rsiTf);

      let macdMap=null, lookupFn=null, trendMap=null, macdTsLookupFn=null;
      const slotTrendTf=slot.macdTrendTf||'none';
      if(slot.macdAuto!==false){
        setMultiStatus('⏳ '+sym+': tải MACD Trading '+slot.macdTf.toUpperCase()+'...');
        const startMacd=startTs-MACD_WARM_UP*(MACD_TF_MS[slot.macdTf]||86400000);
        const macdPeriodMs=MACD_TF_MS[slot.macdTf]||86400000;
        const rawMacd=await fetchKlines(sym,startMacd,endTs,slot.macdTf);
        const closedMacd=rawMacd.slice(0,-1);
        const histMacd=calcMacdHist(closedMacd.map(c=>parseFloat(c[4])));
        const opensMacd=closedMacd.map(c=>c[0]);
        lookupFn=(_,signalTs)=>bsearchMacd(opensMacd,histMacd,signalTs,macdPeriodMs);
        macdTsLookupFn=(_,signalTs)=>bsearchMacdTs(opensMacd,signalTs,macdPeriodMs);
        // ── MACD Trend fetch (chỉ khi Trading bật) ───────────────────────────
        if(slotTrendTf!=='none'){
          setMultiStatus('⏳ '+sym+': tải MACD Trend '+slotTrendTf.toUpperCase()+'...');
          const startMacd2=startTs-MACD_WARM_UP*(MACD_TF_MS[slotTrendTf]||86400000);
          const trendPeriodMs=MACD_TF_MS[slotTrendTf]||86400000;
          const rawTrend=await fetchKlines(sym,startMacd2,endTs,slotTrendTf);
          const closedTrend=rawTrend.slice(0,-1);
          const histTrend=calcMacdHist(closedTrend.map(c=>parseFloat(c[4])));
          const opensTrend=closedTrend.map(c=>c[0]);
          trendMap={
            _trendLookup:(_,signalTs)=>bsearchMacd(opensTrend,histTrend,signalTs,trendPeriodMs),
            _trendTsLookup:(_,signalTs)=>bsearchMacdTs(opensTrend,signalTs,trendPeriodMs)
          };
        }
      }

      const maxOrd=slot.maxOrders===0?0:(parseInt(slot.maxOrders)||1);
      // Khi Trend bật: force Thuận chiều cho cả Long và Short
      const longAlign=slotTrendTf!=='none'?'trend':(slot.long.macdAlign||'trend');
      const shortAlign=slotTrendTf!=='none'?'trend':(slot.short.macdAlign||'trend');

      // ── Long backtest — chỉ chạy khi longEnabled
      const longTrades=slot.longEnabled!==false?(slot.macdAuto!==false
        ?backtestWithMacd(candles,'buy',startTs,endTs,
          parseFloat(slot.long.rsiLevel)||55,parseFloat(slot.long.tp)||4,parseFloat(slot.long.sl)||2,
          maxOrd,parseInt(slot.long.rsiPeriod)||14,macdMap,longAlign,lookupFn,
          trendMap,(m,ts)=>m&&m._trendLookup?m._trendLookup(m,ts):null,
          macdTsLookupFn,(m,ts)=>m&&m._trendTsLookup?m._trendTsLookup(m,ts):null)
        :backtestNoMacd(candles,'buy',startTs,endTs,
          parseFloat(slot.long.rsiLevel)||55,parseFloat(slot.long.tp)||4,parseFloat(slot.long.sl)||2,
          maxOrd,parseInt(slot.long.rsiPeriod)||14)
      ):[];

      // ── Short backtest — chỉ chạy khi shortEnabled
      const shortTrades=slot.shortEnabled!==false?(slot.macdAuto!==false
        ?backtestWithMacd(candles,'sell',startTs,endTs,
          parseFloat(slot.short.rsiLevel)||45,parseFloat(slot.short.tp)||4,parseFloat(slot.short.sl)||2,
          maxOrd,parseInt(slot.short.rsiPeriod)||14,macdMap,shortAlign,lookupFn,
          trendMap,(m,ts)=>m&&m._trendLookup?m._trendLookup(m,ts):null,
          macdTsLookupFn,(m,ts)=>m&&m._trendTsLookup?m._trendTsLookup(m,ts):null)
        :backtestNoMacd(candles,'sell',startTs,endTs,
          parseFloat(slot.short.rsiLevel)||45,parseFloat(slot.short.tp)||4,parseFloat(slot.short.sl)||2,
          maxOrd,parseInt(slot.short.rsiPeriod)||14)
      ):[];

      // ── Merge & sort theo rawTs
      const slotTrades=[
        ...longTrades.map(t=>({...t,dir:'buy',slotId:slot.id,coin:sym})),
        ...shortTrades.map(t=>({...t,dir:'sell',slotId:slot.id,coin:sym}))
      ].sort((a,b)=>a.rawTs-b.rawTs);

      const sum=summarize(slotTrades);
      const netPnl=sum.totalPnl-(sum.closed*feeRate);
      const netDollar=netPnl*parseFloat(slot.sizeUsd)*parseFloat(slot.leverage)/100;

      slotSummaries.push({
        slotId:slot.id, coin:sym, macdTf:slot.macdTf,
        sizeUsd:parseFloat(slot.sizeUsd), leverage:parseFloat(slot.leverage),
        totalTrades:slotTrades.length, closed:sum.closed,
        wins:sum.wins, losses:sum.losses,
        wr:sum.closed>0?(sum.wins/sum.closed*100).toFixed(1):'0',
        totalPnl:sum.totalPnl, netPnl, netDollar
      });
      allTrades.push(...slotTrades);
    }

    allTrades.sort((a,b)=>a.rawTs-b.rawTs);
    multiSlotResults={slotSummaries, allTrades};
    multiSlotStatus='✅ Xong! '+allTrades.filter(t=>t.result!=='OPEN').length+' lệnh đóng từ '+slots.length+' slots';
  }catch(e){
    multiSlotStatus='❌ '+e.message;
  }

  multiSlotLoading=false;
  renderMultiSlot();
}

  }

  // ── Results HTML ──
  let resHtml='';
  if(o){
    const ss=o.slotSummaries;
    const colCount=Math.min(ss.length,3);
    resHtml+=`<div class="sum-wrap" style="margin-top:10px;">
      <div class="sum-title">TÓM TẮT THEO SLOT</div>
      <div style="padding:12px;display:grid;grid-template-columns:repeat(${colCount},1fr);gap:8px;">`;
    ss.forEach(s=>{
      const wrc=parseFloat(s.wr)>=50?'var(--grn)':'var(--ora)';
      const pnlC=s.totalPnl>=0?'var(--grn)':'var(--red)';
      const netC=s.netPnl>=0?'var(--grn)':'var(--red)';
      const netDC=s.netDollar>=0?'var(--grn)':'var(--red)';
      resHtml+=`<div style="border:1px solid var(--b1);border-radius:10px;padding:10px 12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px;flex-wrap:wrap;">
          <span style="font-size:13px;font-weight:700;color:var(--hi)">Slot ${s.slotId}·${s.coin.replace('USDT','')}</span>
          <span style="font-size:10px;background:rgba(8,145,178,.08);color:var(--cyn);border:1px solid rgba(8,145,178,.2);border-radius:5px;padding:2px 6px;white-space:nowrap;">▲▼ ${s.macdTf.toUpperCase()}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">
          <div><div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;">Lệnh đóng</div><div style="font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;">${s.closed}</div></div>
          <div><div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;">Win %</div><div style="font-size:15px;font-weight:800;color:${wrc};font-family:'JetBrains Mono',monospace;">${s.wr}%</div></div>
          <div><div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;">PnL %</div><div style="font-size:13px;font-weight:800;color:${pnlC};font-family:'JetBrains Mono',monospace;">${(s.totalPnl>=0?'+':'')+s.totalPnl.toFixed(2)}%</div></div>
          <div><div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;">Net PnL %</div><div style="font-size:13px;font-weight:800;color:${netC};font-family:'JetBrains Mono',monospace;">${(s.netPnl>=0?'+':'')+s.netPnl.toFixed(2)}%</div></div>
          <div style="grid-column:1/-1;border-top:1px solid var(--b1);margin-top:4px;padding-top:6px;">
            <div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;">Net $ ($${s.sizeUsd}×${s.leverage}x)</div>
            <div style="font-size:18px;font-weight:900;color:${netDC};font-family:'JetBrains Mono',monospace;">${(s.netDollar>=0?'+':'')+s.netDollar.toFixed(2)}</div>
          </div>
        </div>
      </div>`;
    });
    resHtml+='</div>';

    const totalClosed=ss.reduce((a,r)=>a+r.closed,0);
    const totalWins=ss.reduce((a,r)=>a+r.wins,0);
    const totalNetDollar=ss.reduce((a,r)=>a+r.netDollar,0);
    const avgNetPnl=ss.length>0?ss.reduce((a,r)=>a+r.netPnl,0)/ss.length:0;
    const avgWR=totalClosed>0?(totalWins/totalClosed*100).toFixed(1):'—';
    resHtml+=`<div style="margin:0 12px 12px;padding:9px 14px;background:var(--bg2);border:1px solid var(--b2);border-radius:10px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;">
      <span style="font-size:11px;font-weight:800;color:var(--hi);letter-spacing:.5px;">TỔNG ${ss.length} SLOTS</span>
      <div><div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;">TỔNG LỆNH</div><div style="font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace;">${totalClosed}</div></div>
      <div><div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;">WIN% TB</div><div style="font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${parseFloat(avgWR)>=50?'var(--grn)':'var(--ora)'};">${avgWR}%</div></div>
      <div><div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;">NET PNL% TB</div><div style="font-size:13px;font-weight:800;font-family:'JetBrains Mono',monospace;color:${avgNetPnl>=0?'var(--grn)':'var(--red)'};">${(avgNetPnl>=0?'+':'')+avgNetPnl.toFixed(2)}%</div></div>
      <div style="margin-left:auto;text-align:right;"><div style="font-size:9px;color:var(--dim);letter-spacing:1.5px;">TỔNG NET $</div><div style="font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace;color:${totalNetDollar>=0?'var(--grn)':'var(--red)'};">${(totalNetDollar>=0?'+':'')+totalNetDollar.toFixed(2)}</div></div>
    </div></div>`;

    const trades=o.allTrades;
    const sorted=[...trades].sort((a,b)=>{
      if(msSortBy==='exit'){const ae=parseExitKey(a.exitTime),be=parseExitKey(b.exitTime);return msSortDir==='asc'?ae-be:be-ae;}
      return msSortDir==='asc'?a.rawTs-b.rawTs:b.rawTs-a.rawTs;
    });
    const showAll=msShowAll;
    const disp=showAll?sorted:sorted.slice(0,40);
    const thStyle='cursor:pointer;user-select:none;white-space:nowrap;';
    const entryArrow=msSortBy==='entry'?(msSortDir==='asc'?' ▲':' ▼'):'';
    const exitArrow=msSortBy==='exit'?(msSortDir==='asc'?' ▲':' ▼'):'';
    resHtml+=`<div class="tbl-wrap" style="margin-top:10px;">
      <div class="tbl-hdr">
        <span class="tbl-title">CHI TIẾT LỆNH GỘP — ${trades.length} lệnh</span>
        <span class="tbl-cnt">Net $=(PnL−phí)×size×lev/100</span>
      </div>
      <div class="tbl-scroll"><table>
        <thead><tr>
          <th>#</th><th>Slot·Coin</th>
          <th onclick="setSortMs('entry')" style="${thStyle}">T. vào${entryArrow}</th>
          <th onclick="setSortMs('exit')" style="${thStyle}">T. thoát${exitArrow}</th>
          <th>Hướng</th><th>Giá vào</th><th>RSI</th><th>MACD</th><th>MACD Nến</th><th>Trend</th><th>Trend Nến</th><th>PnL%</th><th>Net $</th><th>KQ</th>
        </tr></thead>
        <tbody>`;
    disp.forEach((t,i)=>{
      const slot=slots.find(s=>s.id===t.slotId);
      const ps=t.pnl===null?'—':(t.pnl>0?'+':'')+t.pnl+'%';
      const pc=t.pnl===null?'var(--dim)':t.pnl>0?'var(--grn)':'var(--red)';
      const bk=t.result==='WIN'?'bw':t.result==='LOSS'?'bl':'bo';
      const dc=t.dir==='buy'?'var(--grn)':'var(--red)';
      let netDHtml='—';
      if(t.pnl!==null&&slot){
        const nd=(t.pnl-feeRate)*parseFloat(slot.sizeUsd)*parseFloat(slot.leverage)/100;
        netDHtml=`<span style="color:${nd>=0?'var(--grn)':'var(--red)'};font-weight:700">${(nd>=0?'+':'')+nd.toFixed(2)}</span>`;
      }
      resHtml+=`<tr>
        <td style="color:var(--dim)">${i+1}</td>
        <td style="color:var(--hi);font-weight:700">${t.slotId}·${t.coin.replace('USDT','')}</td>
        <td style="color:var(--dim)">${t.time}</td>
        <td style="color:var(--dim)">${t.exitTime||'—'}</td>
        <td style="color:${dc};font-weight:700">${t.dir==='buy'?'▲ L':'▼ S'}</td>
        <td style="color:var(--hi)">${t.entry}</td>
        <td style="color:var(--acc)">${t.rsi}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:${t.macdHist!=null?(t.macdHist>0?'var(--grn)':'var(--red)'):'var(--dim)'}">${t.macdHist!=null?(t.macdHist>0?'+':'')+t.macdHist.toFixed(4):'—'}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)">${(()=>{if(!t.macdCandleTs)return'—';const d=new Date(t.macdCandleTs);return pad(d.getDate())+'/'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());})()}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:${t.trendHist!=null?(t.trendHist>0?'var(--grn)':'var(--red)'):'var(--dim)'}">${t.trendHist!=null?(t.trendHist>0?'+':'')+t.trendHist.toFixed(4):'—'}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dim)">${(()=>{if(!t.trendCandleTs)return'—';const d=new Date(t.trendCandleTs);return pad(d.getDate())+'/'+pad(d.getMonth()+1)+' '+pad(d.getHours())+':'+pad(d.getMinutes());})()}</td>
        <td style="color:${pc};font-weight:700">${ps}</td>
        <td>${netDHtml}</td>
        <td><span class="badge ${bk}">${t.result}</span></td>
      </tr>`;
    });
    resHtml+=`</tbody></table></div>`;
    if(trades.length>40){
      resHtml+=`<button class="more-btn" onclick="msShowAll=!msShowAll;renderMultiSlot()">
        ${showAll?'▲ THU GỌN':'▼ XEM THÊM '+(trades.length-40)+' LỆNH'}
      </button>`;
    }
    resHtml+='</div>';
  }

  // ── Main section HTML ──
  let html=`<div style="
    background:linear-gradient(135deg,rgba(22,163,74,.03),rgba(8,145,178,.03));
    border:1px solid var(--b2);border-radius:16px;
    padding:${multiSlotOpen?'16px':'12px 16px'};margin-bottom:14px;">
    <div onclick="multiSlotOpen=!multiSlotOpen;renderMultiSlot()" style="
      display:flex;align-items:center;justify-content:space-between;
      cursor:pointer;${multiSlotOpen?'margin-bottom:14px':''};"
      onmouseover="this.querySelector('.ms-toggle').style.background='rgba(8,145,178,.15)'"
      onmouseout="this.querySelector('.ms-toggle').style.background='rgba(8,145,178,.08)'">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:3px;height:22px;background:linear-gradient(180deg,var(--grn),var(--cyn));border-radius:4px;flex-shrink:0;"></div>
        <div>
          <div style="font-size:13px;font-weight:900;color:var(--hi);letter-spacing:.5px;">🎯 RUN BACKTEST MULTI COIN</div>
          ${multiSlotOpen?`<div style="font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:1px;">MACD auto · Long+Short riêng · Dollar P&L</div>`:''}
        </div>
      </div>
      <div class="ms-toggle" style="font-size:11px;font-weight:700;color:var(--cyn);
        background:rgba(8,145,178,.08);border:1px solid var(--cyn);
        border-radius:6px;padding:4px 12px;flex-shrink:0;transition:background .15s;">
        ${multiSlotOpen?'▲ Ẩn':'▼ Hiện'}
      </div>
    </div>
  ${multiSlotOpen?`

    <div class="fgrid" style="margin-bottom:14px;">
      <div><div class="flbl">Từ ngày</div>
        <input type="text" value="${esc(msStart)}" oninput="msStart=this.value" placeholder="01/01/2025">
      </div>
      <div><div class="flbl">Đến ngày</div>
        <input type="text" value="${esc(msEnd)}" oninput="msEnd=this.value" placeholder="${todayStr()}">
      </div>
    </div>

    ${slots.map(s=>s.expanded?renderSlotExpanded(s):renderSlotCollapsed(s)).join('')}

    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <div onclick="addSlot()" style="
        flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
        padding:10px;border:1.5px dashed var(--b2);border-radius:10px;
        color:var(--dim);font-size:12px;font-weight:700;cursor:pointer;
        transition:border-color .15s;letter-spacing:.5px;"
        onmouseover="this.style.borderColor='var(--cyn)'"
        onmouseout="this.style.borderColor='var(--b2)'">
        + THÊM SLOT
      </div>
      <label style="
        flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
        padding:10px;border:1.5px dashed var(--acc);border-radius:10px;
        color:var(--acc);font-size:12px;font-weight:700;cursor:pointer;
        transition:border-color .15s;letter-spacing:.5px;"
        onmouseover="this.style.borderColor='var(--cyn)';this.style.color='var(--cyn)'"
        onmouseout="this.style.borderColor='var(--acc)';this.style.color='var(--acc)'"
        title="Chọn nhiều file JSON — xóa slots cũ và tạo lại toàn bộ">
        📂 LOAD HÀNG LOẠT
        <input type="file" accept=".json" multiple onchange="loadAllSlotConfigs(this)" style="display:none">
      </label>
    </div>

    ${multiSlotStatus?`<div class="status-box" id="msStatusLine">${esc(multiSlotStatus)}</div>`:'<div id="msStatusLine"></div>'}

    <button class="run-btn" onclick="runMultiSlot()" ${multiSlotLoading?'disabled':''}
      style="background:linear-gradient(135deg,var(--grn),var(--cyn));">
      ${multiSlotLoading?'⏳ Đang chạy…':'▶ CHẠY TẤT CẢ SLOTS'}
    </button>

    ${resHtml}

  `:''}
  </div>`;

  el.innerHTML=html;
}

// ══════════════════════════════════════════════
//  BACKTEST REALTIME — STATE
// ══════════════════════════════════════════════









// init
renderOptimizer();
renderMultiSlot();
</script>
</body>
</html>
